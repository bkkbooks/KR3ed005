body:
  text: 卷十二華佗齒科神方一二一華佗治牙疼神方巴豆十枚去心皮熬研如膏大棗二十枚取肉細辛一兩上三味先將細辛研末和前二味為丸以綿裹著所痛處咬之如有涕唾吐卻勿咽入喉中日三瘥一二二華佗治齒疼神方附子一分胡椒蓽茇各二分上搗末著齒疼上又以散用蠟和為丸置齒疼孔上瘥止一二三華佗治齒痛神方芎藭細辛防風礬石燒令汁盡附子炮藜蘆莽草上七味各等分為末以綿裹彈丸大酒漬熨所患處含之勿咽汁又將木鱉子去殼研細入蓽茇同研勻隨左右鼻內搐之每用一豆許奇效一二四華佗治風火牙痛神方白芷焙末蜜丸硃砂為衣每服一粒荊芥湯下一二五華佗治陰虛牙痛神方生附子研末口津調敷兩足心極效一二六華佗治腎虛牙痛神方破故紙二兩青鹽五錢炒研擦牙神效一二七華佗治蟲蝕牙痛神方雄黃末以棗膏和為丸塞牙孔中以膏少許置齒燒鐵篦烙之令徹熱以瘥止一二八華佗治風齒根出神方先以石黛五分細辛棘刺菖蒲香附子當歸青木香胡桐律乾薑各四分青葙子六分共搗為散以半錢匕綿裹就齒痛處含之勿停瘥止再以苦參八分大黃黃芩枳實地骨皮各六分玄參黃連各八分搗為散蜜和丸食後少時以漿水服一十五丸日再服至二十丸增減自量之忌蒜面豬肉一二九華佗治牙根腫痛神方山慈菇枝根煎湯漱吐極效一二一華佗治齒根欲脫神方取生地黃搗以綿裹貼齒根常含之甚妙一二一一華佗治牙痛面腫神方蒴藋五兩以水五升煮取四升去滓蜀椒吳茱萸獨活烏賊魚骨桃膠各一兩桂心半兩酒一合先將蜀椒等六味以水二升煮取八合投蒴藋汁及酒更煎取一小升去滓含之就病日三以瘥止為度一二一二華佗治齒齦腐爛神方生地黃一斤食鹽二合二物搗和成團用濕麵包煨令煙盡去面入麝香一分研勻日夜貼之不久自愈一二一三華佗治齒齦黑臭神方苦參煎湯漱口續用數日必有奇效一二一四華佗治䘌齒神方䘌齒者是蟲蝕齒至斷膿爛汁臭如蝕之狀故謂之䘌齒治法於五月五日乾蝦蟆燒灰石黛思邈按石黛疑是黑石脂甘皮思邈按甘皮即柑皮各等分搗末以敷齒上取瘥或以細辛當歸甘草炙蛇床子各一兩青葙子三兩上五味搗以綿裹如大豆著齒上日三勿咽汁瘥止亦奇效一二一五華佗治齲齒神方五月五日蝦蟆燒作灰石黛甘皮細辛白雞屎麝香乾薑薰黃上八味各等分以薄綿裹少許納蟲齒孔中日三易之瘥或用白附子知母各一分細辛五分芎藭三分高良薑二分上五味末之以綿裹少許著齲上勿咽汁日二三次亦效一二一六華佗治齲齒根腫出膿神方白礬燒熊膽各一分蟾酥雄黃麝香各半分上為散每用半錢敷牙根一二一七華佗治風齒神方蜀椒二十粒枳根皮莽草細辛菖蒲牛膝各二兩上六味以水四升煮取二升去滓細細含之以瘥為度未瘥更作取瘥又單煮獨活一味含之良一二一八華佗治風齒口臭神方芎藭當歸各三兩獨活細辛白芷各四兩上以水五升煮取二升去滓含日三五度取瘥一二一九華佗治牙齒風齲神方郁李根白皮四兩細辛一兩鹽一合上以水四升煮取二升半去滓納鹽含之取瘥一二二華佗治風沖牙齒動搖神方芎藭薏苡根各三兩防風二兩細辛一兩上以水六升煮取二升去滓含漱日三五度一二二一華佗治齒痛有孔神方莨菪子數粒納齒孔中以蠟封之即瘥一二二二華佗治牙齒挺出神方羊腎脂泔澱各二合牛糞絞取汁一合甘草半兩生用末之青黛薰黃各半兩末之上六味相和銅器中微火煎五六沸取東引桃枝如箸大六枝以綿纏頭點取藥更互熱烙斷齦際隔日又烙之不兩三日看好肉生以瘥乃止欲烙時淨刮齒牙根上然後為之不爾肉不生十餘日忌生冷醋酒肉陳臭一年禁油一二二三華佗治牙齒脫落神方青黛二兩雄黃硃砂莨菪子熬青礬石黃礬石白礬石並燒令汁盡附子炮苦參甘草炙藜蘆炙細辛麝香研各一兩上搗篩為散以薄綿裹如棗核大著患處日三瘥止一二二四華佗治齒間出血神方竹葉濃煮著鹽含之冷吐或以童子小便溫含之冷吐血即止一二二五華佗治齒血不止神方刮生竹皮以苦酒漬之令其人解衣坐使人含噀其背三遍仍取竹茹濃煮汁含之漱咽終日為之或用礬石一兩燒末以水二升煮之先試血乃含之一二二六華佗治牙縫出膿神方明雄黃二兩為末用脂麻油四兩調勻含漱片時吐出再漱數次即愈一二二七華佗治牙宣神方先用白蒺藜一兩為末煎湯入食鹽一撮漱之次用生玄胡索為末敷患處一二二八華佗治牙癰神方先以大黃一斤白芷十兩共為末水丸之每服三五錢五更時用連須蔥大者十餘根陳酒一碗煮蔥爛取酒送藥覆被取汗汗過二三時行一二次立效別以治鼻疔蟾酥丸見十一卷噙之一二二九華佗治牙疔神方牙縫中腫起一粒痛連腮項或兼麻癢或破流血水異於常症是為牙疔用竹籤挑破以見鮮血為度搽以硃砂硇砂白礬煅食鹽煅等分研勻之細末更用蟾酥丸含之或服之自愈一二三華佗治攢齒疳神方攢齒疳為牙根肉內攢出骨尖如刺而作痛也小兒多有之用披針刺開好肉取出本牙如出血不止以濕綿紙換貼二次自止一二三一華佗治走馬疳神方先以鹽湯漱口次以人參茯苓各三錢為末同米二碗煮成稀粥食之以養胃氣更以牛黃黃連大黃酒蒸木香青黛各等分為末用淡竹葉薄荷煎湯調服以消腑熱外用手術法取去腐肉內見紅肉流血鮮者為吉如頑肉不脫腐黑復生牙落無血臭穢不止身熱不退者俱為不治之症外搽藥用牛黃五分珍珠人中面琥珀胡黃連乳香沒藥各一錢兒茶二錢硼砂五分冰片三分共為末摻用一二三二華佗治青腿牙疳神方本症因兩腿上有青色斑紋如雲其毒上攻遂致牙根腐爛甚或洞頰治法宜急用磁鋒劃破腿上腫處使毒血湧出外貼以牛肉片日易數次取瘥為止一二三三華佗治牙疏陷物神方蚯蚓泥水和成團煅赤研末臘月豬脂調敷日三次一二三四華佗治固齒神方青鹽二兩白鹽四兩以蜀椒四兩煎汁拌鹽炒乾日用擦牙永無齒疾一二三五華佗治除去痛牙神方鳳仙花種子研成末入信石少許點於痛牙根上取除極易
