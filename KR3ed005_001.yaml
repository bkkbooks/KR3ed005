body:
  text: 卷一華佗論病理神方一一論人法與天地人者上稟天下委地陽以輔之陰以佐之天地順則人氣泰天地逆則人氣否天地有四時五行寒暄動靜其變也喜為雨怒為風結為霜張為虹人體有四肢五臟呼吸寤寐精氣流散行為營張為氣發為聲陽施於形陰慎於精天地之同也失其守則蒸熱發否而寒生結作癭瘤陷作癰疽盛而為喘減而為枯彰於面部見於肢體天地通塞一如此矣故五緯盈虧星辰差忒日月交蝕彗孛飛走天地之災怪也寒暄不時天地之蒸否也土起石立天地之癰疽也暴風疾雨天地之喘乏也江河竭耗天地之枯焦也明於其故者則決之以藥濟之以針化之以道佐之以事故形體有可救之病天地有可去之災人之危厄生死稟於天地陰之病來亦緩而去亦緩陽之病來亦速而去亦速陽生於熱熱則舒緩陰生於寒寒則蜷急寒邪中於下熱邪中於上飲食之邪中於中人之動止本乎天地知人者有驗於天知天者亦有驗於人人法於天觀天地逆從則知人衰盛人有百病病有百候候有百變皆天地陰陽逆從而生苟能窮乎此則思過半矣一二論陰陽大要天者陽之宗地者陰之屬陽者生之本陰者死之基立於天地之間而受陰陽之輔佐者人也得其陽者生得其陰者死陽中之陽為高真陰中之陰為幽鬼故鍾於陽者長鍾於陰者短多熱者陽之主多寒者陰之根陽務其上陰務其下陽行也速陰行也緩陽之體輕陰之體重陰陽平則天地和而人氣寧陰陽逆則天地否而人氣厥故天地得其陽則炎熾得其陰則寒凜陽始於子前末於午後陰始於午後末於子前陰陽盛衰各在其時更始更末無有休息人能從之是曰大智金匱曰秋首養陽春首養陰陽勿外閉陰勿外侵火出於木水生於金水火通濟上下相尋人能循此永不湮沉此之謂也凡愚不知是理舉止失宜自致其罹外以風寒暑濕內以飢飽勞役為敗欺殘正體消亡正神縛絆其身生死告陳殊不知脈有五死氣有五生陰家脈重陽家脈輕陽病陰脈則不永陰病陽脈則不成陽候多語陰症無聲多語者易濟無聲者難榮陽病則旦靜陰病則夜寧陰陽運動得時而行陽虛則暮亂陰虛則朝爭朝暮交錯其氣厥橫死生致理陰陽中明陰氣下而不上曰斷絡陽氣上而不下曰斷經陰中之邪曰濁陽中之邪曰清火來坎戶水到離扃陰陽相應方乃和平陰不足則濟之以水母陽不足則助之以火精陰陽濟等各自攀陵上通三寸曰陽之神路下通三寸曰陰之鬼程陰常宜損陽常宜盈居之中者陰陽勻停是以陽中之陽天仙賜號陰中之陰下鬼持名順陰者多消滅順陽者多長生逢斯妙趣無所不靈一三論生成陰陽者天地之樞機五行者陰陽之終始非陰陽不能為天地非五行不能為陰陽故人者成於天地敗於陰陽由五行從逆而生焉天地有陰陽五行人有血脈五臟五行者金木水火土五臟者肺肝心腎脾金生水水生木木生火火生土土生金生成之道循環不窮肺生腎腎生肝肝生心心生脾脾生肺上下榮養無有休息故金匱至真要論云心生血血為肉之母脾生肉肉為血之舍肺屬氣氣為骨之基腎應骨骨為筋之本肝系筋筋為血之原五臟五行相成相生晝夜流轉無有始終從之則吉逆之則凶天地陰陽五行之道中合於人人得之可以出陰陽之數奪天地之機悅五行之要無終無始神仙不死矣一四論陽厥驟風暴熱雲物飛揚晨晦暮晴夜炎晝冷應寒不寒當雨不雨水竭土壞時歲大旱草木枯悴江河乏涸此天地之陽厥也暴壅塞忽喘促四肢不收二腑不利耳聾目盲咽乾口焦唇舌生瘡鼻流清涕頰赤心煩頭昏腦重雙睛似火一身如燒素不能者乍能素不欲者乍欲登高歌笑棄衣奔走狂言妄語不辨親疏發躁無度飲水不休胸膈膨脹腹與脅滿悶背疽肉爛煩憒潰中食不入胃水不穿腸驟腫暴滿叫呼昏冒不省人事疼痛不知去處此人之陽厥也陽厥之脈舉按有力者生絕者死一五論陰厥飛霜走雹朝昏暮靄雲雨飄霪風露寒冷當熱不熱未寒而寒時氣霖霪泉生田野山摧地裂土壞河溢日晦月昏此天地之陰厥也暴啞卒寒一身拘急四肢蜷攣唇青面黑目直口噤心腹滿痛口頷搖鼓腰腳沉重語言謇澀上吐下瀉左右不仁大小便活舌吐酸淥悲憂慘慼喜怒無常者此人之陰厥也陰厥之脈舉指弱按指大者生舉按俱絕者死一身悉冷額汗自出者亦死陰厥之病過三日不治一六論陰陽痞格陽氣上而不下曰痞陰氣下而不上亦曰痞陽氣下而不上曰格陰氣上而不下亦曰格痞格者謂陰陽不相從也陽奔於上則燔脾肺生其疽也其色黃赤皆起於陽極也陰走於下則冰腎肝生其厥也其色青黑皆發於陰極也皆由陰陽痞格不通而生焉陽燔則治以水陰厥則助以火乃陰陽相濟之道也一七論寒熱寒熱往來是為陰陽相勝陽不足則先寒後熱陰不足則先熱後寒又上盛則發熱下盛則發寒皮寒而燥者陽不足皮熱而燥者陰不足皮寒而寒者為陰盛皮熱而熱者為陽盛熱發於下則陰中之陽邪熱發於上則陽中之陽邪寒起於上則陽中之陰邪寒起於下則陰中之陰邪寒而頰赤多言者為陽中之陰邪熱而面青多言者為陰中之陽邪寒而面青多言者為陰中之陰邪若不言者其病為不可治陰中之陰者一生九死陽中之陽者九生一死陰病難治陽病易醫診其脈候數在上則陽中之陽也數在下則陰中之陽也遲在上則陽中之陰也遲在下則陰中之陰也數在中則中熱遲在中則中寒寒用熱取熱以寒攻逆順之法從乎天地本乎陰陽也一八論虛實大要病有臟虛臟實腑虛腑實上虛下實下虛上實狀各不同宜探消息腸鳴氣走足冷手寒食不入胃吐逆無時皮毛憔悴肌肉皺皴耳目昏塞語聲破散行步喘促精神不收此五臟之虛也診其脈舉指而活按之而微看在何部以斷其臟又按之沉小弱微短澀軟濡俱為臟虛虛則補益治之常情耳飲食過多大小便難胸膈滿悶肢節疼痛身體沉重頭目昏眩唇舌腫脹咽喉閉塞腸中氣急皮肉不仁暴生喘乏偶作寒熱瘡疽並舉悲喜自來或自痿弱或自高強氣不舒暢血不流通此臟之實也診其脈舉按俱盛者實也又長浮數疾洪緊弦大俱曰實也觀其在何經而斷其臟頭痛目赤皮熱骨寒手足舒緩血氣壅塞丹瘤更生咽喉腫痛輕按則痛重按則快飲食如故是為腑實診其脈浮而實大者是也皮膚瘙癢肌肉䐜脹食飲不化大便滑而不止診其脈輕按則滑重按則平是為腑虛觀其在何經而正其腑胸膈痞滿頭目碎痛飲食不下腦項昏重咽喉不利涕唾稠黏診其脈左右寸口沉結實大者上實也頰赤心怯舉動顫慄語聲嘶嘎唇焦口乾喘乏無力面少顏色頤頷腫滿診其左右寸脈弱而微者上虛也大小便難飲食如故腰腳沉重如坐水中行步艱難氣上奔沖夢寐危險診其左右尺中脈滑而澀者下虛也凡病人脈微澀短小俱屬下虛一九論上下不寧凡病脾者上下不寧蓋脾上有心之母下有肺之子心者血也屬陰肺者氣也屬陽脾病則上母不寧母不寧則陰不足陰不足則發熱又脾病則下子不寧子不寧則陽不足陽不足則發寒故脾病則血氣俱不寧血氣不寧則寒熱往來無有休息故病如瘧也蓋脾者土也心者火也肺者金也火生土土生金故曰上有心母下有肺子脾居其中病則如斯耳他臟上下皆法於此一一論脈要脈為氣血之先氣血盛則脈盛氣血衰則脈衰氣血熱則脈數氣血寒則脈遲氣血微則脈弱氣血平則脈緩又長人脈長短人脈短性急則脈急性緩則脈緩反此者逆順此者從又諸數為熱諸遲為寒諸緊為痛諸浮為風諸滑為虛諸伏為聚諸長為實諸短為虛又短澀沉遲伏皆屬陰數滑長浮緊皆屬陽陰得陰者從陽得陽者順違之者逆陰陽消息以經而處之假令數在左寸得之浮者熱入小腸得之沉者熱入心余仿此一一一論五色脈面青無右關脈脾絕木剋土面赤無右寸脈肺絕火剋金面白無左關脈肝絕金剋木面黃無左尺脈腎絕土剋水面黑無左寸脈心絕水剋火五絕者死凡五絕當時即死非其時則半歲死耳五色雖見而五脈不見即非死者矣一一二論脈病外內證訣病瘋人脈緊數浮沉有汗出不止呼吸有聲者死不然則生病氣人一身悉腫四肢不收喘無時厥逆不溫脈候沉小者死浮大者生病勞人脫肛骨肉相失聲散嘔血陽事不禁夢寐交侵呼吸不相從晝涼夜熱者死吐膿血者亦死其脈不數有根蒂者及頰不赤者生病腸澼者下膿血病人脈急皮熱食不入腹目瞪者死或一身厥冷脈沉細而不生者亦死食如故脈沉浮有力而不絕者生病熱人四肢厥脈弱不欲見人食不入利下不止者死食人四肢溫脈大語狂無睡者生病寒人狂言不寐身冷脈數喘息目直者死脈有力而不喘者生陽病人精神顛倒寐而不惺言語失次脈候浮沉有力者生及食不入胃不定者死久病人脈大身瘦食不充腸言如不病坐臥困頓者死若飲食進退脈小而有力言語輕嘶額無黑氣大便結澀者生凡陽病陰證陰病陽證身熱大肥人脈衰上下交變陰陽顛倒冷暖相乘皆屬不吉從者生逆者死治藥之法宜為詳悉耳一一三論生死大要不病而五行絕者死不病而性變者死不病而暴語妄者死不病而暴不語者死不病而喘息者死不病而強中者死不病而暴目盲者死不病而暴腫滿者死不病而大便結者死不病而暴無脈者死不病而暴昏冒如醉者死此內外先盡故也逆者即死順者二年無有生者也一一四論病有災怪病者應寒而反熱應熱而反寒應吐而不吐應瀉而不瀉應汗而不汗應語而不語應寐而不寐應水而不水皆屬災怪此乃五臟之氣不相隨從而致以四逆者不治四逆者謂主客運俱不得時也一一五論水法病起於六腑者陽之系也其發也或上或下或內或外或反在其中行之極也有能歌笑者有能悲泣者有能奔走者有能呻吟者有自委曲者有自高賢者有寐而不寤者有不能言而聲昧者各各不同皆生於六腑也喜其通者因以通之喜其塞者因以塞之喜其水者以水濟之喜其冰者以冰助之病者之嗜好勿強予違背亦不可強抑之如此從隨則十生其十百生其百疾無不愈耳一一六論火法病起於五臟者陰之屬也其發也或偏枯或痿厥或外寒而內熱或外熱而內寒或心腹脹滿或手足攣蜷或口眼不正或皮膚不仁或行步艱難或身體強硬或吐瀉不息或疼痛未寧或暴無語或久無音綿綿默默狀如死人如斯之候備出於陰陰之盛也陽必不足陽之盛也陰必不盈前論云陽不足則助之以火精陰不足則濟之以水母此之謂也故喜其汗者汗之喜其溫者溫之喜其熱者熱之喜其火者火之喜其湯者湯之汗溫熱火湯胥視其宜而施之治救之道即在是也一一七論風中有五生五死風中有五者謂心肝脾肺腎五臟之中其言生死各不同也心風之狀汗自出而偃仰臥不可轉側語言狂妄者生宜於心俞灸之若唇面青白黃黑赤其色不足眼眶動不休心絕者不可救過五日即死肝風之狀青色圍目額坐不得佝僂者可治若喘目直唇面俱青者死宜於肝俞灸之脾風之證一身通黃腹大而滿不嗜食四肢不收者或可治宜於脾俞灸之腎風者腰腳痛重視脅下未生黃點者可治不然則死腎風宜於腎俞灸之肺風者胸中氣滿冒昧汗出鼻不聞香臭喘而不得臥者可治若失血及妄言者不可治七八日死肺風宜於肺俞灸之凡診其風脈滑而散者風也緩而大浮而緊軟而弱皆屬風也又風之病鼻下赤黑相兼吐沫身直者七日死又中風人口噤筋急脈遲者生脈急而數者死又心脾俱中風則舌強而不能言肝腎中風則手足不遂其外有癮疹者有偏枯者有失音者有歷節者有癲厥者有疼痛者有聾瞽者有瘡癩者有脹滿者有喘乏者有赤白者有青黑者有瘙癢者有狂妄者皆起於風也其脈虛浮者自虛而得實大者自實而得之強緊者汗出而得之喘乏者飲酒而得之癲厥者自勞而得之手足不遂者語言謇失者房中而得之癮疹者自痹濕而得之歷節疼痛者因醉犯房而得之聾盲瘡癩者自五味飲食冒犯禁忌而得之千端萬狀要不離於五臟六腑所生耳一一八論積聚癥瘕雜蟲積聚癥瘕雜蟲皆由五臟六腑真氣失邪氣並而來其狀各異有害人與不害人之區其為病有緩速痛癢之異蓋因內外相感真邪相犯氣血熏搏交合而成積者繫於臟聚者繫於腑癥者繫於氣瘕者繫於血蠱者血氣食物相感而化之積有五聚有六癥有十二瘕有八蠱有九其名不等積有心肝脾肺腎之異聚有大腸小腸膽胃膀胱三焦之分症有勞氣冷熱虛實風濕食藥思憂之別瘕有青黃燥血脂狐蛇鱉之區蟲有伏蛔白肉肺胃赤弱蟯之名為病之說出於諸論治療之法皆具於後一一九論勞傷勞者勞於神氣傷者傷於形容飢飽過度則傷脾思慮過度則傷心色欲過度則傷腎起居過度則傷肝喜怒悲愁過度則傷肺又風寒暑濕則傷於外飢飽勞役則敗於內晝感之則病營夜感之則病衛營衛經行內外交運而各從其晝夜始勞於一一起於二二傳於三三通於四四干其五五復犯一一至於五邪乃深真氣自失使人肌肉消神氣弱飲食減行步難及其如此則雖有命亦不能生故調神氣論曰調神氣戒酒色節起居少思慮薄滋味者長生之大端也診其脈甚數甚急甚細甚弱甚微甚澀甚滑甚短甚長甚浮甚沉甚緊甚弦甚洪甚實皆起於勞而生也一二論傳屍凡人血氣衰弱臟腑虛羸中於鬼氣因感其邪遂成傳屍之疾其候咳嗽不止或胸膈脹悶或肢體疼痛或肌膚消瘦或飲食不入或吐利不定或吐膿血或嗜水漿或好歌詠或愛悲愁或顛風發歇或便溺艱難或因酒食而得或因風雨而來或因問病弔喪而感受或緣朝走暮遊而偶染或因氣聚或因血行或露臥于田野或偶會於園林鍾此病死之氣染而為疾故曰傳屍一二一論肝臟虛實寒熱生死逆順脈證之法肝與膽為表裡足厥陰少陽是其經也王於春春乃萬物之始生其氣嫩軟虛而寬故其脈弦軟不可發汗弱則不可下弦長曰平反此曰病脈虛而弦則為太過病在外太過則令人善忘忽忽眩冒實而微則為不及病在內不及則令人胸脅脹滿大凡肝實引兩脅下痛其氣逆則頭痛耳聾頰赤其脈沉而急浮而急亦然主脅支滿小便難頭痛眼眩其脈急甚惡言微急氣在脅下緩甚嘔逆微緩主脾太急內癰吐血太甚筋痹小甚多飲微小消痹滑甚則頹疝微滑遺溺澀甚流飲微澀瘲攣又肝之積氣在脅久不去則發咳逆或為瘧疾虛則夢花草茸茸實則夢山林茂盛又肝病如頭痛目眩肢滿囊縮小便不通十日死又身熱惡寒四肢不舉其脈當弦長而急乃反短澀是為金剋木十日死不治又肝中寒則兩臂不舉舌本燥多太息胸中痛不能轉側其脈左關上遲而澀者是也肝中熱則喘滿多怒目疼腹脹不嗜食所作不定睡中驚怖眼赤視不明其脈左關陰實者是也肝虛冷則脅下堅痛目盲臂痛發寒如瘧狀不欲食婦人月水不來氣急其脈左關上沉而弱者是也一二二論心臟虛實寒熱生死逆順脈證之法心居五臟之首有帝王之稱與小腸為表裡神之所舍又生血屬於火王於夏手少陰是其經凡夏脈來盛去衰是名曰鉤反此者病若來盛去亦盛為太過病在外來衰去盛為不足病在內太過則令人熱而骨痛口瘡舌焦引水不及則令人煩躁上為咳唾下為氣泄其脈來如連珠如循琅玕曰平脈來累累連屬其中微曲曰病來前曲後倨如操帶鉤曰死又思慮過多怵惕傷心心傷則神失神失則恐懼又心痛手足寒過五寸則旦得夕死夕得旦歿又心有水氣則身腫不得臥煩躁心中風則翕翕發熱不能行主飢而不食食則嘔吐夏心王左寸脈洪浮大而散曰平反此則病若沉而滑者水剋火十死不治弦而長者木來歸子其病自愈緩而大者土入火微邪相干無所害心病則胸中痛四肢滿脹肩背臂膊皆痛虛則多悸惕然無眠胸腹及腰背引痛喜悲時常眩僕心積氣久不去則憂煩心中疼喜笑不息夢火發心氣盛則夢喜笑恐畏邪氣客於心則夢煙火心脹則短氣夜臥不寧時有懊憹腫氣來往腹中熱喜水涎出凡心病必日中慧夜半甚平旦靜又左寸脈大則手熱赤腫太甚則胸中滿而煩面赤目黃又凡心病則先心痛而咳不止關膈不通身重不已三日而死心虛則畏人瞑目欲眠精神不倚魂魄妄亂心脈沉小而緊浮氣喘若心下氣堅不下喜嚥唾手熱煩滿多忘太息此得之思慮太過其脈急甚則瘛瘲微急心中痛引腰背痛不下食太緩則發狂笑微緩則吐血大甚則喉閉微大痛引背多淚小甚則噦微小則消脾滑甚則為渴微滑則心疾引臍腹渴澀甚喑不能言又心脈搏堅而長生強舌不能語軟而散當懾伏不食又急則心疝臍下有病形煩悶少氣大熱上煎又心病狂言汗出煩躁厥冷其脈當浮而大反沉濡而滑其色當赤而反黑者水剋火十死不可治也又心積沉空空然上下往來無常處病胸滿悸腰腹中熱頰赤咽喉乾燥掌熱甚則嘔春瘥冬甚宜急療之又憂喜思慮太過心氣內去其色反和而盛者不出十日死扁鵲曰心絕一日死色見凶多人雖健敏名為行屍一歲之中禍必至矣又其人語聲前寬而後急後語不接前聲其聲濁惡其口不正冒喜笑此風入心也又心傷則心壞為水所乘身體手足不遂背節解舒緩不自由下利無休急宜治之不治十日死又笑不待呻而後憂此水乘火也陰繫於陽陰起陽伏伏則生熱熱則生狂冒昧亂妄言語錯誤不可採問心已損矣扁鵲云其人唇口赤色可治青黑則死又心瘧則煩而後渴翕翕然發熱其脈浮緊而大者是也心氣實則小便不利腹滿身熱而重溫溫欲吐吐而不出喘息急不安臥其脈左寸口實大者是也心虛則恐懼多驚憂思不樂胸腹中苦痛言語顫慄惡寒恍惚面赤目黃喜衄診其寸口兩虛而微者是也一二三論脾虛實寒熱生死逆順脈證之法脾者土也為諫議之官主意與智消磨五穀寄在其中養於四旁王於四季正王長夏與胃為表裡足太陰是其經也扁鵲云脾病則面色萎黃實則舌強直不嗜食嘔逆四肢緩虛則多病喜吞酸痢不已其脈來似水曰太過病在外如鳥之距曰不及病在內太過則令人四肢沉重言語謇澀不及則令人中滿不食乏力手足緩弱不遂涎引口中四肢腫脹溏泄不時夢中飲食脾脈來時緩柔去似鳥距踐地者曰平脈來實而滿稍數似雞舉足曰病又如鳥之隊如鳥之距如屋之漏曰死中風則翕翕發熱狀若醉人腹中煩滿皮肉瞤而短氣者也王時其脈阿阿然緩曰平若弦急者肝克脾真鬼相逢大凶之兆又微澀而短者肺來乘脾不治自愈反軟而滑者腎來從脾亦為不妨反浮而洪者心來生脾不及而脾病也色黃體重失便目直視唇反張爪甲青四逆吐食百節疼痛不能舉其脈當浮大緩今反弦急其色反青此十死不可治也又脾病其色黃飲食不消腹脹滿身體重骨節痛大便硬小便不利其脈微緩而長者可治脾氣虛則大便活小便利汗出不止五液注下為五色注下利也又積在中久不愈則四肢不收黃疸食不為肌膚氣滿喘而不足也又脾實則時夢築牆蓋屋盛則夢歌樂虛則夢飲食不足厥邪客於脾則夢大澤丘陵風雨壞室脾脹則喜噦四肢急體重不食善噫脾病則曰昧慧平日甚日中持下晡靜脈急甚則瘛瘲微急則隔中不利食不入而還出脈緩甚則痿厥微緩則風痿四肢不持大甚則寒熱作微大則消癉滑甚則㿗疝微滑則蟲毒腸鳴中熱澀甚則腸㿗微澀則內潰下膿血脾脈至大而虛有積脾氣絕則十日死又臍出者亦死唇焦枯無紋理而青黑者死脾先死也脾病面黃目赤者可治青黑色入節半歲而死色如枳實者一月死凶吉休咎皆見其色出部分也又口噤唇黑四肢重如山不能自持大小便利無休歇飲食不入七日死又口雖痿黃語聲囀囀者可治脾病瘧氣久不去腹中鳴痛徐徐熱汗出其人本意寬緩反急怒者語時以鼻笑不能答人者此過一月禍必至矣又脾中寒或熱則皆使人腹中痛不下食又病時舌強語澀轉卵縮牽陰股中引痛身重不思食膨脹變則水泄不能臥者死不治脾正熱則面黃目赤脅痛滿寒則吐涎沫而不食四肢痛滑泄不已手足厥甚則顫慄如瘧臨病之時要在明證詳脈然後投湯藥期瘳耳一二四論肺臟虛實寒熱生死逆順脈證之法肺者魄之舍生氣之源乃五臟之華蓋也外養皮毛內榮腸胃與大腸為表裡手太陰陽明是其經也氣通則能知其香味有病則喜咳實則鼻流清涕虛實寒熱皆使人喘咳實則夢刀兵喘息胸滿虛則寒生咳息利下少氣力多悲感王於秋其脈浮而毛曰平脈來毛而中央堅兩旁虛者曰太過病在外脈來毛微曰不及病在內太過則令人氣逆胸滿背痛不及則令人喘呼而咳上氣見血不聞聲音又肺脈厭厭聶聶如落榆葉者曰平來如循雞羽者曰病如物之浮如風之吹鳥背上毛者死其肺脈來至大虛又如以毛羽中人膚其色赤其毛折者死又微曰平毛多曰病毛弦曰春病弦甚即死又肺病吐衄血皮熱脈數頰赤者死又久咳見血身熱氣短脈當澀而反浮大色當白而反赤者為火剋金十死不治肺病喘咳身寒無熱脈遲微者可治肺王於秋其脈當浮澀而短是之謂平反此為病又反洪而大而長是為火焚金亦不可治反得軟而滑者腎來乘肺不治自愈反浮大而緩者是脾來生肺不治而瘥反弦而長者是肺被肝從為微邪雖病不妨虛則不能息身重咽乾喘咳上氣肩背痛有積則脅痛中風則口燥而喘身運而重汗出而胃悶其脈按之虛弱如蔥葉下無根者死中熱則唾血其脈細緊浮數芤皆主失血此由躁擾嗔怒勞傷得之氣結壅所為也又其人喘而目脫其脈浮大者是也又肺痿則涎沫吐而咽乾欲飲者將愈不飲則未瘥又咳而遺小便者上虛不能制下故也其沉濁者病在內浮清者病在外肺孔死則鼻孔開而黑喘而目直視也又肺絕則十三日死其病足滿瀉痢不覺出也面白目青是為經亂雖有天命亦不足治肺病頰赤者死又言音喘急短氣而睡此為真鬼相害十死十百死百大逆之兆也又湯此字疑訛上而下降燔於肺肺自結邪脹滿喘急狂言目瞑非常所說而口鼻張大小便頭俱脹飲水無度此因熱傷陽為肺化血不可治半歲死又肺病使人心寒寒甚則發熱寒熱往來休作不定多驚咳喘如有所見者是也其脈浮而緊又滑而數及遲澀而小皆為肺病之脈又乍寒乍熱鼻寒頤赤白皆肺病之候也一二五論腎臟虛實寒熱生死逆順脈證之法腎者精神之舍性命之根外通於耳男以閉精女以包血與膀胱為表裡足少陰太陽是其經也凡腎氣絕則不盡其天命而死王於冬其脈沉濡曰平反此者病其脈彈石名曰太過病在外其去如數者為不及病在內太過則令人體瘠而少氣不欲言不及則令人心如懸小腸腹滿小便滑變黃色又腎脈來喘喘累累如鉤按之堅曰平又來如引葛按之益堅曰病來如轉索辟辟如彈石曰死又腎脈但石無胃氣亦死腎有水則腹大臍腫腰重痛不得溺陰下濕如牛鼻頭汗出是為逆寒大便難腎病手足冷面赤目黃小便不禁骨節煩痛小腹結痛氣上衝心脈當沉而滑今反浮大緩其色當黑今反黃其翕翕少氣兩耳若聾精自出飲食少便下清脈遲可治冬則脈沉而滑曰平反大而緩是土剋水不可治反浮澀而短肺乘腎易治反弦而長者肝乘腎不治自愈反浮大而洪心乘腎不為害腎病腹大體重滿咳嗽汗出憎風虛則胸中痛陰邪入腎則骨痛腰痛上引脊背疼遇房汗出當風浴水久立則腎病又其脈急甚則腎痿瘕疾微急則沉厥奔豚足不收緩甚則折脊微緩則洞泄食不化入咽還出大甚則陰痿微大則石水起臍下其腫埵埵而上至胃者死小甚則洞泄微小則消癉滑甚則癃㿗微滑則骨痿坐弗能起目視見花澀甚則大壅塞微澀則痔疾又其脈之至上堅而大有膿氣在陰中及腹內名腎癉得之因浴冷水脈來沉而大堅浮而緊手足腫厥陰痿腰背疼小腸心下有水氣時脹滿洞泄此皆浴水中身未乾而合房得虛夢船溺人得其時夢伏水中盛實則夢臨深投水中腎脹則腰痛滿引背帙帙然腰痹痛腎病夜半愈日中甚晡則靜腎生病則口熱舌乾咽腫上氣噎乾及煩而痛黃疸腸病久不愈則腿筋痛小便閉兩脅脹滿目盲者死腎之精徹脊與腰相引而痛飢見飽減又腎中寒結在臍下也腎脈來而細軟附於骨者是也又目黑目白腎已內傷八日死又陰縮小便不出或不快者亦死又其色青黃連耳左右其人年三十許百日死若偏在一邊一日死實則煩悶臍下重熱則舌乾口焦而小便澀黃寒則陰中與腰背俱疼面黑而干噦而不食或嘔血是也又喉鳴坐而喘咳血出亦為腎虛寒氣欲絕也寒熱虛實既明稍詳調救即十可治十全生之道也一二六論膽虛實寒熱生死逆順脈證之法膽為中清之府號曰將軍決逆順於此焉能喜怒剛柔與肝為表裡足少陽是其經也虛則傷寒寒則恐畏頭眩不能獨臥實則傷熱熱則驚怖精神不守臥起不寧又玄水發其根在膽又肝厥不已傳邪入膽嘔清汁又膽有水則從頭腫至足又膽病則口苦太息嘔宿汁心中澹澹恐人將捕之咽中介介然數唾又膽脹則口苦舌下痛太息邪氣客於膽則夢訟鬥其脈診在左關上浮而得之者是其部也膽實則熱精神不守膽熱多睡膽冷則無眠又關上脈陽微者膽虛陽數者膽實陽虛者膽絕也一二七論小腸虛實寒熱生死逆順脈證之法小腸為受盛之府與心為表裡太陽是其經也心與小腸絕者六日死絕則髮直如麻汗出不已不得屈伸者是也又心病久則傳小腸小腸咳則氣咳一齊出也小腸實則傷熱熱則口瘡虛則傷寒寒則泄膿血或泄黑水其根在小腸又小腸寒則下腫重熱久不出則漸生痔疾若積多發熱則上病若氣多發冷則腰下重食則窘迫而難是其候也小腸脹則小腸引指疼厥則邪入小腸夢聚並邑中或咽痛頷腫不可回首肩如杖腳如折又左手寸口陽絕是無小腸也六日死病則臍腹小腹中有疝瘕也右手寸口實大也小腸實也有熱則小便赤澀又小腸實則口瘡身熱去來心中煩滿體重又小腸主於舌之官也和則能言而機關利健善別其味虛則左寸口脈浮而微軟弱不禁按病驚狂無所守下空空然不能語者是也一二八論胃虛實寒熱生死逆順脈證之法胃者腑也又名水穀之海與脾為表裡為人類之根本胃氣壯則五臟六腑皆壯足陽明是其經也胃氣絕五日死實則腫脹便難肢節疼痛不下食嘔吐不已虛則腸鳴脹滿汗出滑泄寒則腹中痛不能食冷物熱則面赤如醉人四肢不收夜不安眠語狂目亂便硬者是也痛甚則腹脅脹滿吐嘔不入食當心上下不通惡聞食臭嫌人語振寒喜伸欠胃中熱則唇黑熱甚則登高而歌棄衣而走顛狂不定汗出額上衄不止虛則四肢腫滿胸中短氣穀不化而消也胃中風則溏泄不已胃不足則多飢不消食病人胃不平且中病渴者不能治胃脈堅而長其色黃赤病折腰其脈軟而散病食痹關上脈浮大者虛也浮而短澀者實也浮而微滑者亦虛浮而遲者寒也浮而數者熱也虛實寒熱生死之證察其脈理即成神妙也一二九論大腸虛實寒熱生死逆順脈證之法大腸者肺之腑也為傳送之司號監倉之官肺病久則傳入大腸手陽明是其經也寒則泄熱則結絕則利下不止而死熱極則便血又風中大腸則下血又實熱則脹滿大便不通虛寒則滑泄不定大腸乍虛乍實乍來乍去寒則溏熱則垢有積物則發熱慄而寒其發渴如瘧狀積冷痹痛不能久立痛已則泄積物是也虛則喜滿咳喘咽中如核妨矣一三論膀胱虛實寒熱生死逆順脈證之法膀胱者津液之府也與腎為表裡號水曹椽名玉海也足太陽是其經也總通於五腑所以五腑有疾即應膀胱膀胱有疾即應胞囊小便不利熱入膀胱則甚氣急而小便黃澀也膀胱寒則小便數而清白又石水發則根在膀胱腹脹大者是也又膀胱咳而不已則傳之三焦腸滿而不飲食也然上焦主心肺之病人有熱則食不入寒則精神不守泄利不止語聲不出也實則上絕於氣不行也虛則引氣入肺其三焦之氣和則五臟六腑皆和逆則皆逆膀胱中有厥陰氣則夢行不快滿脹則小便不下臍下重悶或有痛絕則三日死死雞鳴也一三一論三焦虛實寒熱生死逆順脈證之法三焦者人之三元之氣也號曰中清之腑總領五臟六腑營衛經絡內外左右上下之氣也三焦通則內外左右上下皆通其於用身灌體和內調外榮左養右導上宣下莫大於此也又名玉海水道上則曰三管中則曰霍亂下則曰走哺名雖三而歸一有其名而無其形也亦號曰孤獨之腑而衛出於上營出於下上者絡脈之系中者經脈之系下者人氣之系也亦又屬膀胱之宗始主通陰陽調虛實呼吸有病則苦腹脹氣滿小腹堅溺不得便而窘迫也溢則作水留則為脹手少陽是其經也又上焦實熱則額汗出能食而氣不利舌乾口焦咽閉之類腹脹脅肋痛寒則不入食吐酸水胸背引痛噎乾津不納也實則食已虛虛則還出膨脹而不納虛則不能制下遺便溺頭面腫也中焦實熱則上下不通腹脹喘咳下氣不上上氣不下關格而不通也寒則下痢不止食欲不消中滿虛則腸鳴膨脹也下焦實熱則小便不通大便難若重痛也虛寒則大小便泄下不止三焦之氣和則內外和逆則內外逆故以三焦為人之三元氣不亦宜乎一三二論痹痹者風寒暑濕之氣中於臟腑之謂也入腑則病淺易治入臟則病深難治有風寒濕熱氣及筋骨血肉氣之別大凡風寒暑濕之邪入於心者名曰血痹入脾者名肉痹入肝者名筋痹入肺者名氣痹入腎者名骨痹感病則一其治乃異痹者閉也五臟六腑感於邪氣亂於真氣閉而不仁也又痹病或痛癢或淋或急或緩而不能收持或拳而不能舒張或行立艱難或言語謇澀或半身不遂或四肢拳縮或口眼偏斜或手足欹側或行步而不言語或不能行步或左偏枯或右壅滯或上不通於下或下不通於上或左右手疼痛或即疾而即死或感邪而未亡或喘滿而不寐或昏昧而不醒種種諸證出於痹也一三三論氣痹氣痹者愁思喜怒過則氣結於上久而不消則傷肺傷肺則生氣漸衰而邪氣愈勝留於上則胸腹痹而不能食注於下則腳腫重而不能行攻於左則左不遂衝於右則右不仁貫於舌則不能言遺於腸則不能溺壅而不散則痛流而不聚則麻真經既損難以醫治邪氣不勝易為痊愈其脈右手寸口沉而遲澀者是也宜節憂思以養氣慎怒以全真最為良矣一三四論血痹血痹者飲食過多懷熱大盛或寒折於經絡或濕犯於營衛因而血搏遂成其咎故使血不能榮外氣不能養內內外已失漸漸消削左先枯則右不能舉右先枯則左不能伸上先枯則上不能制下下先枯則下不能克上中先枯則下不能通疏百證千狀皆失血也其脈左手寸口脈結而不能流利或斷絕者是也一三五論肉痹肉痹者飲食不節膏粱肥美之所為也脾者肉之本氣以食則肉不榮皮膚不澤則紋理疏凡風寒暑濕之邪易為入故久不治則為肉痹也肉痹之狀其先能食而不能充悅四肢緩而不收持者也其右關脈按舉皆無力而往來澀也宜節飲食以調其臟常起居以安其脾然後依經補瀉以求其愈也一三六論筋痹筋痹者由怒叫無時行步奔急淫邪傷肝肝失其氣因而寒熱所客久而不去流入筋會則使人筋急而不能舒緩也故名曰筋痹宜活血以補肝溫氣以養腎然後服餌湯圓治得其理合自瘳矣不然則害人其脈左關中弦急而數浮沉而有力也一三七論骨痹骨痹者乃嗜欲不節傷於腎也氣內消則不能關禁中上俱亂三焦之氣痞而不通飲食糟粕精氣日衰邪氣妄入上衝心舌其候為不語中犯脾胃其證為不充下流腰膝其象為不遂旁攻四肢則為不仁寒在中則脈遲熱在中則脈數風在中則脈浮濕在中則脈濡虛在中則脈滑其證不一要在詳明耳一三八論治中風偏枯之法人病中風偏枯其脈數而面乾黑黧手足不遂言語謇澀治之奈何在上則吐之在中則瀉之在下則補之在外則發之溫之按之熨之吐謂出其涎也瀉謂通其塞也補謂益其不足也發謂發其汗也溫為驅其濕也按謂散其氣也熨謂助其陽也治各合其宜安可一揆在求其本脈浮則發之滑則吐之脈伏而澀則瀉之脈緊則溫之脈遲則熨之脈閉則按之要察其可否故不能揆治者也一三九論五疔狀候五疔者皆由喜怒憂思沖寒冒熱恣飲醇酒多嗜甘肥毒魚酢醬色欲過度之所為也蓄其毒邪浸潰臟腑久不攄散始變為疔其名有五一曰白疔二曰赤疔三曰黃疔四曰黑疔五曰青疔白疔起於右鼻下初如粟米根赤頭白麻木或痛癢使人憎寒頭重狀若傷寒不欲食胸膈悶喘促昏冒者死未者可治此疾不過五日禍必至矣宜速治之赤疔在舌下根頭俱赤發痛舌本硬不能多言驚煩悶恍惚多渴引水不休小便不通狂者死也未者可治此不出七日禍必至矣大人小兒皆能患也黃疔起於唇齒齦邊其色黃中有黃水發則令人多食而還出手足麻木涎出不止腹脹而煩多睡不寐者死也未者可治黑疔起於耳前狀如瘢痕其色黑長減不定使人牙關急腰脊腳膝不仁不然則病亦不出三歲死皆由腎漸絕也宜慎欲事青疔起於目下始如瘤瘢其身青硬如石使人目昏昏然無所見多恐悸睡不安寧久不愈令目盲或脫精不出一年禍必至矣白疔其根肺赤疔其根心黃疔其根脾黑疔其根腎青疔其根肝五疔之候最為巨疾不可不察也一四論癰瘡夫癰疽瘡腫之作者皆五臟六腑蓄毒不流非獨因營衛壅塞而發者也其行也有處其主也有歸假令發於喉舌者心之毒發於皮毛者肺之毒發於肌肉者脾之毒發於骨體者腎之毒發於下者陰之毒發於上者陽之毒發於外者六腑之毒發於內者五臟之毒故內曰壞外曰潰上曰從下曰逆發於上者得之速發於下者得之緩感於六腑則易治感於五臟則難瘳也又近骨者多冷近虛者多熱近骨者久不愈則化成血蠱近虛者久不愈則傳氣成漏成蠱則多癢少痛或先癢後痛生漏則多痛少癢或不痛不癢內虛外實者多痛少癢血不止則多死膿疾潰則多生或吐逆無度飲食不時皆癰疽之使然種候萬端要在明詳耳一四一論腳弱狀候不同人病腳氣與氣腳有異者即邪毒從內而注入腳者名曰腳氣風寒暑濕邪毒之氣從外而入於腳膝者名氣腳也皆以邪奪其正使人病形頗相類似其於治療亦有上下先後若不察其理無由致其瘳也又喜怒憂思寒熱毒邪之氣流入肢節或注於膝腳其狀類諸風歷節偏枯癰腫之證但入並腳膝者謂之氣腳若從外入足入臟者謂之腳氣腳氣者先治外而次治內實者利之虛者益之又病腳氣多者何也謂人之心肺二經起於手脾腎肝三經起於足手則清邪中之足則濁邪中之人身之苦者手足耳而足則最重艱苦故風寒暑濕之氣多中於足以此腳氣病多也然而得之也以漸始誤於不明醫家不視為腳氣而目為別疾治療不明因循至大身居厄矣本從微起漸成巨候流入臟腑傷於四肢頭項腹背未甚終不能知覺也時因地而作或如傷寒或如中暑或腹背疼痛或肢節不仁或語言錯亂或精神昏昧或時喘乏或暴盲聾或飲食不入或臟腑不通或攣急不遂或舒緩不收或口眼牽搐或手足顫震種種多狀莫有達者故使愚俗束手受病死無告療仁者見之豈不傷哉今始述本末略示後學如醉入房中飽眠露下當風取涼對月貪歡沐浴未乾而熟睡房室才罷而衝風久立於低濕久佇於水濕冒雨而行清寒而寢勞傷汗出食欲悲生犯諸所禁因成疾矣其於不正之氣中於上則害於頭目害於中則蠱於心腹形於下則失於腰腳及於旁則妨於肢節千狀萬證皆屬氣腳起於腳膝乃謂腳氣也形候脈理亦在詳明其脈浮而弦者起於風濡而弱者起於濕洪而數者起於熱遲而澀者起於寒滑而微者起於虛牢而堅者起於實在於上則由於上在於下則發於下在於中則發於中結則因氣散則因憂聚則因怒細則因悲風者汗而愈濕者溫而愈熱者解而愈寒者熨而愈虛則補之實則瀉之氣則流之憂則寬之怒則悅之悲則和之能通斯方謂之良醫腳氣之病傳於心肝十死不治入於心則恍惚妄謬嘔吐食不入眠不安定左手寸口脈乍大乍小乍有乍無者是也入腎即腰腳俱腫小便不通呻吟不絕目額皆黑色時上衝胸腹而喘其左尺中脈絕者是也切宜明審矣一四二論水腫生死脈證人生百病最難者莫出於水水者腎之制也腎者人之本也腎氣壯則水還於腎虛則水散於皮又三焦壅塞營衛閉格血氣不從虛實交變水隨氣流故為水病有腫於頭目與腫於腰腳腫於四肢腫於雙目者有因嗽而得者有因勞而生者有因凝滯而起者有因虛而成者有因五臟而出者有因六腑而來者類皆多種狀各不同所以難治由此百狀人雖曉達縱曉其端則又人以驕恣不循理法冒犯禁忌弗能備矣故人中水疾死者多矣水有十名一曰青水二曰赤水三曰黃水四曰白水五曰黑水六曰玄水七曰風水八曰石水九曰暴水十曰氣水青水者其根起於肝其狀先從面腫而漸行於一身赤水者其根起於心其狀先從胸腫起黃水者其根起於脾其狀先從腹腫起白水者其根起於肺先從腳腫而上氣喘嗽黑水者其根起於腎其狀先從足趺腫玄水者其根在膽其狀先從面腫至足者是也風水者其根在胃其狀先從四肢腫起石水者其根在膀胱其狀小腹腫大是也暴水者其根在小腸其狀先從腹脹而四肢不腫漸漸而腫也氣水者其根在腸乍來乍去乍衰乍盛者是也良由上下不通關竊不利氣血痞格陰陽不調而致其脈洪大者死久不愈之病令人患水氣臨時發散歸五臟六腑則主為病也消渴者因冒風沖熱飢飽失常飲酒過量嗜欲傷頻或服藥石久而積成使之然也一四三論淋瀝小便不利諸淋與小便不利者五臟不通六腑不和三焦痞澀營衛耗失冒熱飲酒過醉入房竭散精神勞傷血氣或因色興而敗精不出或因迷寵而真髓多輸或驚惶不定或憂思不寧或飢飽過時或奔馳不定或癮忍大小便或寒入膀胱或發泄久興或暑中胞囊傷於茲不慎致起斯疾狀候變異者名亦不同則有冷熱氣勞膏砂虛實之種耳冷者小便數而色白如泔也熱者小便澀而赤色如血也氣者臍腹滿悶小便不通利而痛也勞者小便淋漓不絕如水滴漏而不斷絕也膏者小便中出物如脂膏也砂者臍腹隱痛小便難其痛不可須臾忍小便中有砂石有大如皂角子色澤赤或白不定此由腎氣強貪於女色閉而不泄泄而不止虛傷真氣邪熱漸弱結聚成砂又如煮鹽火大水小鹽漸成石之類八淋之中惟此最為危矣其脈盛大而實者可治虛小而濕者不可治虛者腎與膀胱俱虛精滑夢泄小便不禁實者謂經絡閉塞水道不利莖痛腿痠也又諸淋之病與脈相從者活反者死凶治療之際亦在詳酌耳一四四論古今藥餌得失古之與今所施藥餌有得有失者蓋以其宜不宜也或草或木或金或石或單方得力或群隊獲功或金石毒而致死或因以長生其驗不一者何也基本實者得宣通之性必延其命基本虛者得補益之情必長其年虛而過泄實而更增千死其千萬歿其萬則決矣有年少富盛之人恃有學力恣其酒欲誇弄其術暗使精神內損藥力扶持忽然疾作何能救療如是者豈止災之內發但恐藥餌無功實可嘆哉果能久明方書熟審其宜人藥相合效豈妄乎假如臟不足則養其臟腑有餘則瀉其腑外實在理外內虛則養內上塞而引上下塞而通下中澀則解中左通則治左右病則治右上下左右內外虛實各稱其法安有橫夭者乎一四五論三痞金石草木皆可以不死有驗無驗在有志無志也雖能久服而又其藥熱壅塞而不散或上或下或否或澀各有其候如頭眩目昏面赤心悸肢節痛前後不仁多痰短氣懼火喜寒又狀若中風之類是為上痞又如腸滿脹四肢倦行立艱食以嘔多冒昧減飲食或渴者是名中痞又如小便不利臍下滿硬語言謇滯腰痛腳重不能立是名下痞是宜審明情狀慎為用餌耳一四六論各種療治宜因病而施夫病有宜湯宜丸宜散宜下宜吐宜汗宜補宜灸宜針宜按摩宜導引宜蒸熨宜暖洗宜悅愉宜和緩宜水宜火等之分若非良善精博難為取愈庸下淺識亂投湯丸汗下補吐動使交錯輕者令重重者令死舉世皆然蓋湯可以滌盪臟腑開通經絡調品陰陽祛分邪惡潤澤枯朽悅養皮膚養氣力助困竭莫離於湯也丸可以逐風冷破堅症消積聚進飲食舒營衛定開竅緩緩然參合無出於丸也散者能祛風邪暑濕之氣攄寒溫濕濁之毒發散四肢之壅滯除剪五臟之結狀關腸和胃行脈通經莫過於散也下則疏豁閉塞補則益助虛乏灸則起陰通陽針則行營行衛導引則可以逐客邪於關節按摩則可以驅浮淫於肌肉蒸熨避冷暖洗生陽悅愉爽神和緩安氣若實而不下使人心腹脹滿煩亂鼓腫若虛而不補則使人氣血消散肌肉耗亡精神脫失志意昏迷可汗而不汗則使毛孔閉塞關絕而終合吐而不吐則使結胸上喘水食不入而死當灸而不灸則使人冷氣重凝陰毒內聚厥氣上衝分隊不散以致消減當針而不針則使人營衛不行經絡不利邪漸勝真冒昧而昏宜導引而不導引則使人邪侵關節固結難通宜按摩而不按摩則使人淫隨肌肉久留未消宜蒸熨而不蒸熨則使人冷氣潛伏漸成痹厥宜暖洗而不暖洗則使人陽氣不行陰邪相害不當下而下則使人開腸蕩胃洞泄不禁不當汗而汗則令人肌肉消絕津液枯耗不當吐而吐則使人心神煩亂臟腑奔沖不當灸而灸則使人重傷經絡內蓄痰毒反害於中和致於不可救不當針而針則使人氣血散失機關細縮不當導引而導引則使人真氣勞敗邪氣妄行不當按摩而按摩則使人肌肉䐜脹筋骨舒張不當蒸熨而蒸熨則使人陽氣偏行陰氣內聚不當暖洗而暖洗則使人濕灼皮膚熱生肌體不當悅愉而悅愉則使人神失氣消精神不快不當和緩而和緩則使人氣停意折健忘傷志大凡治療要合其宜脈狀病候略陳於後凡脈不緊數則勿發其汗脈不疾數不可以下心胸不閉尺脈微弱不可以吐關節不急營衛不壅不可以針陰氣不盛陽氣不衰勿灸內無客邪勿導引外無淫氣勿按摩皮膚勿痹勿蒸熨肌肉不寒勿暖洗神不凝迷勿悅愉氣不奔急勿和緩順此者生逆此者死耳一四七論診雜病必死脈候夫人生氣健壯者外色光華內脈平調五臟六腑之氣消耗則脈無所依色無所澤如是者百無一生雖能飲食行立而端然不誤不知死之逼矣為少具大法列之於後病證目引水心下牢滿其脈濡而微者死病吐衄瀉血其脈浮大牢數者死病妄言身熱手足冷其脈細微者死病大泄不止其脈緊大而滑者死病頭目痛其脈澀短者死病腹中痛其脈浮大而長者死病腹痛而喘其脈滑而利數而緊者死病四逆者其脈浮大而短者死病耳無聞其脈浮大而澀者死病惱痛其脈緩而大者死左痛右痛上痛下痛者死下痛而脈病者死病厥逆呼之不應脈絕者死病人脈宜大反小者死肥人脈細欲絕者死瘦人脈躁者死人脈本滑利而反澀者死人脈本長而反短者死人尺脈上應寸口太遲者死溫病三四日未汗脈太疾者死溫病脈細微而往來不快胸中閉者死溫病發熱甚脈反小者死病甚脈往來不調者死溫病腹中痛下利者死溫病汗不出出不至足者死病瘧腰脊強急瘛瘲者死病心腹脹滿痛不止脈堅大洪者死痢血不止身熱脈數者死病脹滿四逆脈長者死熱病七八日汗當出反不出脈絕者死熱病七八日不汗躁狂口舌焦黑脈反細弱者死熱病未汗出而脈大盛者死熱病汗出脈未盡往來轉大者死病咳嗽脈數身瘦者死暴咳嗽脈散者死病咳形肥脈急甚者死病嗽而嘔便滑不禁脈弦欲絕者死病諸咳喘脈沉而浮者死病上氣脈數者死病肌熱形瘦脫肛熱不去脈甚緊急者死病腸癖轉筋脈極數者死病中風痿厥不仁脈緊急者死病上喘氣急四匝脈澀者死病寒熱瘛瘲脈大者死病金瘡血不止脈大者死病墜損內傷脈小弱者死病傷寒身熱甚脈反小者死病厥逆汗出脈虛而緩者死病洞泄不下食脈急者死病腸澼下白膿者死病腸澼下膿血脈懸絕者死病腸澼下膿血身有寒脈絕者死病咳嗽脈沉堅者死病腸中有積聚脈虛弱者死病水氣脈微而小者死病水脹如鼓脈小澀者死病泄注脈浮大而滑者死病內外俱虛臥不得安身冷脈細微嘔則不食者死病冷氣上攻脈逆而澀者死卒病脈堅而細微者死熱病三五日頭痛身熱食如故脈直而疾者八日死久病脈實者死又虛緩虛微滑弦急者死卒病脈弦而數者死凡此凶脈十死十百死百不可治也一四八論察聲色形證決死法凡人五臟六腑營衛關竅宜平生氣血順度循環無終是為不病之本若有缺絕則禍必來矣要在臨病之時存神內想息氣內觀心不妄視著意精察方能通神明探幽微斷死決生千無一誤死之徵兆具之於後黑色起於耳目鼻上漸入於口者死赤色見於耳目額者五日死黑白色入口鼻目中者五日死黑或如馬肝色望之如青近則如黑者死張口如魚出氣不反者死循摸衣縫者死妄語錯亂及不能語者死熱病即不死口臭不可近者死面目直視者死肩息者一日死面青人中反者三日死面無光牙齒黑者死面青目黑者死面白目黑者十日死面赤眼黃即時死面黑目白者八日死面青目黃者五日死眉系傾者七日死齒忽黑色者三十日死髮直者十五日死遺尿不覺者五六日死唇口乍乾黑者死爪中青黑者死頭目久痛卒視不明者死舌卷卵縮者死面黑直視者死面青目白者死面黃目白者死面目俱白者死面目青黑者死面青唇黑者死發如麻喜怒不調者死發眉如衝起者死面色黑脅滿不能反側者死面色蒼黑卒腫者死掌腫無紋臍腫出囊莖俱腫者死手足爪甲肉黑色者死汗出不流者死唇反人中滿者死陰陽俱絕目眶陷者死五臟內外絕神氣不守其聲嘶者死陽絕陰結精神恍惚撮空裂衣者死陰陽俱閉失音者死營衛耗散面目浮腫者死心絕肩息回盼目直者死肺絕則氣去不返口如魚口者三日死骨絕腰脊痛腎中重不可反側足膝後平者五日死腎絕大便赤澀下血耳干腳浮舌腫者六日死又足腫者九日死脾絕口冷足腫脹泄不覺者十二日死筋絕魂驚虛恐手足爪甲青呼罵不休者八九日死肝絕汗出如水恐懼不安伏臥目直面青者八日死又曰即時死胃絕齒落面黃者七日死又十日死
