body:
  text: 卷十九華他獸醫科神方一九一華他治牛疫神方牛疫感傳極烈一牛染病則附近之牛必相繼倒斃其候如牛低頭垂耳食量減少氣喘發驚涕泗交流糞便初則燥結繼則泄瀉口內有腐爛斑痕即為有疫之證急於牛欄中燒真安息香牛吸其香即愈或取獺屎三升以沸湯淋取汁二升灌之即愈惟上二藥均極難得故常用之藥為牙皂細辛川烏頭草烏頭雄黃上五味藥等分共研為末另加麝香少許吹入牛鼻中五六分即愈一九二華他治牛腹脹神方牛如誤食地膽蟲或吞苜蓿草腹脹滿欲死急研大麻子取汁乘熱灌入五六升即愈一九三華他治牛狂神方牛發狂疾則膽大放奔逢人即以角觸抵急用大黃黃連各五錢共為末以雞子與酒共一升調勻灌之即愈一九四華他治牛疥神方黑豆水煮去滓取汁洗五六次即愈或以蕎麥燒灰淋汁入明礬一合塗之亦效一九五華他治牛抵觸腸出神方硇砂一大兩乾薑二小兩共為末塗損處腸即自入若腸幹不入宜割去幹處訖用粟殼葉為末敷之一九六華他治牛前蹄病神方乳香三錢龍骨六錢五分黃丹三錢五分麝香三分硼砂五分人發灰少許上共搗末香油調敷一九七華他治牛喉風神方知母貝母黃芩大黃甘草荊芥枝子栝蔞川芎牙硝白礬朴硝雄黃上十三味等分為末每服二兩用蜜水二升同調灌之一九八華他治馬傷蹄神方大黃五靈脂木鱉子去油海桐皮甘草土黃蕓薹子白芥子上等分為末以黃米粥調藥攤帛上包之一九九華他治馬流沫神方當歸白朮菖蒲澤瀉赤石脂枳殼厚朴甘草上等分共為末每一兩半加酒一升蔥三握同水煎溫灌一九一華他治馬急黃黑汗神方大黃當歸各一兩鹽半升以水三升煎取半升分兩度灌口如不定破尾尖血出即止一九一一華他治馬後冷神方豉蔥薑各一兩水五升煮取半升和酒灌之即瘥一九一二華他治馬脊瘡神方黃丹調油敷之避風立瘥一九一三華他治馬疥神方雄黃頭髮臘月豬脂上以前二藥煮於豬脂中至發消為度趁熱擦之極效或用生胡麻葉搗汁灌之亦效又蕎麥杆燒灰淋汁洗之或藜蘆為末以水調敷均效一九一四華他治馬癩病神方硫黃大黃巴豆去油塌灰上各等分研末將蘇子油熬沸下前藥即取起候冷以鯪鯉甲刮破患處塗之極效一九一五華他治馬目暈神方霜後干楮葉細研為末日兩度管吹眼中瘥一九一六華他治馬胞轉及腸結神方細辛防風芍藥各一兩鹽一升上以水五升煮取二升半去滓分二度灌一九一七華他治馬肺熱神方大黃黃芩芍藥細辛各一兩上以水五升煮取二升半再以油酒各半升調和分三度灌口如不定加鹽半升水一升半溫如人肌灌後即定一九一八華他治馬翻胃神方益智仁肉豆蔻五味子廣木香檳榔草果細辛青皮當歸厚朴川芎官桂甘草砂仁白朮芍藥白芷枳殼木香上各等分每服兩半加棗五枚薑五片苦酒五斤同煎三沸候溫灌之一九一九華他治馬胎動神方白朮當歸人參甘草川芎砂仁熟地黃各二錢陳皮一錢黃芩二錢白芍藥炒阿膠各六錢紫蘇一錢上每服一兩五錢加生薑五片水一小桶同煎五沸候溫灌之一九二華他治羊疥癬神方本症最易感染輕則皮毛脫落重則發生他疾有害生命治用水銀一分豬脂三分鉢中研合之至不見水銀為度臨用再加豬脂二斤塗於患處或以藜蘆根捶碎漬米泔汁中裝入容器中密閉之置熱灶間俟其味酸先以瓷片刮患處令赤用湯洗之去瘡甲拭乾以藥塗之兩次即愈一九二一華他治羊疫神方治法同於牛疫一九二二華他治豬疫神方大黃朴硝各五錢共煎湯傾出候溫竹筒灌下即愈或以貫衆三兩豬牙皂二兩水三四碗煎三四十沸再加朴硝末三兩煎二三沸候溫灌下亦效亦可用治羊疫法治之一九二三華他治一切豬病神方凡豬患病可割去尾尖血出自愈一九二四華他治犬疥神方蛇皮燒灰和粥與食立愈一九二五華他治犬癩病神方犬生此病則毛脫而惡臭可用大蜈蚣一條拌飯中令食不久即愈或以硫黃納豬腸中與食尤效一九二六華他治犬跌打傷神方凡犬被跌打傷而死者即著土置之逾時即能更生一九二七華他除犬蠅神方以香油遍擦全身即愈一九二八華他治貓一切病神方貓患諸病可用烏藥磨水灌之即愈一九二九華他治貓癩病神方以百部煎湯遍塗患處極效或如治犬法施之亦極效一九三華他治貓被踏傷神方急用蘇木煎湯洗其傷處或乘溫灌之自能漸愈一九三一華他治貓死胎不下神方芒硝二錢以童子小便乘溫灌下自下一九三二華他治雞病神方以香麻油灌之即愈一九三三華他治雞疫神方以巴豆數粒切成小片飼之一瀉即愈或以緑豆粉水和成條飼之數次即愈一九三四華他治鵝鴨疫病神方即將其左翅上黑筋一條以針刺出黑血以米和油飼即愈一九三五華他閹豕祕方凡豕經閹割後則性靜而易馴且發育亦較易其期以春秋二季為佳牝牡閹法述如下一牡豕閹法凡牡豕未逾四十二日者即可自其腎囊底部割之摘取其腎子並將其筋割斷若已逾四十二日宜以線系其筋於傷口之處至豕之已逾二三年以上者則宜先縛其四足一人將其全身壓住一人以左手握腎囊右手操刀自囊下割開取出腎子並割斷其筋其傷口亟以兩指合之則易於平復更有一法先用蠟線將腎囊勒之使緊俾血脈不通數日之後其腎囊與子自能脫落惟小豕未滿四十二日者則不能用此法且施術時宜敏捷否則豕有腫痛之患又或所用之線太粗或結扎不緊或腎子有少許為線所扎皆足貽害二牝豕閹法先以一二人將豕壓在左邊使不得動閹者乃於豕腰間用刀割之輕出其右側之腸將線扎完急用鈍刀割之或以手撕去其生腸即將與生腸相連之物納入腸內原處線縫創口或以油少許塗之左側生腸亦如前法行之施術既畢可即將豕放去一九三六華他閹馬牛羊祕法閹法與前項大略相同惟僅閹牡獸牝獸則不可閹其閹割時期亦隨其類而異大抵馬生後一年至半年牛生後六月至九月羊生後一月過遲恐有妨生命施術者不可不留意也一九三七華他閹雞祕法公雞生後二三月即可閹割閹割之前自朝至暮宜先令絶食然後緊縛兩翅置雞身於閹割臺上臺以竹木製之有樞機能固定雞身使不得動乃於其末一肋骨之前去毛縱剖之約寸許取出其腎子縫其傷口釋使安居巢中越日即如常
