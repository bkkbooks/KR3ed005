body:
  text: 卷六華佗婦科神方六一華佗治月經不通神方桃仁朴硝牡丹射干土瓜根黃芩各三兩芍藥大黃柴胡各四兩牛膝桂心各二兩水蛭虻蟲各七十枚上十三味以水九升煮取二升去滓分三服六二華佗治室女經閉神方黃芩牡丹桃仁瞿麥芎藭各二兩芍藥枳實射干海藻大黃各三兩虻蟲七十枚蠐螬十枚水蛭五十枚上以水一斗煮取三升分三服服兩劑後灸乳下一寸黑圓際各五十壯六三華佗治月經不調神方用白毛烏骨牡雞一隻糯米喂七日勿令食蟲蟻野食以繩縊死去毛與腸以生地黃熟地黃天門冬麥門冬各二兩納雞腹以陳酒入陶器煮使爛取出去藥桑柴火焙至焦枯搗末再加杜仲炒二兩人參甘草炙肉蓯蓉補骨脂茴香砂仁各一兩川芎白朮丹參當歸各二兩香附四兩上以醋浸三日後焙乾研末和前藥酒調麵糊為丸空腹溫酒下五十丸六四華佗治經行不止神方金毛狗脊去黃毛威靈仙良薑赤芍藥各一兩熟艾二兩醋熬焙乾為末附子炮半兩上共為末以藥一半同醋煮麵糊和餘一半藥末為丸如桐子大每服十丸食前空腹溫酒下六五華佗治月經逆行神方犀角白芍丹皮枳實各一錢黃芩橘皮百草霜桔梗各八分生地一錢甘草三分水二升煎取八合空腹服下數劑自愈又或以茅草根搗汁濃磨沉香服五錢並用釅醋貯瓶內火上炙熱氣衝兩鼻孔血自能下降六六華佗治痛經神方婦人行經時腹痛如絞謂之痛經其症有鬱熱與虛寒之異鬱熱者宜用黃連酒煮八兩香附炒六兩五靈脂半炒半生三兩當歸尾二兩上搗篩粥為丸空腹湯下三四錢服久自愈若系虛寒則用人參黃耆當歸白朮各一兩肉桂一錢附子炮一枚水煎服至二三十劑當愈六七華佗治經前腹痛神方當歸尾川芎赤芍丹皮香附制元胡索各一錢生地黃紅花各五分桃仁二十五粒水煎服瘠體加黃芩黃連各一錢肥體加枳殼蒼朮各一錢六八華佗治經後腹痛神方人參香附白朮醋炒茯苓當歸川芎白芍生地黃各一錢甘草炙木香各五分青皮七分薑棗為引水煎服六九華佗治經來嘔吐神方白朮一錢丁香乾薑各五分上搗篩為散空腹米湯下六一華佗治經來色綠神方附子三錢鹿茸一錢山藥肉蓯蓉肉桂蒲黃炒當歸萸肉各五錢白芍一兩熟地一兩五錢烏骨雞肉去皮油酒蒸三兩共搗米糊為丸空腹酒下一百丸六一一華佗治經來色黃神方當歸烏藥川芎元胡索茴香白芍各八錢熟地黃一錢薑棗引水煎空腹服六一二華佗治經來色紫神方當歸尾川芎赤芍香附生地黃黃連丹皮甘草各一錢水煎服六一三華佗治經來色淡神方人參白朮茯苓歸身川芎熟地黃黃耆炙香附制各一錢甘草炙五分薑棗引水煎服六一四華佗治經來聲啞神方生地黃天門冬肉蓯蓉當歸各五錢細辛五分水煎服頗效六一五華佗治經來房室相撞神方本症俗名撞紅以明雄黃水飛淨三錢陳酒沖服一次即愈六一六華佗治崩中神方婦人崩中晝夜十數行各藥不效宜急用芎藭八兩以酒四升煎取三升分三服不飲酒者水煮亦得六一七華佗治白崩中神方芎藭阿膠炙桂心赤石脂小薊根各二兩乾地黃四兩伏龍肝雞子大七枚上以酒六升水四升煮取三升去滓納膠令烊分三服日三六一八華佗治崩中去血神方龍骨赤石脂各六分烏賊魚骨牡蠣粉肉蓯蓉各五兩鱉甲炙芍藥續斷各八分上搗散飲服方寸匕日三漸加之六一九華佗治崩中赤白不絕困篤神方禹餘糧五兩白馬蹄十兩龍骨三兩鹿茸二兩烏賊骨一兩上搗末蜜丸梧子大酒下二十丸日再以知為度按本文惟久崩困篤者宜之若瘀血固結小腹堅滿者則又未可輕試之孫思邈注六二華佗治漏下不止神方鹿茸阿膠各三兩烏賊骨當歸各二兩蒲黃一兩上制下篩空腹酒服方寸匕日三夜二六二一華佗治漏下去赤神方白朮二兩黃柏二兩半白薇五錢上制下篩空腹酒下方寸匕日三六二二華佗治漏下去黃神方黃連大黃桂心各五錢黃芩䗪蟲乾地黃各六錢上制下篩空腹酒下方寸匕日三六二三華佗治漏下去青神方大黃黃芩白薇各五錢桂心牡蠣各六錢上制下篩空腹酒下方寸匕日三六二四華佗治漏下去白神方鹿茸一兩白蘞十八株狗脊半兩上制下篩空腹米飲下方寸匕日三六二五華佗治帶下神方枸杞一升生地黃五升以酒一斗煮取五升分三服六二六華佗治赤白帶下神方禹餘糧當歸芎藭各一兩半赤石脂白石脂阿膠龍骨石葦各一兩六錢烏賊骨黃柏白蘞黃芩續斷桑耳牡蠣各一兩上為末蜜丸梧子大空腹飲下十五丸日再加至三十丸為度六二七華佗治白帶神方冬朮五錢茯苓紅雞冠花各三錢車前子一錢五分水煎服六二八華佗治白濁神方陳皮半夏制茯苓白朮益智仁鹽水炒研蒼朮各一錢升麻柴胡各七分甘草炙五分生薑五片上以水煎服六二九華佗治白淫神方是為男精射入後不能攝收即隨小便而出者用風化石灰一兩茯苓三兩研末糊丸如梧子大空腹米飲下二三十丸六三華佗治白沃神方婦女經水不利子臟堅僻中有乾血即下白物如漿是名白沃以礬石燒杏仁各一分搗末蜜和丸棗核大納子臟中日一易六三一華佗治帶下有膿神方白芍白礬各五錢白芷一兩單葉紅蜀葵二兩上為末蠟和丸梧子大空腹及食前各服十丸膿儘自愈六三二華佗治婦人不孕神方凡婦人立身已來全不生產及斷續久不生產三十年者服此必能生子方用朴硝牡丹當歸大黃桃仁各三銖厚朴桔梗人參茯苓桂心甘草牛膝橘皮各二銖附子六銖虻蟲水蛭各十銖上以清酒水各五升合煮取三升日三夜一分四服每服相去三時更服如常覆衣取少汗在冬日叮著火籠子必下積血及冷赤膿如赤小豆汁本為婦人子宮內有此惡物使然是為冷血能使不受胎故必忍之使此冷血下盡始良方乃以皂莢萸肉當歸各一兩細辛五味子乾薑各二兩大黃礬石戎鹽蜀椒各五錢上為末以絹制袋大如指長三寸盛藥令滿納婦人陰中坐臥任便勿急於行走小便時去之則一日以後必下青黃冷汁可幸御自有子若未見病出亦可安之十日並用紫石英天門冬各三兩當歸芎藭紫葳卷柏桂心烏頭乾地黃牡荊禹餘糧石斛辛夷人參桑寄生續斷細辛厚朴乾薑食茱萸牡丹牛膝各三十銖柏子仁薯蕷烏賊骨甘草各一兩半上二十六味為末蜜和丸如梧子大酒服十丸日三漸漸增三十丸以腹中熱為度不禁房室夫行不在不可服六三三華佗治婦人黃瘕神方本症之原因為婦人月水始下若新傷墜血氣未止臥寢未定臟腑虛弱因向大風便利是生黃瘕其候四肢寒熱身重淋露臥不欲食左肋下有氣結牢腰背相引痛月水不利善令人不產治用皂莢炙去皮子蜀椒各一兩細辛六分上搗散以三角囊大如指長二寸貯之取納陰中悶則出之已則復納之惡血畢出乃洗以溫湯三日勿近男子六三四華佗治婦人青瘕神方本症之原因為婦人新生未滿十日起行以湯浣洗太早陰陽虛玉門四邊皆解散又或當風睡臥及居濕地及濕席不自謹慎能令惡血不除結熱不得散則生青瘕其候左右脅下有氣喜唾不可多食四肢不欲動搖恍惚善夢手足腫面目黃大小便難令人少子治用戎鹽一升皂莢炙去皮子五錢細辛一兩六錢上搗散以三角囊大如指長三寸貯之納陰中但臥瘕當下青如葵汁六三五華佗治婦人燥瘕神方本症原因為婦人月水下惡血未盡於暑月中疾走或操勞致氣急汗流遂令月水與氣俱不通利其候在腹中有物大如杯能上下流動時欲嘔吐臥時多盜汗足酸不耐久立小便失時忽然自出若失精小便澀難有此病亦令人少子治用大黃如雞子大一枚乾薑二兩雞膍胵中黃胰炙一枚黃連二兩桂心一隻䗪蟲三枚厚朴炙十銖郁李仁去皮尖熬一兩上搗散空腹以溫酒一盞和三錢匕頓服瘕當下三日內勿近男子六三六華佗治婦人血瘕神方本症原因為婦人月水新下未滿日數而中止因飲食過度五穀氣甚溢入他臟血下走於腸胃之間流落不去內有寒熱與月水會合是生血瘕其候腰痛不可俯仰橫脅下有積氣牢如石少腹背膂腰股皆痛陰里若生子月水不時令人無子治用乾薑烏賊骨炙各一兩桃仁去皮尖熬一兩上搗散酒下二方寸匕日二並用大黃當歸各半分山茱萸皂莢去皮子炙各一兩細辛戎鹽各二十六銖上搗散以香脂為丸如指大以綿裹納陰中正坐良久瘕當下養如乳婦之法六三七華佗治婦人脂瘕神方本症原因為婦人月水新下或生未滿三十日其人未復以合陰陽遂生脂瘕其候四肢腫滿痛痹腰背如刺腹中切痛時或頭眩月水不時大小便血不止令人無子治用皂莢去皮子十八銖礬子燒六銖五味子蜀椒細辛乾薑各半兩上搗散以香脂和如大豆著男子陰頭以合陰陽不三行其瘕乃愈六三八華佗治婦女狐瘕神方本症之原為婦人月水當日數來而反悲哀自恐或遠行逢暴風疾雷電驚恐被濕罷倦少氣精神遊亡邪氣入於陰里不去是生狐瘕其害能食人子臟令人月水閉而不通胞門子戶不受男精狀似有身嗜食多嘔患此者終生無子治用新死鼠一枚裹以新絮塗以黃土穿地埋鼠其中以桑薪灼其土一日夜取出去絮納桂心末六銖酒服二方寸匕病當下甚者不過再服瘥止六三九華佗治婦女蛇瘕神方本症之原為婦女月水已下新止適閉未復胞門子戶勞動陰陽未平營衛分行若中風暴病或起行當風或坐濕地或行遠道並飲汙井之水進不潔之食使蛇鼠之精吞入腹中是生蛇瘕其患能上食人之肝心越時既多腰背股脛俱痛時發寒熱月水多寡不定患此者不復生子治用大黃黃芩芒硝各半兩甘草炙大如指者一尺烏賊骨二枚皂莢去皮子尖六枚上以水六升煮之三沸去滓下硝適寒溫空腹服之當下六四華佗治婦女鱉瘕神方本症之原為婦人月水新止其人劇作罷勞汗出衣服濕潤不以時去之或當風睡臥足踐濕地或入水洗浴不以時出神不守舍則水氣與邪氣乘之是生鱉瘕其候少腹內切痛有物如小杯左右上下於腹中若存若亡腰背亦痛月水不通面目黃黑脫聲少氣患此者令人絕子治用大黃六分乾薑側子各半分附子人參各九銖䗪蟲熬一寸匕桂心一兩六銖細辛土䱉各十八銖白朮一兩上搗散酒下方寸匕日三瘕自下六四一華佗轉女為男神方凡婦人始覺有孕急服此方能轉女為男並得安胎丹參川斷芍藥白膠白朮柏子仁甘草各二兩人參芎藭乾薑各三十銖吳茱萸橘皮當歸各一兩十八銖白芷冠纓燒灰各一兩乾地黃一兩半蕪荑十八銖犬卵干一具東門上雄雞頭一枚上為末蜜和丸梧子大酒下十丸日再稍加至二十丸又以斧一柄置產婦臥床下仍系刃向下勿令人知並取雄黃一兩絳囊盛帶之需女者帶雌黃六四二華佗治斷產神方蠶子故紙一方燒為末酒服之終身不產或以油煎水銀一日忽息空服棗大一丸永斷不損人若已有身欲去之可用栝蔞桂心各三兩豉一升以水四升煎一升半分服之六四三華佗治乳癰神方患者乳房脹大堅硬色現赤紫衣不得近痛不可忍治用大黃芍藥枳實馬蹄炙令黃上四味各等分為末酒服方寸匕覆取汗當睡著覺後腫處散不痛經宿乃消百無失一明晨更服一匕忌衝風寒食六四四華佗治乳岩神方本病初起時用鮮蒲公英連根葉搗汁酒沖服隨飲蔥湯覆被臥令取汗當愈如已潰爛宜用蜂房雄鼠矢川楝子各等分瓦煅存性為末擦之內用大栝蔞多子者佳一枚當歸五錢甘草四錢沒藥三錢乳香一錢以陳酒二碗煎八分溫服或去當歸加皂角刺一兩六錢效尤速將愈加參耆芎術以培其元六四五華佗治乳癤神方取水仙之已萎者懸檐下風乾搗爛敷之極效六四六華佗治乳腫神方桂心甘草各二分烏頭炮一分共為末和苦酒塗紙覆之膿既化為水極神效六四七華佗治乳吹神方凡妊娠未產而乳房腫痛曰乳吹治用砂仁五分研冬葵子八分研蒲公英五錢栝蔞仁三錢水煎服外用生南星為末溫水調敷六四八華佗治妒乳神方婦人產後宜勤擠乳否則令乳汁蓄積或產後不自飲兒及失兒無兒飲乳皆成妒乳治用連翹升麻杏仁去皮尖射干防己黃芩大黃芒硝柴胡各三兩芍藥甘草炙各四兩上以水九升煮取三升分服外用槲皮水煎湯洗患部極效六四九華佗治乳上濕瘡神方露蜂房五錢輕粉煅五分龍腦一分共研末以金銀花煎汁調塗日三四次自效六五華佗治乳頭破裂神方龜板炙三錢龍腦五分研極細香油調搽六五一華佗治乳汁不下神方鯽魚長七寸一尾豚脂半斤漏蘆石鐘乳各八兩上以清酒一斗二升合煮魚熟藥成絞去滓適寒溫分五服其間相去須臾一飲令藥力相及為佳乳即下六五二華佗治無乳汁神方母豬蹄四枚土瓜根通草漏蘆各三兩先將蹄洗淨以水二斗煮取一斗去蹄納諸藥其中煮取六升去滓內蔥白豉著少米煮作稀粥食後覺微熱有汗佳若仍無乳更兩三劑六五三華佗治乳汁過少神方豬蹄四枚黃耆八兩乾地黃當歸川斷各四兩牛膝二兩同煮絞濃汁入蜜四兩熬如飴每溫酒服一匙乳汁自能增多六五四華佗治乳汁過多神方麥芽炒三錢煎濃汁飲之日凡一次乳汁自能減少惟不可多服以乳汁減至適量為度六五五華佗治陰脫神方皂莢去皮子炙半夏洗大黃細辛各四分蛇床子六分上搗散薄絹袋盛如指大納陰中日二易內用當歸黃芩牡蠣熬各二兩芍藥一兩半蝟皮一兩上搗散酒下方寸匕日三禁舉重六五六華佗治陰挺神方蜀椒烏梅白芨各二分上搗篩以方寸匕綿裹內陰中入三寸匕中熱明旦更著瘥止六五七華佗治陰吹神方陰吹者因胃氣下泄陰中出聲如大便矢氣之狀連續不絕治用豬膏半斤亂髮如雞子大三枚上合煎之發消藥成分二次服病從小便出六五八華佗治陰痛神方防風三兩大戟二兩蘄艾五兩上以水一斗煮取五升溫洗陰中日可三度良六五九華佗治陰癢神方蚺蛇膽雄黃石硫黃硃砂峭粉思邈按水銀粉即謂峭粉藜蘆蕪荑各二分上搗研極細和勻以豚脂和如泥取故布作篆子如人指長一寸半以藥塗上插孔中日一易易時宜以豬椒根三兩煮湯洗拭乾內藥佳六六華佗治陰腫神方白礬熬一分大黃一分甘草炙半分上搗篩取棗大綿纏導陰中二十日即愈六六一華佗治陰瘡神方芎藭藜蘆雄黃丹砂蜀椒細辛當歸各一分上搗散取方寸匕綿裹納陰中六六二華佗治陰蝕神方蛇床子當歸芍藥甘草各一兩地榆三兩水五升煮二升洗之日三夜二更以蒲黃一升水銀一兩搗研敷其上自愈六六三華佗治陰冷神方吳茱萸納牛膽中令滿陰乾之歷百日後取二十七枚綿裹之齒嚼令碎納陰中良久熱如火惟須日用無止庶克無濟六六四華佗治陰寬神方兔屎乾漆各半兩鼠頭骨二具牝雞肝兩具陰乾百日上為末蜜丸如梧子月初七日合時著一丸陰頭令徐徐內入三日知十日小五十日如十五歲童女六六五華佗治小戶嫁痛神方甘草三兩芍藥半兩生薑十八銖桂心六銖上以酒二升煮三沸去滓盡服神效六六六華佗治交接輒出血神方桂心伏龍肝各二兩共研末酒下方寸匕立止六六七華佗治交接即痛神方黃連一兩半牛膝甘草各一兩以水四升煮取二升洗之日四度六六八華佗治婦人傷於丈夫神方凡婦人傷於丈夫其候四體沉重噓吸頭痛治用香豉蔥白各一升生地黃八兩生薑四兩芍藥三兩甘草二兩上以水七升煮取二升半分三服不瘥重作慎房事六六九華佗治童女交接及他物傷神方患者出血不止急取釜底墨研胡麻敷之或燒繭絮灰塗之或割雞冠取血塗之均效
