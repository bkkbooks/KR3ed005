body:
  text: 卷三華佗神方秘方三一華佗麻沸散神方專治病人腹中癥結或成龜蛇鳥獸之類各藥不效必須割破小腹將前物取出或腦內生蟲必須劈開頭腦將蟲取出則頭風自去服此能令人麻醉忽忽不知人事任人劈破不知痛癢方如下羊躑躅三錢茉莉花根一錢當歸一兩菖蒲三分水煎服一碗三二華佗瓊酥散神方本劑專為癰疽瘡瘍施用刀圭時服之能令人不痛蟾酥一錢半夏六分羊躑躅六分胡椒一錢八分川烏一錢八分川椒一錢八分蓽茇二錢上為末每服半分陳酒調服如欲大開加白酒藥一丸三三華佗整骨麻藥神方本劑專為開取箭頭時服之令人不痛川烏草烏胡茄子羊躑躅麻黃上各等分研為末茶酒任用甘草水解三四華佗外敷麻藥神方本劑專為施割症時外部調敷之用能令人知覺麻木任割不痛川烏尖草烏尖生南星生半夏各五錢胡椒一兩蟾酥四錢蓽茇五錢細辛四錢上研成細末用燒酒調敷三五華佗解麻藥神方施劑以後換皮後三日諸症平服急宜用藥解之使醒人參五錢生甘草三錢陳皮五分半夏一錢白薇一錢菖蒲五分茯苓五錢上藥以水煎成一碗服之即醒三六華佗神膏凡皮膚潰爛欲使之去腐生新及施割後宜急用此膏敷之乳香沒藥血竭兒茶三七各二錢冰片一錢麝香二分熱則加黃連一錢腐則加輕粉一錢有水則加煅龍骨一錢欲速收口則加珍珠一兩或加蟹黃法取圓臍螃蟹蒸熱取黃曬乾收用二錢為末摻用或以前七藥加豚脂半斤蜂蠟一兩稍溫用棉紙拖膏貼癰疽破爛處若系杖傷則三七須倍之三七華佗接骨神方本劑專治跌傷打傷手足折斷惟必先細心湊合端正後以杉木板夾持之不可顧患者之痛楚再以下方使之服下最多二服當愈不必三服也羊躑躅三錢炒大黃三錢當歸三錢芍藥三錢丹皮二錢生地五錢土狗十個捶碎土蝨三十個搗爛紅花三錢先將前藥用酒煎成再加自然銅末一錢連湯服下三八華佗愈風神方本方凡四時諸風俱可用之防風羌活五加皮芍藥人參丹參薏苡仁玄參麥門冬去心乾地黃大黃青木香各六分松子仁磁石各八分檳榔子一錢枳實炙牛膝茯神桂心各八分上為末蜜和為丸如梧子以酒服十五丸日再服稍稍加至三十丸為度忌豬肉魚蒜生蔥酢蕪荑三九華佗通便神方久病之後大便一月不通毋庸著急止補其真陰使精足以生血血足以潤腸大便自出方用熟地玄參當歸各一兩川芎五錢火麻仁一錢大黃一錢桃仁十個紅花三分蜜一碗和水煎服三一華佗灌腸神方大便閉結常用之法為用下劑惟久用則成習性故兼用本法豚膽一具取汁入醋少許取竹筒長三四寸者以半納穀道中將汁灌入一食頃當便又以花椒豆豉水煎用杇根汁麻油泔澱三味合灌之亦下又以桃白皮苦參艾大棗煎灌亦下兼療疳痢及生惡瘡者待施術時藥須微溫勿過熱勿過冷三一一華佗利小便神方利小便藥常品為車前澤瀉等其效濡緩不及用探尿管術之便以蔥葉末端銳部納玉莖孔中深達三寸許以口微吹便自通又以鹽末入蔥吹之令鹽入孔莖中亦通或以豚膀胱一具於開孔處縛鵝羽管吹之脹滿以絲縛紮上孔即以羽管銳端入馬口手壓膀胱令氣自尿管透入膀胱中便自通三一二華佗按摩神術凡人肢節腑臟鬱積而不宣易成八疾一曰風二曰寒三曰暑四曰濕五曰飢六曰飽七曰勞八曰逸凡斯諸疾當未成時當導而宣之使內體鞏固外邪無目而入迨既感受宜相其機官循其腠理用手術按摩疏散之其奏效視湯液丸散神速述如下一兩手相捉紐捩如洗手法二兩手淺相差翻覆向胸三兩手相捉共按䏶左右同四以手如挽五石力弓左右同五兩手相重按䏶徐徐捩身左右同六作拳向前築左右同七作拳卻頓此是開胸法左右同八如拓石法左右同九以手反捶背左右同十雙手據地縮身曲背向上三舉十一兩手抱頭宛轉䏶上此是抽脅十二大坐斜身偏欹如排山左右同十三大坐伸兩腳即以一腳向前虛掣左右同十四兩手拒地回頭此虎視法左右同十五立地反勾身三舉十六兩手急相叉以腳踏手足左右同十七起立以腳前後虛踏左右同十八大坐伸兩腳用當相手勾所伸腳著膝中以手按之左右同上十八法不問老幼日則能依此三遍者一月後百病悉除行及奔馬補益延年能食眼明輕健不復疲乏三一三華佗曼應丸神方本方功用甚大百疾可知如遇結胸油漿水下七丸未動再服積殗食症水下三丸水氣通身腫茯苓湯下五丸隔噎丁香湯下三丸因積成勞鱉魚湯下兩丸腹中一切痛醋湯下七丸小腸痃癖茴香湯下三丸大小便不通蜜湯下五丸心痛茱萸湯下五丸猝死以小便下七丸白痛乾薑湯下一丸赤痢甘草湯下一丸胃冷吐食丁香湯下二丸甘遂三兩芫花三兩大戟二兩巴豆二兩去皮乾漆二兩皂角七挺去皮大黃三兩煨三稜三兩蓬莪朮二兩檳榔一兩木通一兩當歸五兩雷丸一兩黑牽牛五兩桑白皮二兩五靈脂二兩硇砂三兩訶子一兩麵裹煨熟去面澤瀉二兩梔子仁二兩上藥各細銼成末入米醋二升浸三日入銀石器中慢火熬令醋盡焙乾再炒黃黑色存性入下藥木香肉桂陳皮去白丁香青皮去皮肉豆蔻黃耆白朮沒藥附子泡裂去皮臍以上各一兩芍藥川芎白牽牛炒天南星水煮鱉甲裂浸醋炙令黃熟地黃酒浸一宿牡丹皮赤茯苓蕓薹子炒乾薑泡裂去皮以上各二兩上同為末與前藥相合醋糊丸綠豆大修合時須在淨室中運以至誠方驗三一四華佗交藤丸神方本劑功能駐顏長壽祛百疾何首烏即交藤根赤白者佳用一斤茯苓五兩牛膝二兩上末之蜜為丸酒下三十丸忌食豬羊血三一五華佗補心丹神方專治因驚失心或因思慮過當心氣不寧狂言妄語叫呼奔走硃砂一分雄黃一分二物共研白附子一錢為末上拌勻以豬心血為丸如梧子大更別以硃砂為衣每服二丸臨臥用人參菖蒲湯下常服一丸能安魂魄補心氣鎮神靈三一六華佗明目丹神方專治傳屍虛癆肌瘦面黃嘔吐咳嗽不定雄黃五錢兔糞二兩天靈蓋一兩炙鱉甲一分木香五錢輕粉一分上為末製法酒一大升大黃五錢熬膏入前藥為丸彈子大硃砂為衣用時先燒安息香令煙盡吸之不嗽非傳屍也不可用此藥若煙入口嗽而不能禁止乃屍也宜用此藥五更初服勿使人知以童子小便同酒共一盞化為丸服之三一七華佗醉仙丹神方治五官虛氣風寒暑濕之邪蓄積在中久而不散致偏枯不遂麻木不仁麻黃一兩水煮焙乾為末天南星七個炮黑附子三個炮地龍七條去土先將麻黃末入酒一升熬成膏入余藥為丸如彈子大每日食後及臨臥時用酒化一兩服下汗出即效三一八華佗五勝散神方治四時傷寒冒風身熱頭痛昏倦寒痰咳嗽及中滿傷寒三日以前服無不效甘草石膏白朮五味子各一兩乾薑三分炮上同為細末每服以藥二錢加水一盞入生薑兩片棗子一個同煎至七分去滓溫服中滿以鹽煎傷風頭痛加荊芥煎三一九華佗蓽茇散神方治牙痛極神驗草蓽茇木鱉子去殼先研木鱉子令細後入蓽茇同研令勻隨左右鼻內搐之每用一豆許三二華佗絳血丹神方治喉閉極神效硇砂白礬各一大塊如皂大馬牙硝一分硝石四兩黃丹五錢新巴豆六個用粗瓷小碗一個先煨令熱下前四藥次下黃丹次下巴豆須將巴豆先打破逐個旋下候焰盡又下一個入蛇蛻皮一條自然燒化以砂礬成汁候令結硬研成細末每用少許以筆管吹在患處三二一華佗碧雪丹神方治口瘡及咽喉腫痛即含化焰硝二兩生甘草二兩青黛五錢殭蠶五錢上為細末取黃牛膽汁和之令勻裝入膽囊內懸當風處腦月合過百日中用三二二華佗白龍散神方治風毒赤爛眼眶倒睫冷熱淚不止白鱔風一兩銅綠一錢上藥各先研成細末再相合研勻每月半錢百沸湯化開以手指洗眼三二三華佗皂角散神方治五種腸風瀉血下痢糞前有血號外痔糞後有血號內痔大腸不收號脫肛穀道四面有胬肉如乳頭號舉痔頭上有孔號漏痔並皆治之黃牛角一個銼細蛇蛻一條豬牙皂角五個銼細穿山甲上四藥同入瓷瓶內黃泥封固候乾先以小火燒令煙出後用大火煅令通紅為度取出攤冷研成末患者先以胡桃肉一個分作四分取一分於臨臥時研細如糊溫酒送服即睡先引蟲出至五更時再用溫酒調下藥末二錢至辰時更進一服取下惡物永除根本
