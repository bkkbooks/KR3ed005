body:
  text: 卷二華佗臨症神方二一華佗治頭痛身熱要訣表外實下內實忌世治外實多用表劑表則外虛風寒得入而病加劇世治內實多用下劑下則內虛腸胃氣促而肢不暢華先生治府吏倪尋頭痛身熱則下之以其外實也治李延頭痛身熱則汗之以其內實也蓋得外實忌表內實忌下之秘也又按內實則濕火上衝猶地氣之郁正待四散也外實則積垢中留猶山間之水正待下行也其患頭痛身熱同而治法異者雖得之仙秘實本天地之道也余屢試之果屢見效孫思邈注二二華佗治肢煩口乾要訣汗愈不汗死縣吏尹世苦四肢煩口中乾不欲聞人聲小便不利華先生曰試作熱食得汗即愈不汗後三日死即作熱食而汗不出華先生曰臟氣已絕於內當啼泣而絕已而果然先生蓋有所本而云然也按肢煩口乾不欲聞聲熱症也醫者遇此症決不敢曰熱食多主用涼劑然一用涼劑使起搐搦卻無啼泣之狀緣先生進熱食故有啼泣狀耳余昔遇此症常用熱表劑見汗涔涔而愈益信先生言之不誣竊怪世之治此症者不能決其愈不愈死不死觀於先生之治法可以知所從事矣孫思邈注二三華佗治牙痛要訣宜辛散忌涼遏世傳華先生治牙痛一撮花椒水一盅細辛白芷與防風濃煎漱齒三更後不怕牙痛風火蟲實則先生之醫術雖本乎仙人其用藥則由己如宜辛散忌涼遏即治百般牙痛之秘訣也故知治病不必拘定湯藥蓋湯藥可偽造可以假託且當視其病之重輕人之虛實時之寒燠而增減之故有病同藥同而效與不效異醫者於此宜知所酌奪矣孫思邈注二四華佗治死胎要訣硃砂雞白蜜硇砂當歸末等分酒服出按此係普濟方考魏志甘陵相夫人有身六月腹痛不安先生視之曰胎已死使人手摸知所在在左則男在右則女人云在左於是為湯下之果下男形即愈然用何湯藥則末言明不能無疑意先生善解剖固有下之之術不專恃湯藥特以湯藥為輔佐品乎今觀此書則知先生之治斯症固有湯藥在也因為稽考故事以實之且余亦嘗用此方下胎屢見奇效人且視為仙方也孫思邈注二五華佗治矢鏃入骨要訣刮骨肉骨理筋補筋按襄陽府志關羽鎮襄陽與曹仁相拒中流矢矢鏃入骨先生為之刮骨去毒出血理筋創果愈蓋即本此二語而見之於實事也若治毒不敢刮必致毒氣蔓延見筋不敢理必致筋肉短縮其害無窮凡為醫者宜熟悉此二語勿見筋骨而膽怯只求刮理得法自不難立見奇效而病家亦不得以須受刮理而遽增惶駭也孫思邈注二六華佗治膝瘡要訣己戍相投凡蛇喜嗅血腥故人染蛇毒或服蛇子必能生蛇以其遇血腥能生長也犬之黃色者其血腥尤甚使之用力於足部其血鬱悶已極有直衝之性蛇嗅之必出也昔余見有屠狗者旁有數童子圍觀之忽有一童子目注牆角咋曰蛇來矣旋又有二童子驚相告謂有二蛇在屋瓦上蜿蜒來矣余初不解其故今讀華先生秘方始知之建安中琅琊有居民曰劉動者其女年二十許左膝上忽發一瘡癢而不痛凡患數十日而愈已而復發如是經七八年迎先生使治之先生視之曰易耳當得稻糠色犬一頭良馬三匹以繩犬頸使馳驟馬前而犬後馬力竭輒易之計馬與犬共行三十餘里俟犬不能馳再令人強曳之使續走二十餘里乃以藥飲女女即安臥昏不知人急取犬剖腹俾血如泉湧以犬之近後足之前所斷之處令向瘡口相距二三寸許停之須臾則有若蛇者蜿蜒從瘡中出速以鐵錐貫蛇項蛇在皮中搖動良久移時即不動引出之長凡三尺許惟有眼球而無瞳又為逆鱗耳乃以膏敷於瘡面凡七日而愈孫思邈注二七華佗治濕濁上升要訣病有不能順治可逆治有人苦頭眩頭不得舉目不得視積時年許先生視之使悉解衣倒懸令頭去地一二寸濡布拭身體令周匝候視諸脈盡出五色乃令弟子數人以鉞刀決脈五色血盡視赤血出乃下以膏摩被覆汗出周匝飲以葶藶犬血散之立愈此即逆治之法也孫思邈注二八華佗治寒熱要訣冷浴生大熱有婦人久病經年世謂寒熱交往病冬日十一月中先生令坐石槽中以寒水汲灌之云當滿百始七八灌戰欲死灌者亦懼而欲中止先生令滿數至將八十灌熱氣乃蒸出囂囂高二三尺滿百灌乃令燃火溫床厚覆良久汗洽出著粉汗糝便愈按冷浴有反激之力初極冷繼極熱足以清毛管出廉料有經絡肌膚為寒濕所困不能發汗者冷浴最效余體肥從不服表劑不適則冷浴浴後輒覺肌暢神爽始信仙方不欺人也惟體弱者不宜冒昧行之違之則有損又冷浴之後宜用乾布揉擦斯不可不察耳孫思邈注二九華佗治腹痛脾腐要訣物生於土土燥物枯可掘而潤之據此可以治脾一人病腹中半切痛十餘日中鬚眉墮落先生視之曰此脾半腐也宜刳腹施以洗伐即飲以藥令臥破腹視脾半腐壞刮去惡肉以膏敷創飲之藥百日而平復孫思邈注二一華佗治腳病要訣陰絡腹行陽絡背行緣督為治支無不伸一人病腳躄不能行先生切脈後即使解衣點背數十處相間一寸或五寸從邪不能當言灸此各七壯灸創愈即能行也後灸愈灸處夾背一寸上下行端直均調如引繩也按先生以四言為主要知藥所不及乃易之以灸人謂灸不難得穴難余謂得穴非難因有圖可按體格部位可稽也惟病之應灸與否又灸從何起迄何止有膽有識斯誠難耳先生之享大名於後世也即此膽與識為之基也孫思邈二一一華佗治酒毒要訣諱疾忌醫死酒之發酵足傷肺翼害腸胃惟葛花可解暨瀆嚴昕與數人共候先生適至謂昕曰君身中佳否昕曰無他先生曰君有疾急見於面毋多飲多飲則不治與以葛花粉令服之昕不能信復飲歸行數里卒頭眩墮自車人扶之輦回家越宿死孫思邈注二一二華佗治虛損要訣乘虛御內亡故督郵頓子獻得病已瘥詣先生先生為切其脈曰尚虛未得復勿為勞事御內即死臨死當吐舌數寸其妻聞其病除自百餘里來省之止宿交接中間三日病發一如先生言按腎水愈不足相火愈妄動故患虛損者愈喜近女色致女欲拒而不能非腰痛如割則黏汗如流此症先生且無方仙且無術人其鑑之孫思邈注二一三華佗治胃管要訣地數五土求其平母使木梗督郵徐毅得病先生往省之毅謂先生曰昨使醫吏劉租針胃管訖便苦咳嗽欲臥不安先生曰刺不得胃管誤中肝也食當日減五日不救果如先生言按人謂咳嗽從肺不知肝風煽動使肺不舒亦足致嗽所謂木刑金也人謂減食由胃不知肝氣下行使胃作脹不能進食所謂木剋土也人謂不眠由腎不知肝為血海肝病血虛勢難安眠所謂木耗水也胃屬土地屬五五為地數之終終而不能復始故五日不救也仙傳數語足以當千萬部醫書有如是者孫思邈注二一四華佗治嬰兒下痢要訣先啼後痢乳多冷氣凡兒啼哺以乳則止乳寒則胃不舒既入賁門不能上吐則為下痢東陽陳叔山小男二齡得疾下痢常先啼日以羸困以問先生先生曰其母懷軀陽氣內養乳中虛冷兒得母寒故也治法宜治其母兒自不時愈乃與以四物女菀丸即四物湯十日即愈按四物湯為婦人要藥有活血通經之功佗以此法治病即所云子有病治其母也凡治兒病藥由母服方取婦科法自此始孫思邈注二一五華佗治蠆螫要訣水性漲毒自散彭城夫人夜入廁蠆螫其手呻吟無賴先生令溫湯近熱漬其手中卒可得寐但令人數為易湯不使微冷達旦而愈按人受蜂刺或蛇毒多用白礬雄黃香油及各種草藥敷之竟不見效或反腫痛從未有以熱水漬之者即用熱水亦不知更易是以無效今觀先生之法簡而易且奏效速可知醫在通變治宜對症治病良藥俯拾即是人苦於不知其用法耳孫思邈注二一六華佗治急症要訣不堪望奚以方軍吏梅平因得疾除名還家家居廣陵未至二百里止親人舍其曰先生適至主人許主人令先生視之先生一望見即謂平曰君早見我可不至此今疾已結不可為趣去可得與家相見抵家後尚得有五日淹留也平從之果如所言按凡人內有病必先後於外故醫以望為第一要義扁鵲之著名即在於能望也先生望平色知其必死雖有所本亦由能決今之醫士不解斯義徒恃切脈以作指針故病者將死猶為定方吾見亦多矣噫孫思邈注二一七華佗治頭風要訣膽若寒效難見昔漢郭玉嘗言貴者處尊高以臨臣臣懷怖懾以承之其為療也有四難焉自用意而不任臣一難也將身不謹二難也骨節不強不能使藥三難也好逸惡勞四難也針有分寸時有破漏重以恐懼之心加以裁慎之志臣意猶且不盡何有於病哉此其所以不愈也不知先生所得之醫經中已有此言故先生治曹操頭風未除操曰佗能愈此小人養吾病欲以自重然吾不殺此子終當不為吾斷此根原耳操之為是言殆即郭氏所謂貴者處尊高以臨臣之意也先生之不能根治即醫經所載二語盡之矣孫思邈注二一八華佗治血鬱要訣黑血聚盛怒愈按血鬱於上焦非可剖而出之惟盛怒則肝之鼓動力足郁自散上行則吐勢所必然先生嘗本此以治郡守病以為使之盛怒則瘥乃多受其貨而不加功無何棄去又遺書辱詈之郡守果大怒令人追殺之不及因瞋恚吐黑血數升而愈孫思邈注二一九華佗治病篤要訣說明壽夭而復治則不怨冤死醫者遇病宜先審其人之將死與否若貿然定方與藥藥縱無害及死則必歸咎於醫者雖百喙其難辭也故欲攻醫宜先精相相者何望之義也先生遇病者先能知其人之壽夭此非得自仙傳乃緣臨症多使然耳嘗有疾者詣先生求治先生曰君病根既深宜剖臟腑治之當愈然君壽不過十年病不能相殺也疾者不堪其苦必欲除之先生乃施破術應時愈十年後竟亡孫思邈注二二華佗治咽塞要訣中有所壅吐為便醫法有不宜明言而奏效甚速者仲景治傷寒以升吐為第一義先生得醫經亦曾及此先生嘗行道中見有咽塞者因語之曰曏者道隅有鬻餅人萍薺甚酸可取二升飲之病自當去其人如先生言立吐一蛇乃懸於車而候先生時先生小兒戲於門中逆見自相謂曰客車旁懸有物必系逢我翁也及客進顧視壁北懸蛇以十數乃知其奇按先生治此症精且玄矣知其腹中有蛇未嘗明言恐其懼耳懼則蛇亦畏縮不肯隨吐而出醫家有以後患詳告病者致其人不敢服藥令病加劇者觀於先生之治腹蛇可以知所取法矣孫思邈注二二一華佗治內疽要訣生腥化蟲雖出有伏按以魚腥雜碎和糖與粉埋土中經宿成蟲如蚯蚓畜雞者恆以此飼雞較他蟲速且繁蓋天道本先生不已以生物求生物誠不生而自生也廣陵太守陳登忽患胸中煩懣面赤不食先生脈之曰使君胃中有蟲欲成內疽腥物所為也即作湯二升服之至再有頃即大嘔中有小蟲頭赤而能動其半尚為魚膾所苦即愈先生曰此病後三期當發因其中尚有遺種種難盡絕也遇良醫可救及期疾動佗適他往登遂死孫思邈注二二二華佗治欲產不通要訣產以血為主使血乏者難宜助李將軍妻病延先生使視之先生曰傷身而胎未去將軍言頃實傷身胎已去矣先生曰案脈胎未去也將軍不謂然越日稍瘥三月後復動更召先生先生曰脈象如前系雙胎先下者耗血多故後兒不得出胎既死血脈不復歸必干附於母脊乃為施針並令進湯果下死胎且人形已具色已黑矣孫思邈注二二三華佗治咳嗽要訣表裡相應二九復生膿能化毒不吐腸瘟軍吏李成苦咳晝夜不寧先生診為腸癰與以散二劑令服即吐膿血二升余病尋愈先生謂之曰後十八年疾當復發若不得藥不治復分散與之令寶藏其後五六歲有里人所患適與成同詣成乞藥甚殷成憫而與之乃知如譙詣先生更乞適值見收意不忍言後十八年成復發竟以無藥死按肺與大腸相表裡肺疾則大腸之力不足故便不暢或便後失力上無感下不應也若大腸過疾則肺之鼓動力受阻故氣常不舒或增咳嗽幹不強枝亦弱也先生治咳嗽而用吐劑知其化膿毒侵於腠理耳視若甚奇實則無奇也孫思邈注二二四華佗治血脈諸病要訣身能活脈何需藥石按先生嘗語其門人吳普曰人體欲得勞動第不當極動搖則穀氣則銷血脈流通疾不得生所謂流水不腐戶樞不蠹也故古之為導引者熊頸鴟顧引挽腰體動諸關節以求不老吾有一術名五禽之戲一曰虎二曰鹿三曰熊四曰猿五曰鳥亦以除疾兼利蹄足以當導引體有不舒起作禽戲怡而汗出因以著粉體自輕便而嗜食普遵行之行年九十耳目聰明齒牙完堅佗之斯術蓋即得自仙傳也孫思邈注二二五華佗治腹背諸疾要訣藥不及針可入中肯綮深奚弊世傳涪翁善針著有針經其弟子程高尋求積年翁乃授之郭玉師事程高亦以針名惟醫貴人輒或不愈和帝問其故對曰腠理至微隨氣用巧針石之間毫芒即乘神存於心手之間可得解而不可得言也又曰針有分寸時有破漏是可見用針之難矣不知先生得仙授亦精於此其徒彭城樊阿亦善針術凡醫皆言背及胸臟之間不可妄針針入不得過四分而阿針背入一二寸胸臟深乃至五六寸而病皆療是可見先生之針術得之仙授視涪翁等尤勝也孫思邈注二二六華佗治臟腑癰瘍要訣藥用麻沸臟腑可割既斷既截不難縫合按癰瘍髮結於臟腑之內雖針藥亦無所用之先生治斯類險症常先令服麻沸散既昏罔覺因刳破腹背抽割聚集若在腸胃則斷截湔洗除去疾穢已而縫合五六日而創合月餘而平復矣孫思邈注二二七華佗治精神衰頹要訣御婦人得長生服麻術亦仙佗襟同御抵禦婦人即握固不泄遠精補腦之術也列仙傳曰容成公者能善補道之取精於玄牝即服丹鉛也其要穀神即腎臟之元神不死守生養氣者也故世言御婦人術者多推容成公為始祖其實此術非創自容成公乃創自先生先生持假名於容成耳按後漢時有冷壽光者與華先生同時常師事先生得先生秘授御婦人術壽光年可百五六十歲當屈頸亡掌息鬚髮盡白而色理如三四十歲同時又有女生者長樂人初餌胡麻及術絕谷八十餘年日少狀色若穠桃日能行三百里走及獐鹿常採藥入嵩高山見女子自言為三天太上侍官以五嶽真形與之並授以施行法女生道成一旦與知交故友別云入華山去五十年先時相識時逢女生華山廟前乘白鹿從玉女三十人並令謝其鄉里故人也二二八華佗治發白要訣服地節頭不白樊阿從先生求方可服食益於人者先生授以漆葉青面散漆葉屑一斗青面十四兩以是為率云久服去三蟲利五臟輕體使人頭不白阿從之壽百餘歲按漆葉或謂之漆樹之葉郁脂膏或謂即黃耆大補氣青面一名地節又名黃芝即今熟地主理五臟益精氣昔有遊山者見仙家常服此因以語先生試之良效即以語阿阿初秘之旋因酒醉泄於人其方遂流傳於後世云
