body:
  text: 卷十八華佗治奇症法神方一八一華佗治腹中生應聲蟲神方人腹中忽生應聲蟲古人治法將本草讀之遇蟲不應聲者用之即愈茲更有便法一省讀本草之勞即用生甘草與白礬等分不須二錢飲下即愈一八二華佗治鼻中生紅線神方鼻中伸出紅線一條長尺許稍動之則痛欲死方用硼砂龍腦各一分研末以人乳調之輕點在紅線中間忽覺有人拳其背紅線頃刻即消誠稱奇絕一八三華佗治耳中蟻鬥神方凡人耳中忽聞有螞蟻戰鬥之聲者是為腎水耗盡又加怒氣傷肝所致方用白芍熟地山茱萸各三兩麥冬一兩柴胡梔子各三錢白芥子一錢水煎服數劑後戰鬥之聲漸遠一月而愈一八四華佗治耳中奇癢神方耳中作癢以木刺之仍不能止必以鐵刀刺其底錚錚作聲始覺愉快否則癢極欲死方用龍骨一錢皂角刺二條煅燒灰存性龍腦三分雄鼠屎一枚上共為末鼠膽水調勻後再以人乳調如糊盡抺入耳孔內初時癢不可忍須有人執定其兩手癢定而自愈矣一八五華佗治無故見鬼神方凡人無故見鬼無論其狀為三頭六臂或為斷頭刖足或為金甲或為藍面皆由心虛而祟憑之方用白朮蒼朮各三兩半夏大戟山慈菇各一兩天南星三錢附子麝香各一錢共為細末搗成餅狀以生薑煎湯化開服下則必吐頑痰碗許而愈一八六華佗治狐憑病神方凡人為山魈木魅狐貍蟲蛇所祟者統稱之狐憑病方用生桐油擦其私處疾自愈或以汙穢褻衣包裹頭部則怪自大笑而去永不復來一八七華佗治脊縫生蝨神方本症之原因為腎中有風得陽氣吹之即脊部裂開一縫出蝨千餘方用蓖麻三粒研成如膏紅棗三枚搗成為丸如彈丸大火燒之熏於衣上蝨即死而縫亦自合矣一八八華佗治糞便前後互易神方本症之原因為夏季感受暑熱患者糞從前陰出溺從後陰出前後倒置失其常度法用車前子三兩煎湯三碗頓服即愈一八九華佗治蛇生腹中神方患者體乾涸如柴膚似鱗甲極易辨明治用雄黃三兩甘草二兩白芷五錢各為細末擇端午日以棕子米修合為丸如桐子大食前嚼碎嚥下食後必作痛切不可飲水犯則無效一八一華佗治鱉生腹中神方治法仍用前方再加馬尿一碗加人尿童便尤佳半合飲之立消一八一一華佗治頭臂生鳥鵲神方患者頭臂上忽生鳥鵲外裹以皮膜或如瘤狀或突起成塊內作鳥鵲之聲遇飢寒時即疼痛難忍宜先以銀刀割破其足則鳥鵲即破孔而出即敷以生肌散外塗以神膏三日後即生合如舊按生肌散及神膏均見本書第三卷孫思邈注一八一二華佗治鬼胎神方患者腹部膨大狀如妊娠惟形容憔悴面目黧黑骨幹毛枯是由室女或思婦不克抑制欲念邪物憑之遂生此症治用紅花半斤大黃五錢雷丸三錢水煎服後越宿即下血如雞肝者數百片而愈自後再多服補益之劑調治之一八一三華佗治熱毒攻心神方患者頭角忽生瘡癤第一日頭重如山越日即變青紫再越日青紫及於全身即死本症多得之於常服媚藥初起時速用金銀花一斤煎汁數十碗服之俾少解其毒繼用金銀花二兩玄參三兩當歸二兩生甘草一兩水煎服日用一劑至七日以後瘡口始漸能收斂一八一四華佗治腳底生指神方患者足蹠之底部忽生二趾痛不可忍急以刀輕刺其趾出血次以人參一錢龍腦三分硼砂一分瓦蔥一兩共研細末隨時摻之血盡為度再用人參生甘草牛膝白芥子萆薢各三錢白朮五錢薏苡仁一兩半夏一錢水煎服四劑全愈外更敷以神膏及生肌散一八一五華佗治蛇生背上神方是症由忤觸神靈所致患者初時覺背部痛甚久而漸腫用刀刮破其皮忽有蛇形之物躍出長約二尺急用人參一兩半夏天南星各三錢附子一錢水煎頓服外敷以生肌散及神膏一八一六華佗治毛孔流血神方是由於酒色不禁恣意縱欲所致患者足上或毛孔中血出如一線流之不止即瀕於死急用釅醋三斤煮沸之以兩足浸入即止再用人參一兩當歸三兩水煎濃湯別以鯪鯉甲一片炒之研末調入藥汁中飲之即不復發一八一七華佗治腸胃瘙癢神方是為火鬱結而不散之故治宜表散之劑用柴胡炒梔子天花粉各三錢甘草二錢白芍一兩水煎服數劑即愈一八一八華佗治遍身奇癢神方嘗有人先遍身發癢錐刺之則稍已未幾又發奇癢割以刀始快少頃又癢以刀割之乃覺痛並流血不止乃以石灰止之復發奇癢必割之體無完膚而後止是必平時作惡多端獲罪於天所致患者宜自矢改過一面用人參一兩當歸三兩荊芥三錢水煎服三劑必效一八一九華佗治水濕生蟲神方患者皮膚手足之間發如蚯蚓之鳴聲鳴時可即用蚯蚓糞敷於患處鳴止再用薏仁芡實各一兩白芷五錢生甘草黃芩各三錢防風五分附子三分水煎服即愈一八二華佗治背生人頭神方患者背部忽生人頭一具眼耳口鼻俱備並能呼人姓名此症初起時必背痛發癢以手搔之漸次長大久且漸次露形大如茶杯唯無頭髮鬚眉耳此時如以刀割之立死不救治宜用人參半斤白朮五兩貝母白芥子茯苓生甘草青鹽各三兩白礬半夏各二兩共為末米糊丸如梧子大每日晨夕二次白湯下五錢頭自漸次縮小而愈一八二一華佗治舌伸不收神方是為陽火強盛之故先以龍腦少許點之即收次用人參黃連白芍各三錢菖蒲柴胡各一錢水煎服二劑當愈一八二二華佗治舌縮不出神方是為寒氣結於胸腹之故患者舌縮入喉嚨不能言語宜急用人參三錢白朮五錢附子肉桂乾薑各一錢水煎服一劑舌自舒一八二三華佗治掌中突起神方患者掌中忽高起一寸不痛不癢是為陽明經之火不散鬱於掌中使然也治用附子一枚煎湯以手握之至涼而止如是者十日首覺劇痛繼乃覺癢終乃突起者漸且平復矣一八二四華佗治鼻大如拳神方是為肺金之火壅於鼻而不得泄以致鼻大如拳疼痛欲死治宜清其肺中之邪去其鼻間之火方用黃芩甘草麥冬天花粉各三錢桔梗天門冬各五錢紫菀二錢百部紫蘇各一錢水煎服四劑自消一八二五華佗治男子乳房腫如婦人神方男子乳房忽壅腫如婦人之狀捫之痛欲死經發不愈是乃陽明之氣結於乳房之間治宜消痰通瘀方用金銀花蒲公英各一兩天花粉白芥子各五錢茯苓白芍通草各三錢柴胡二錢木通通草炒梔子各一錢附子八分水煎服一八二六華佗治手足脫落神方人有手足俱脫落而依然能生活者此乃傷寒之時口渴過飲涼水所致愈後倘手足指出水者急用薏苡仁三兩茯苓二兩白朮一兩肉桂車前子各一錢水煎服一連十劑小便大利俟手足水止之候即止而不服一八二七華佗治指甲脫落神方患者手指甲盡行脫落不痛不癢是為腎經火虛及房室之後遽以涼水洗手所致方用熟地黃山茱萸山藥茯苓丹皮澤瀉柴胡白芍破故紙各三錢水煎服一八二八華佗治指縫生蟲神方患者指縫間血流不止有蟲如蜉蝣鑽出少頃即飛去是緣濕熱生蟲並帶風邪所致方用黃耆熟地黃薏苡仁各五錢茯苓當歸白芍生甘草白朮各三錢人參柴胡荊芥川芎各一錢水煎服四劑後血即不流更服四劑手指即完好如初一八二九華佗治臍口突伸神方患者臍口忽長出二寸狀似蛇尾卻又非蛇且不覺痛癢是由任帶之脈痰氣壅滯所致方用硼砂龍腦麝香各一分白芷雄黃各一錢兒茶二錢共研末先將其尾刺出血此時患者必昏暈欲死急以藥點之立化為黑水急用白芷三錢煎湯頓服自愈一八三華佗治肛門生蛇神方是為大腸濕熱所致肛門間忽伸出一物似蛇非蛇出入自由治宜內用消藥外用點藥方用當歸白芍各一兩地榆五錢萊菔子三錢枳殼檳榔大黃各一錢水煎飯前溫服一劑外以木耳一兩煎汁洗之洗後再用龍腦一分研末點之伸出物自縮進而愈矣一八三一華佗治眼中長肉神方常有人於眼中長肉二條長各一寸粗等線香垂於眼外治用龍腦黃連甘草各一分硼砂半分各為細末研至無聲為度以人乳調點肉尖上覺眼珠火炮出一時收入而愈更以白芍五錢白芥子白朮茯苓各三錢炒梔子二錢柴胡甘草陳皮各一錢水煎服一八三二華佗治腹脅間生鱗甲神方此症以婦人為多男子亦間有之是緣孽龍化形與婦人交接所致此病以速治為妙方用雷丸大黃白礬鐵衣雄黃各三錢共為細末棗肉為丸酒下三錢逾時即由後陰下物碗許狀如人精即覺胸中開爽再服三錢鱗甲盡落而愈一八三三華佗治手皮上現蛇形神方是緣蛇類乘人睡時作交感於人身所致患者手上皮上現蛇形一條痛不可忍治法先以利刀刺其頭部繼刺其尾遂有如墨汁之血流出外以白芷為末摻之二次而愈一八三四華佗治喉中有物行動神方是由食生菜時誤吞蜈蚣遂令蜈蚣生於胃口之上其候喉中似有物行動唾痰時其痛更甚全身皮膚開裂有水流出目紅腫而不痛足水腫而能行治法用雞一隻五香烹煮極爛乘患者熟睡時將雞置於口畔則蜈蚣聞此香氣自然外出即宜捉住切不令再入口中自一條至數條盡乃愈然後再以生甘草荊芥陳皮各一錢白芍五錢當歸黃耆各一兩薏苡仁茯苓各三兩防風五分水煎服十劑則皮膚之裂自愈而足腫亦消矣一八三五華佗治胃中有蛇神方患者胃部不時作痛飢時更甚尤畏大寒日日作楚治用大蒜三兩搗汁灌之則患者忽吐蛇一條而愈長凡三尺有奇一八三六華佗治頭大如斗神方是由痰鬱所致患者頭面忽腫如斗大視人小如二寸許飲食不思呻吟欲睡治用瓜蒂赤小豆各一兩共搗末取一錢匕別以香豉一合熱湯七合煮作稀粥去滓取汁和散溫頓服令吐一劑而頭目之腫消再劑而見人如故後用人參白朮茯苓各三錢甘草一錢陳皮五分半夏三錢水煎服二劑自愈一八三七華佗治胸中有蟲神方本症因食鯉而得患者中心悶甚飲食不能宜用半夏甘草人參各三錢瓜蒂七枚黃連陳皮各一錢水煎溫頓服立時當吐蟲數升其頭面皆赤尾如魚子按此即華先生治廣陵太守陳登之方陳曾患此症先生為治愈後堅囑令斷絕酒色始可長愈否則二年後必病飽滿而死登不能聽三年果如華先生言孫思邈注一八三八華佗治耳內長肉神方是由腎火騰燒於耳所致患者耳內忽長肉一條赤色如帶手不可近治用硼砂龍腦各一分研和點之立化為水後再多服補益之劑調治之自愈
