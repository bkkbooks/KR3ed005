body:
  text: 卷十五華佗傷科神方一五一華佗治折骨神方取大麻根葉無問多少搗取汁飲一小升無生青者以乾者煮取汁服外治用黃狗頭骨一具以湯去其皮毛置炭火中煅之去泥搗細末別以牡蠣亦置炭火上煅之臨用時每狗骨末五錢入牡蠣末三錢官桂末二錢並以糯米粥鋪絹帛上乃摻藥在粥上裹損傷處大段折傷者上更以竹片夾之少時覺癢不可抓爬宜輕拭以手帕一三日效一五二華佗治傷筋神方取蟹頭中腦及足中髓熬之納瘡中筋即續生或取旋覆草根洗淨去土搗之量瘡大小取多少敷之日一易以瘥為度一五三華佗治筋骨俱傷神方搗爛生地黃熬之以裹折傷處以竹片夾裹之令遍病上急縛勿令轉動日十易三日瘥內服用乾地黃當歸獨活苦參各二兩共搗末酒服方寸匕日三一五四華佗治折腕神方生附子去皮四枚以苦酒漬三宿用脂膏一斤煎之三上三下膏成敷之一五五華佗治折腕瘀血神方虻蟲去足翅熬牡丹皮二物各等分酒服方寸匕血化成水或用大黃六兩桂心二兩桃仁去皮六十枚上三味以酒六升煮取三升分三服當下血瘥一五六華佗治被擊青腫神方以新熱羊肉敷之或炙肥豬肉令熱拓上又炙豬肝貼之亦佳一五七華佗治被擊有瘀神方刮青竹皮二升亂髮如雞子大四枚燒灰延胡索二兩上搗散以水酒各一升煎三沸頓服日三四或以大黃二兩桃仁去皮尖熬虻蟲去足翅熬各二十一枚上搗散蜜和丸四丸即納酒一升煎取七合服之一五八華佗治傷腰神方續斷大黃破故紙沒藥紅花赤芍當歸尾虎骨各二錢鯪鯉甲劉寄奴自然銅火煅醋淬各一錢絲瓜絡半枚上以水和酒合煎溫服極效一五九華佗治從高墮下神方阿膠炙乾薑各二兩艾葉芍藥各三兩上以水八升煮取三升去滓納膠令烊分二服羸人須分三服此方治因墮傷唾血或吐血極效並治金瘡傷絕及婦人產後崩中一五一華佗治墮傷瘀血神方蒲黃十分當歸乾薑桂心各八分大黃十二分虻蟲去足翅熬四分上搗散空腹酒服方寸匙日再漸增至匙半以瘥為度又方煮大豆或小豆令熟飲汁數升和酒服之彌佳一五一一華佗治墮馬傷神方當歸熬令香甘草炙桂心蜀椒各二分芎藭熬六分附子炮澤蘭熬各一分上搗散酒服方寸匙日三此方大驗服之能令呼吸之間不復大痛三日後筋骨即相連一五一二華佗治頭額跌破神方白礬煅令汁盡五倍子上二味等分研和敷傷處血即止而不流一五一三華佗治因跌破腦神方透明龍齒人參生地黃象皮各三錢龍腦三分上研和再以地蝨二十枚螻蛄三枚各去頭翅搗爛更入前藥搗之干為末每服一錢極效或以蜂蜜和蔥白搗勻厚塗亦效一五一四華佗治頷脫神方先令患者平身正坐術者以兩手托住下頷向腦後送上關竅即以布扎住外用天南星研末薑汁調敷兩頷越宿即愈惟居處宜忌風寒一五一五華佗治閃頸神方硼砂研末以燈心蘸點眼內四角淚出即松續行三次當愈一五一六華佗治破口傷神方血竭二錢五分沒藥五錢龍骨五花者二錢俱另研燈芯一束蘇木二錢桔梗五分降真香四錢同蘇另研當歸三錢雞一隻連毛用醋煮熟爛搗作團外用黃泥封固以文火煅干為末再用紅花二錢焙為末共為細末摻於創口立能止血一五一七華佗治破傷風神方南星防風白芷天麻白附子羌活上等分為末每服二錢熱酒一蠱調服更敷傷處牙緊反張者每服三錢熱童便調服雖內有瘀血者亦愈若已昏死苟心腹尚溫者連進三服亦可保全一五一八華佗治金瘡神方初傷出血即以小便淋洗傷久者可用文蛤降真香人參三物各等分為末乾摻傷處須紮緊或用枯礬七錢乳香三錢共為末摻之如傷已久潰爛者宜用乳香沒藥共去油三七焙輕粉兒茶各三錢麝香四分冰片三分共為末以白蜜調敷一次即愈一五一九華佗治箭鏃傷神方凡箭鏃入骨不能得出不可即撥動恐其傷骨也治宜用巴豆一粒炮去殼勿焦活蜣螂一枚同研炒塗於傷處須臾痛定微癢極難忍之時方可撥動取出鏃立瘥一五二華佗治中箭毒神方凡中箭毒者其內外皮肉必黑疼痛欲死治宜先用刀割開皮肉取出箭鏃再以婦人月水洗之方能解去其毒或搗藍青絞取汁飲之並敷瘡上若無藍取青布漬之絞取汁飲之又以汁淋灌瘡中又或以乾葛鹽等分搗末敷瘡上毒皆自出按箭毒有三種交廣夷俚多用焦銅作鏃嶺北則用諸蛇蟲毒螫物汁著管中漬箭鏃此二種才傷皮便洪腫沸爛而死唯射豬犬雖困猶得活以其啖人糞故也人若有中之即便餐糞或絞濾取汁飲之並以塗瘡上須臾即定不爾不可救也又一種是今之獵師射獐鹿用射罔以塗箭鏃人中之當時亦困頓著寬處者不死若近胸腹亦宜急療之今華先生所傳各方是射罔者耳孫思邈注一五二一華佗治杖傷神方赤杖之時可先取野紅花按即小薊半斤用燒酒四斤半漬之越宿即取出曝乾臨刑時絹包二錢噙口內咽其汁任刑不知痛或用土鱉焙五枚蘇木乳香沒藥各二錢木耳鯪鯉甲丹皮枳殼蒲黃當歸尾木通甘草各一錢酒水共煎服如服後不受杖可服靛花水二杯解去之初杖後若欲散血消腫可用胡椒二兩土鱉三十枚當歸尾一兩五錢木耳灰一兩五錢乳香沒藥杏仁桃仁發灰血竭各三錢八分自然銅醋淬七次五分上為末別以胡椒兩半煮汁打糊為丸每責十板服藥二錢熱酒送下外用大黃白芷各兩許水煎濃汁揉洗傷處以瘀散見紅為度別以豬脂三兩白蠟一兩樟腦一兩輕粉五錢龍腦麝香各三分為末貼敷之一五二二華佗治夾傷神方未受刑時如前法可先服藥已夾後隨用硃砂末以燒酒調敷傷處用一人以十指尖輕啄患者腳底先覺癢次覺痛為止再用一二人以筆管於患者足面上輕輕趕之助通血脈候傷處凹者突起四圍腫大為度即以鬧楊花焙乾為末每服五分至七分先飲酒半酣次服藥再飲至大醉即靜臥勿語次日去敷藥再用透骨草天門冬天靈蓋南星地骨皮陳皮各等分象皮倍用水煎浸洗日二三次仍以鬧楊花末如前法服之三次痊愈一五二三華佗治跌打損傷神方三七大黃丹皮枳殼大小薊各三錢當歸白芍生地各五錢紅花一錢桃仁十四枚水酒各半煎八分服如日久疼痛或皮肉不破而疼痛可用水蛭切碎以烈火炒焦黑研碎加入前藥中最多三劑決不再痛惟水蛭必須炒黑萬不可半生否則反有害於人一五二四華佗治竹木入肉神方鹿角燒灰研末以水和塗之立出久者不過一夕或取羊糞燥者燒灰和脂塗之刺若未出重敷之一五二五華佗治鐵針入肉神方生磁石一兩研末以蕓薹子油調敷皮外離針入處約寸許漸移至針口由受傷原口而出極神效一五二六華佗治水銀入肉神方以金屬薄板如銀銅鉛錫等片時時在入口部熨貼則水銀自能出而侵蝕各金俟各金上融合已足更易之至罄而止一五二七華佗治瓷片入肉神方擇三角形銀杏果實去殼及心漬蕓薹子油中越宿即取出搗爛敷貼患部日更易之數次即愈一五二八華佗治骨刺入肉神方以牛膝根莖合搗敷之即出縱瘡合其刺猶自出或以鹿腦厚敷上燥復易之半日即出
