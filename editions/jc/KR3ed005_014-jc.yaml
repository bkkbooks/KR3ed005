body:
  text: 卷十四華佗皮膚科神方一四一華佗面膏神方杜蘅杜若防風藁本細辛白附子木蘭皮當歸白朮獨活白茯苓葳蕤白芷天門冬玉屑各一兩菟絲子防己商陸梔子花橘皮冬瓜仁蘼蕪花各三兩藿香丁香零陵香甘松香青木香各二兩麝香半兩白鵝脂半升白羊脂牛髓各一升羊𦚠三具上三十二味先以水浸膏髓等五日日滿別再易水自後每隔五日一易水閱二十日止以酒一升挼羊𦚠令消盡去脈乃細切香於磁器中密封一宿曉以諸脂等合煎三上三下以酒水氣盡為候即以綿布絞去滓研之千遍待凝乃止使白如雪每夜塗面晝則洗卻更塗新者十日以後色等桃花一四二華佗治面黑不白淨神方白蘚皮白殭蠶白附子芎藭鷹屎白白芷青木香甘松香白朮白檀香丁香子各三分冬瓜仁五合白梅去核二七枚瓜子一兩杏仁去皮三十枚雞子白七枚大棗去核三十枚豬𦚠三具面三升麝香三分上二十味先以豬𦚠和麵曝令乾然後合諸藥搗篩又以白豆屑二升為散旦用洗面手以上面即潔白無瑕一四三華佗治面多䵟黯神方患者面部不淨狀如雀卵者甚多俗名雀斑可用苦酒煮白朮常以試面漸漸自去或以新生雞子一枚穿去其黃以朱末一兩納其中漆固以雞伏著倒出取塗面立去而白一四四華佗治面多黑痣神方薺苨二分桂心一分上二味搗篩以酢漿水服方寸匙日一止即脫內服梔子散瘥一四五華佗治面生皯皰神方麝香三分附子一兩當歸芎藭細辛杜蘅白芷芍藥各四分上八味切碎以臘月豬膏一升半煎三上三下去滓下香膏以敷疱上日三瘥一四六華佗治面生皻䩅神方木蘭皮防風白芷青木香牛膝獨活藁本芍藥白附子杜蘅當歸細辛芎藭各一兩麝香二分上十四味銼以臘月豬脂二升微火煎三上三下去滓入麝香以敷面上妙一四七華佗治面上粉滓神方光明砂研四分麝香二分牛黃半分水銀四分以面脂和研雄黃三分上五味並精好藥搗篩研如粉以面脂一升納藥中和攪令極調一如敷面脂法以香漿水洗敷藥避風經宿粉滓落如蔓菁子狀此方秘不傳一四八華佗治面色晦暗神方羊脂豬脂各一升白芷半升烏喙十四枚大棗十枚麝香少許桃仁十四枚甘草一尺炙半夏洗半兩上九味合煎以白芷色黃去滓塗面二十日即變五十日如玉光潤妙一四九華佗治面上瘢痕神方禹餘糧半夏上等分為末雞子黃調敷先以布拭乾勿見風日三十日雖十年者亦滅一四一華佗治面風神方玉屑密陀僧珊瑚各二兩白附子三兩上四味細研如粉用酥和夜塗面上旦洗去一四一一華佗治眉毛稀疏神方取七月烏麻花陰乾為末生烏麻油浸每夜塗之一四一二華佗治頭風白屑神方蔓荊子一升生附子三十枚羊躑躅花葶藶子各四兩零陵香二兩蓮子草一握上六味以綿裹用油二升漬七日每梳頭常用之若發稀及禿處即以鐵精一兩以此膏油於瓷器中研摩禿處其發即生一四一三華佗治頭髮脫落神方烏喙莽草石南星續斷皂莢去皮熬子澤蘭白朮各二兩辛夷仁一兩柏葉半升豬脂三升上十味以苦酒漬一宿以脂煎於東向灶釜中以葦薪煎之先致三堆土每三沸即下致一堆土候沸定卻上至三沸又置土堆上三畢成膏訖去滓置銅器中數北向屋溜從西端至第七溜下埋之三十日藥成小兒當刮頭日三塗大人數沐沭已塗之一四一四華佗治髮色黃白神方黃耆當歸獨活芎藭白芷芍藥莽草防風辛夷仁乾地黃藁本蛇含各一兩薤白半升烏麻油四升半馬鬐膏二升上十五味以微火煎三上三下俟白芷黃色膏成去滓洗髮訖後塗之一四一五華佗治發黃神方大豆五升醋漿水二升上二味煮取五升汁淋之數月當愈一四一六華佗染白髮使黑神方胡粉白灰各一分上二味以雞子白和先以泔漿洗令淨後塗之取急以油帛裹之一宿以澡豆洗卻則其發黑軟不絕或擇取細粒烏豆四升煮取四升去豆以好灰汁淨洗髮俟干後即用豆汁熱塗之裹以油帛經宿始開既干再塗以熊脂仍裹以油帛則色黑如膝一塗三年不變一四一七華佗治發落不生神方蜀椒三兩半莽草二兩乾薑半夏桂心䕡茹附子細辛各一兩上八味搗篩極細以生豬脂剝去筋膜權取二十兩和前藥合搗令消盡藥成先以白米泔沐發令極淨每夜摩之經四五日其毛孔即漸生軟細白皮毛十五日後漸變作黑髮月餘後發生五寸即可停止一四一八華佗治發臭神方佩蘭葉煎水沸之可除發臭或煮雞蘇為汁或燒灰淋汁沐之均效一四一九華佗令發不生神方拔毛髮後以蟹脂塗之永不復生或取蚌殼燒灰研粉和以鱉脂拔卻後即塗之亦效一四二華佗除頭蝨神方以水銀與蠟油相和研之至不見水銀為止用以塗發一宿即盡死一四二一華佗治毛蝨神方凡男女陰毛及腋毛等處常生有一種八角形之蟲名曰角蝨往往深入肌理瘙癢異常可用百部末研粉漬上好燒酒中一宿用以塗擦極效或用除頭蝨之水銀膏擦之亦效一四二二華佗治唇裂神方橄欖炒研末以豬脂和塗之極效一四二三華佗治嘴角瘡神方取新鮮杉木細枝一條以烈火燒其上端則末端有白色之漿流出即取塗之奇效一四二四華佗治腋臭神方正旦以小便洗腋下即不臭或以雞舌香藿香青木香胡粉各二兩為散綿裹之納腋下亦效一四二五華佗治夏日斑神方先用水洗淨汗垢然後研密陀僧為末以胡瓜蒂蘸擦數次即愈一四二六華佗治手面皸裂神方蜀椒四合水煮去津以手漬入約半食頃取出令乾須臾再漬約三四次干後塗以豬羊腦即效或以五倍子末與牛骨髓調和填納縫中亦效一四二七華佗治雞眼神方先將雞眼以利刃剔開次乃以生石灰糯米尖濕鹼共研末用冷水少許調和經二三時即成糊每晚臨睡搽少許數日即愈一四二八華佗治肉刺神方以黑木耳取貼之自消爛又不痛宜以湯浸木耳軟乃用之一四二九華佗治疣目神方疣目者謂各部有疣子似目也可用苦酒漬石灰六七日取汁點疣上小作瘡即落一四三華佗去黑子神方晚間臨睡時用暖漿水洗面以布揩黑子令赤痛挑動黑子水研白旃檀取濃汁塗其上旦復以暖漿水洗面仍以鷹屎粉其上一四三一華佗治足繭神方荸薺半枚貼患處越宿次夕續為之凡五六次繭自連根脫落一四三二華佗治足汗神方萊菔煎汁時時洗之自愈一四三三華佗治遍身風癢神方蒺藜子苗煮湯洗之立瘥一四三四華佗治乾癬神方乾癬積年生痂搔之黃水出每逢陰雨即癢治用斑蝥半兩微炒為末調敷之一四三五華佗治濕癬神方刮瘡令坼火灸指摩之以蛇床子末和豬脂敷之瘥止或用楮葉半斤細切搗爛塗癬上一四三六華佗治癬瘡神方雄黃硫黃各一兩羊蹄根白糖荷葉各一兩上五味以後三種搗如泥合前二種更搗和調以敷之若強少以蜜解之令濡不過三瘥一四三七華佗治疥瘡神方黃連十四銖藜蘆十二銖大黃一兩乾薑十四銖䕡茹十銖莽草十二銖羊躑躅十銖上藥搗篩以豬脂二斤微火向東煎之三上三下膏成去痂汁盡敷之極效合時勿令婦人雞犬見之一四三八華佗治諸癩神方凡癩病皆起於惡風及觸犯忌害得之初覺皮膚不仁淫淫若癢如蟲行宜急療之此疾乃有八九種皆須斷米穀鮭餚專食胡麻松術治用苦參五斤銼細以陳酒三斗漬四五日稍稍飲之二三合外用葎草一擔以水二石煮取一石洗之不過三五度當瘥一四三九華佗治烏癩神方本症初發與前症無異惟其皮肉之中或如有桃李者隱疹赤黑手足頑痹手足不覺痛腳下不得踏地身體瘡痛兩肘如繩縛是名烏癩治用蝟皮炙魁蛤蝮蛇頭末木虻去翅足熬四枚虻蟲去翅足熬蠐螬各一枚並炙鯪鯉甲去頭足炙葛上亭長炙七枚斑蝥去翅足炙七枚蜈蚣去頭足炙附子泡去皮各三枚蜘蛛炙五枚水蛭一枚雷丸三十枚巴豆去皮心熬十五枚水銀大黃真丹桂心射罔各一兩黃連一分石膏二兩蜀椒三分芒硝一分龍骨三分甘遂熬礬石燒滑石各一分上二十八味搗篩蜜和丸如胡豆服二丸日三加之以知為度按此方各藥分兩多寡殊異當系記錄差誤用時即以意量之孫思邈注一四四華佗治白癩神方凡癩病語聲嘶目視不明四肢頑痹肢節大熱身體手足隱疹起往往正白在肉裡鼻有息肉目生白珠當瞳子視無所見此名白癩治用苦參五升露蜂房炙五兩蝟皮炙一具曲三斤上以水三斗五合合藥漬四宿去滓炊米二斗釀如常法酒熟食後飲三五合漸增之以知為度一四四一華佗治凍瘡神方干狗糞經霜而白者佳燒灰存性研為細末脂麻油調敷數次即愈此方奇驗非他藥可及一四四二華佗治風疹神方以夏蠶砂一升水煎去滓遍浴全身其疹自退內用白朮為末酒服一匙日二服仍忌風一四四三華佗治痱子神方升麻煎服並洗患處自愈或以綠豆粉蛤粉各二兩滑石一兩和勻撲之亦效一四四四華佗治漆咬神方可用韭葉搗爛敷之或速以芥菜煮湯洗之亦效一四四五華佗治漆瘡神方取蓮葉乾者一斤水一斗煮取五升洗瘡上日再瘥一四四六華佗治腳丫濕爛神方密陀僧一兩熟石膏枯礬各二錢輕粉一錢上共為末濕則干敷干則桐油調搽一四四七華佗治腳縫出水神方黃丹三錢花蕊石一錢共研細末摻之即止水
