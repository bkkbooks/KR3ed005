body:
  text: 卷八華他兒科神方八一華他治小兒初生不啼神方凡初生小兒不能作聲者乃由難産少氣所致即取兒臍帶向身卻捋之令氣入腹仍呵之至百度啼聲自發八二華他治初生小兒口噤不乳神方赤足蜈蚣半枚去足炙令焦研末和以豬乳二合分三四次服之瘥止八三華他治預解小兒胎毒神方甘草一指節炙碎以水二合煎取一合以綿染點兒口中與以一蜆殼當吐出胸中惡汁嗣後兒飢渴更與之能令兒智慧無病長生壽考八四華他浴兒神方兒生三日用桃根李根梅根各八兩上三味以意著水多少煮令三四沸以浴兒能除諸瘡八五華他治初生兒無皮神方小兒初生無皮但有紅筋是為受胎未足之證可將米粉用絹袋包裹撲小兒周身數日後肌膚自能發生八六華他治初生兒驚啼不乳神方犀角銼屑十一分子芩五分梔子仁大黃各十分虎睛一枚上搗篩蜜和丸如梧子大每服七丸大小量之奶母忌熱面小兒熱風癇以乳汁或竹瀝研三丸服之瘥止八七華他治初生兒嘔吐不止神方人乳二合蘧蒢術小許鹽兩粟米大上三味煎三兩沸牛黃兩米許研和與服即瘥止八八華他治初生兒不小便神方人乳四合蔥白一寸上二味相和煎之分為四服即小便利神效八九華他治初生兒驚癇神方鉤藤二分知母子芩各四分甘草炙升麻沙參各三分寒水石六分蚱蟬去翅炙一枚蜣螂炙三枚上九味搗篩以好蜜和薄泔著銅鉢於沸湯上調之攪不停手如飴糖煎成稍稍別出少許一日啖如棗核大一枚日夜五六次五六日啖三枚百日兒四枚二百日至三百日兒五枚三歲兒啖七枚以意量之八一華他治小兒驚悸神方鉤藤人參蚱蟬炙子芩各一分蛇蛻皮炙三寸龍齒四分防風澤瀉各二分石膏碎一兩竹瀝一瓶上以水二升並竹瀝煎取七合分數次服之以瘥為度八一一華他治小兒夜啼神方芎藭防己白朮各二分上搗篩為散和以乳量其多少與兒服之又以兒母手掩臍中又以摩兒頭及脊二十日兒未能服散者以乳汁和之服如麻子一丸八一二華他治小兒客忤神方本症之起為有外人來氣息忤之其喉為頻吐下黃青白色水穀解離腹痛夭糾面色變易雖形似癇症但眼不上插耳方用龍膽鉤藤皮柴胡黃芩桔梗芍藥人參當歸茯神甘草炙各一分蜣螂炙二分大黃四分上以水一升煎取五合兒生一日至七日取一合為三服生八日至十五日分取一合半為三服生十六日至二十餘日或四十日盡以五合為三服十歲亦准此得下即止勿復服也八一三華他治小兒症癖神方牛黃二分鱉甲炙麥面熬柴胡大黃枳實炙芎藭各二兩厚朴炙茯苓桂心芍藥乾薑各半兩上搗篩蜜丸如小豆日三服以意量之八一四華他治小兒心下生痞神方芫花黃芩各四分大黃雄黃各十分上四味搗篩為末蜜和更搗一千杵三歲兒至一歲以下服如粟米一丸欲服丸內兒喉中令母與乳八一五華他治小兒痰結神方芒硝熬四分大黃四兩半夏二兩代赭一兩甘遂熬二兩巴豆去心皮熬三百枚杏仁一百二十枚上搗篩別搗巴豆杏仁令如膏搗數千杵令相和如嫌強可納蜜少許百日兒服如胡豆十丸過百日至一歲服二十丸余類推當俟兒大便中藥出為度若不出復與如初八一六華他治小兒羸瘦神方芍藥炙令黃十分黃耆鱉魚炙人參各四分柴胡八分茯苓六分甘草炙乾薑各二分上搗篩蜜和為丸如大豆服五丸日二服八一七華他治小兒食積神方生地黃汁生薑汁各三合訶黎勒四分研蜜白蜜一匙上相和調勻分溫服之微利尤良八一八華他治小兒胃痛神方白羽烏骨雞屎五錢曝乾松脂五錢上二味共研末蔥頭汁和丸梧子大黃丹為衣醋下五丸忌生冷硬物三四日立效八一九華他治小兒腹痛神方鱉甲炙郁李仁各八分防葵人參各五分訶黎勒皮七顆大黃四分桑菌三分上七味搗篩蜜丸大小量之以酒飲乳服五丸至十丸八二華他治小兒腹脹神方甘草炙鱉甲炙柴胡茯神子芩各六分訶黎勒皮十分檳榔帶皮研三顆芍藥橘皮各三分生薑當歸各四分知母五分大黃八分上以水一升半煎取七合分為數服得瀉病瘥八二一華他治小兒脾疳神方使君子蘆薈上二味等分研末米湯飲下一錢八二二華他治小兒傷乳神方大麥面微炒水調一錢服之極效八二三華他治小兒斷乳神方山梔燒存性一枚雄黃硃砂各二錢黃丹五分輕粉麝香各一分上六味搗篩於乳斷日乘兒熟睡時以脂麻油調敷眉上醒後即不思食乳八二四華他治小兒霍亂吐痢神方茯苓桔梗人參各六分白朮五分甘草炙厚朴炙各四分水三升煮取六合去滓溫服八二五華他治小兒霍亂空吐不痢神方人參六分生薑四分厚朴炙二分橘皮一分兔骨一兩炙碎上以水一升二合煎取四合服之即利並用杏仁鹽皂莢末各少許面和如棗核大綿裹內肛內便通即去奶母忌熱面八二六華他治小兒霍亂空痢不吐神方烏牛葹草思邈按葹即葈耳一團生薑人參各三兩上甜不醋漿水一升半煎取五合八二七華他治小兒乾霍亂神方甘草炙四分當歸二分石鹽三分以漿水一升半煎取六合別以牛黃麝香各半錢匙研細蜜半匙相和以下灌之即通奶母忌面肉八二八華他治小兒吐痢神方亂髮燒灰二分鹿角一分為末以米飲服一刀圭日三八二九華他治小兒噦氣神方生薑汁人乳各五合上二味合煎取五合分二服八三華他治小兒傷寒神方麥門冬十八銖石膏寒水石甘草各半兩桂心八銖上以水二升半煮取一升半分三服八三一華他治小兒寒熱神方雷丸二十枚大黃四兩黃芩一兩苦參石膏各三兩以水二斗煮取一斗半浴兒避眼及陰浴訖以粉粉之勿厚衣一宿復浴八三二華他治小兒潮熱神方蜀漆甘草知母龍骨牡蠣各半兩以水四升煮取一升去滓一歲兒服半合日再八三三華他治小兒溫瘧神方常山一錢小麥三合淡竹葉一升以水一升半煮取五合量兒大小分服八三四華他治小兒胎瘧神方冰糖五錢每日煎湯飲之十日自愈八三五華他治小兒疸瘧神方黃丹二錢以蜜與水相和服之冷者酒服八三六華他治小兒寒嗽神方紫菀杏仁黃芩當歸甘草橘皮青木香麻黃桂心各六銖大黃一兩上以水三升煮取九合去滓六十日至百日兒一服一合半百日至二百日兒一服三合八三七華他治小兒鹽哮神方脂麻秸瓦上燒存性出火毒研末豆腐蘸食八三八華他治小兒痰喘神方巴豆一粒杵爛綿裹塞鼻男左女右痰即自下八三九華他治小兒氣痛神方莪朮一錢炮熟為末熱酒下之自愈八四華他治小兒變蒸神方小兒生三十二日一夜六十四日再變兼蒸由是而至五百七十六日凡經九變八蒸乃始成人其所以有此變蒸者皆為營其血脈改其五臟故一變畢其情能忽覺有異其候身熱脈亂汗出目睛不明微似欲驚不乳哺上唇頭起小白泡狀如珠耳冷尻亦冷單變小微兼蒸增劇治宜先發其汗方用麻黃去節大黃各一分杏仁去皮尖熬令變色二分上三味先搗麻黃大黃為散杏仁別搗如脂乃細細內散又搗令調和訖納蜜器中一月兒服如小豆大一枚以乳汁和服之抱令得汗汗出溫粉粉之勿使見風百日兒服如棗核大以兒大小量之愈為度若猶未愈乃下之方用代赭赤石脂各一兩巴豆去心皮熬三十枚杏仁去皮尖熬五十枚先搗前二味為末次以巴豆杏仁別搗如霜又納二味合搗三千杵自相和若硬入少蜜更搗密器中盛封之三十日兒服如麻子一丸與少乳汁令下喉食頃後與少乳勿令多至日中當少下熱除若未全除明旦更與一丸百日兒服如小豆一丸以此准量增減此丸無所不治惟代赭須真若不能得可代以左顧牡蠣八四一華他治小兒風寒神方防風橘皮各三分羌活蘇葉各二分甘草一分蟬蛻三枚蔥白一寸生薑一片煎熱服取汗八四二華他治小兒狂躁神方梔子仁七枚豆豉半兩水一碗煎七分溫服或吐或不吐俱立效八四三華他治小兒自汗盜汗神方黃連牡蠣貝母各十八銖上搗篩和粉一斤粉兒身極效八四四華他治小兒吐血神方蛇蛻一枚燒為末以乳服之頗良八四五華他治小兒淋瀝神方蜂房亂髮共燒灰水下一錢日再八四六華他治小兒小便不通神方車前草一升小麥一升上二味以水二升煮取一升二合去滓煮粥服日三四八四七華他治小兒尿血神方鵲巢灰井花水送下服之自愈或以甘草煎汁服之亦效八四八華他治小兒遺尿神方瞿麥石葦龍膽皂莢桂心各半兩雞腸草人參各一兩上搗末蜜和丸如小豆大食後服五丸日三加至六七丸八四九華他治小兒泄瀉神方木鱉子一枚煨熟去殼小丁香三粒共為末米糊丸入小兒臍中封以膏藥自愈八五華他治小兒下血神方五倍子搗末蜜和丸小豆大米飲下每服二十丸八五一華他治小兒黃疸神方川黃連胡黃連各一兩上二味共為末再以胡瓜一枚去瓤留蓋納藥其中合定後面裹煨熟去面搗成泥更為丸如緑豆大每服三錢溫水調下八五二華他治小兒急驚風神方連翹去心研柴胡地骨皮龍膽草鉤藤黃連梔仁炒黑黃芩酒炒麥冬去心木通赤苓去皮車前子枳實炒各四分甘草薄荷各二分滑石末八分燈芯一團淡竹葉三片水煎分數次服凡急驚初起宜服此劑如服後痰熱未除宜使之微泄八五三華他治小兒慢驚風神方胡椒生薑炮肉桂各一錢丁香十粒上搗成細末灶心土三兩煮水極澄清用以煎藥約得大半碗頻頻灌之再用熟地五錢人參當歸黃耆炙破故紙棗仁炒研枸杞子各二錢生薑炮萸肉甘草炙肉桂各一錢再加生薑三片核桃二枚紅棗三枚打碎為引仍以灶心土二兩煮水煎藥取濃汁一茶杯加附子五錢煎水摻入量兒大小分數次服之如咳嗽不止者加米殼一錢金櫻子一錢如大熱不退加白芍一錢泄瀉不止加丁香六分只服一劑即去附子用丁香七粒此方治本病極有效果八五四華他治小兒卒死神方凡小兒卒死而吐痢不知是何病者馬矢一丸絞取汁以吞之無濕者水煮取汁八五五華他治小兒解顱神方細辛桂心各半兩乾薑十八銖上三味為末以乳汁和敷顱上干復敷之兒面赤即愈八五六華他治小兒囟陷神方烏頭附子各二錢雄黃八分先將前二味去皮臍搗末次加入雄黃共研並以蔥白搗汁和貼患處八五七華他治小兒赤眼神方黃連為末水調敷足心甚佳八五八華他治小兒鬥睛神方眼珠固而不能動是謂鬥睛方用犀牛黃五分白附子炮肉桂全蠍炒川芎石膏各一錢白芷薷香各二錢共研末蜜為丸芡實大每服一二丸薄荷湯下八五九華他治小兒雀目神方小兒一至晚間忽不見物是名雀目治用仙靈脾根晚蠶蛾各五錢甘草炙射干各二錢五分以羊肝一枚切開摻藥二錢扎定以黑豆一合米泔一盞煮熟分二次送下八六華他治小兒目澀神方月內小兒目閉不開或紅腫羞明或時時出血是名目澀治用甘草一節以豬膽汁炙為末每用米泔水調少許灌服八六一華他治小兒聤耳神方小兒耳中時有膿汁流出是名耵耳以白礬麝香共研勻摻耳中日夜各一次八六二華他治小兒耳瘡神方馬骨燒灰香油調敷或用雞屎白曝乾研末由筒中吹入均效八六三華他治小兒耳爛神方大棗煅灰存性與輕粉等分研和調敷數日自愈八六四華他治小兒鼻疳神方蘭香葉燒灰二錢銅青五分輕粉二分日敷三次當愈八六五華他治小兒鼻䘌神方小兒鼻下兩道現赤色有疳是名鼻䘌以熊膽半分用熱湯化開塗之極有效八六六華他治小兒鼻塞神方杏仁半兩蜀椒附子細辛各六銖上以釅醋五合漬藥一宿明日以豬脂五合煎令附子色黃膏成去滓待冷更以塗絮導鼻孔中日再兼摩頂八六七華他治小兒鵝口神方取父母亂髮洗淨纏桃枝沾取井花水東向向日以發拭口中白乳以置水中七過洗三朝作之或以白鵝屎汁瀝口中良八六八華他治小兒口瘡神方大青十八銖黃連十二銖以水三升煮取一升五合一服一合日再夜一八六九華他治小兒口噤神方鹿角粉大豆末上二味等分和乳塗乳上飲兒八七華他治小兒口中流涎神方驢乳豬乳各二升上二味合煎得一升五合服如杏仁許三四服瘥八七一華他治小兒重舌神方黃柏以竹瀝浸取汁液細細點於舌上或以赤小豆為末合醋塗於舌上亦效八七二華他治小兒舌膜神方凡初生小兒有白膜一層包被舌尖或遍及全舌此名舌膜急用指甲刮破令出血以白礬火煅研末敷於舌上自愈八七三華他治小兒舌筍神方小兒舌上忽發白泡一粒名曰舌筍患此者必不乳而啼哭不治且死即用鮮生地絞汁塗患處數次自愈若無鮮者可用乾生地以涼井水浸開搗爛取汁亦有效八七四華他治小兒舌瘡神方桑白汁塗乳與兒飲之或以羊蹄骨中生髓和胡粉敷之亦效八七五華他治小兒舌腫神方飲羖羊乳即瘥或以砂糖納醋中滿含口中亦效八七六華他治小兒蛇舌神方小兒之舌常卷於兩邊口角此名蛇舌取木芙蓉根皮或花葉捶極融爛以雞子二枚和勻煎熱待冷敷心口及臍部用布扎緊之極效或以明雄黃為末點舌數次亦佳八七七華他治小兒牙疳神方雄黃一錢銅青二錢共為末調敷或以膽礬一錢在匙上煅紅加麝香少許研勻敷齒上八七八華他治小兒走馬疳神方石膏蘆薈茯苓生地天花粉各一錢黃柏五分人參三分甘草炙三錢水煎服數劑必輕外用人中白煅一錢銅緑三分麝香一分蚯蚓二條先以蔥白汁浸次以火煅各為細末敷之立愈八七九華他治小兒咽腫神方升麻射干大黃各一兩水一升五合煎取八合一歲兒分三服以滓敷腫上冷更暖以敷大兒以意加之八八華他治小兒喉痹神方桂心杏仁各半兩上二味為末以綿裹如棗大含咽汁八八一華他治小兒唇緊神方赤莧搗汁洗之極效或以葵根燒灰酥調塗之八八二華他治小兒唇腫神方桑木汁塗之腫自漸消八八三華他治小兒頸軟神方生南星生附子去皮臍各二錢上二味搗末薑汁調為餅貼天柱骨上自愈八八四華他治小兒臍腫神方杏仁半兩豬頰車髓十二銖上二味先研杏仁如脂如髓敷臍中腫上八八五華他治小兒臍濕神方白石脂研極細再熬令微暖以粉臍瘡日三四度八八六華他治小兒臍風神方本症發生必在兒生七日以內其候面赤喘啞臍上起青筋一條自臍而上衝心口宜乘其未達心口時急以艾絨在此筋頭上燒之此筋即縮下寸許再以縮下之筋上燒之則其筋自消而疾亦告痊內用薄荷三錢熬成濃汁灌入二三口不可過多立愈如神八八七華他治小兒落臍瘡神方小兒落臍之時臍汁未乾或因尿液浸沁或由入浴時未曾將水拭乾因以成瘡治用茯苓一錢貝母枯礬三七各三分雄黃二分草紙灰五分共研末摻臍內用紙裹之自愈八八八華他治小兒陰偏大神方雞翅六莖燒灰服之隨卵左右取翮八八九華他治小兒核腫神方青木香甘草石膏甘遂各十八銖麝香三銖大黃前胡各一兩黃芩半兩水七升煮取一升九合每服三合日四夜二八九華他治小兒陰腫神方狐莖炙搗末酒下極效或絞取桑木白汁塗之或搗垣衣或以衣中白魚敷之均效八九一華他治小兒陰瘡神方黃連胡粉二物等分研末以香脂油和敷之八九二華他治小兒氣㿗神方木瓜根芍藥當歸各一兩上以水二升煮取一升服五合日二八九三華他治小兒脫肛神方文蛤四兩朴硝四兩以水二升煎湯入朴硝通手淋洗至水冷方止若覺熱痛可用熊膽加龍腦化塗之八九四華他治小兒吞錢神方燒火炭末服方寸匙即出或以臘月米餳頓服半升或濃煎艾汁服之皆效八九五華他治小兒發遲神方揪葉搗取汁敷頭上立生或燒鯽魚灰末以醬汁和敷之亦效八九六華他治小兒白禿神方蔓荊子搗為末以豬脂調塗禿處久之發自生或以芫花與豚脂和如泥洗去痂敷之日一度八九七華他治小兒禿瘡神方雄雞屎陳醬汁苦酒和以洗瘡了敷之或先洗去其痂次敷以葶藶子細末八九八華他治小兒頭瘡神方苦參黃芩黃連黃柏大黃甘草芎藭各一兩蒺藜一合以水六升煮取三升漬布拓瘡上日數遍八九九華他治小兒面瘡神方麻子五升為末以水和絞去汁與蜜和敷之若有白犬膽敷之尤佳八一華他治小兒胎熱丹毒神方初發時赤腫光亮遊走遍身故一名赤遊風首用升麻葛根白芍柴胡黃芩梔子各一錢木通甘草各五分以水二碗煎取一碗令子母同服次用金銀花三錢牛蒡子炒防風荊芥當歸川芎白芍黃芩連翹各八分木通甘草各四分水煎服子母共之甚者加大黃及麻仁八一一華他治小兒惡瘡神方豉熬令黃為末敷瘡上不過三敷愈八一二華他治小兒浸淫瘡神方灶中黃土發灰上二味各等分為末以豬脂和敷之八一三華他治小兒黃爛瘡神方四交道中土灶下土上二味各等分為末敷之亦治夜啼又燒牛屎敷之亦可減瘢八一四華他治小兒濕癬神方枸杞根搗作末和臘月豬脂敷之或以馬尿洗之亦效八一五華他治小兒鱗體神方初生小兒身如蛇皮鱗甲名曰胎垢宜用白殭蠶去嘴為末煎湯洗之若加入蛇蛻更效八一六華他治小兒熱毒癰疽神方漏蘆連翹白蘞芒硝甘草各六銖升麻枳實麻黃黃芩各九銖大黃一兩上以水一升半煎取五合兒生一日至七日取一合分三服八日至十五日者取二合分三服以後隨小兒出生之日據前例遞增八一七華他治小兒熱癤神方水銀胡粉松脂各三兩先以豬脂四升煎松脂俟水氣盡下二物攪至水銀不見敷之八一八華他治小兒風疹神方麻黃一兩半獨活射干甘草桂心青木香石膏黃芩各一兩上以水四升煮取一升三歲兒分為四服日再或以枯礬投入熱酒中馬尾數條作團蘸酒塗之良佳八一九華他治小兒瘰癧神方連翹獨活桑白皮白頭翁丹皮防風黃柏淡豆豉肉桂秦艽各五錢海藻一錢五分上搗篩為末蜜和丸用燈芯煎湯下八一一華他治小兒羊鬚瘡神方煙膠五錢羊鬍鬚一撮輕粉一錢上共為末濕則干搽干則油調搽上即瘥八一一一華他治小兒疥瘡神方雄黃研雌黃研各一兩烏頭一枚松脂亂髮各一雞子許豬脂一升半上六味和煎之候發消烏頭色黃黑膏成去滓敷之或熱塗之八一一二華他治小兒水痘神方柴胡桔梗各一錢茯苓二錢生甘草黃芩各五分竹葉十片燈芯草一團水煎服有痰者加天花粉三分有食者加山楂二粒麥芽三分有火加黃連一分八一一三華他治小兒發疹神方元參金銀花生地黃各三錢麥冬桂枝各二錢蘇葉天花粉甘草各一錢升麻黃芩各八分橘皮三分上以水二碗煎取一碗熱服夏季加青蒿三錢初生或數月減半
