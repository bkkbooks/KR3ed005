body:
  text: 卷二十華佗制煉諸藥神方二一華佗煉元明粉秘法元明粉最能降火化痰清利臟腑危症服之可蠲狂躁用之即愈煉法宜於冬至後取淨朴硝十斤以水一斗五升白蘿蔔五斤同硝入鍋內煮化俟沸足撈去蘿蔔乃以綿紙二層攤竹絲箕內乘熱過濾將其汁置露天中三日其硝即逐漸凝結瀝去余水干之將硝取下再用砂鍋傾炭爐上將硝一碗化開煎沸以銅匙鏟攪將成凝結時鏟入小魚酢罐內上空寸許再下硝煉如此已畢每一罐下以三釘如品字形釘入地中上留半寸在外將罐浮頓釘頭上以瓦覆口周圍以磚砌成百眼爐圍繞離罐寸許以著火之炭安入爐內四圍及頂火底火須同時相護俟罐硝紅為度次日將罐取出預以綿紙平鋪潔淨陰地上將硝自罐中傾出碾細以絹篩於棉紙上厚約一錢三日後其硝復活色白如粉輕虛成片再以缽盛之除去潮氣收藏候用二二華佗煉硝石秘法取潔淨朴硝半斤納罐中以炭火熔化煎乾煅紅住火冷定取出即成硝石收藏候用二三華佗鍊金頂砒秘法以鉛一斤內小罐中用炭火煨化投白砒二兩於烊化鉛上煉至煙盡為度冷定打開其金頂砒即結於鉛之面上取下收藏聽用二四華佗取紅鉛秘法紅鉛為女子第一次初至之天癸凡女子二七而天癸至是為陰中之真陽氣血之元稟將行之前兩頰先若桃花之狀陽獻陰藏則半月之內必來可預以白綿綢一尺五寸洗淨常用綿帶一條束臍下將綿綢兩尖端繫於帶上兜住陰器經至盡染綢上其初至之紅鉛狀如魚眼色紅而明光澤如珠余經換綢兜取陰乾浸於上白童便內片時後其經自然脫下聚置磁盆陰乾聽用如次經以後但未破身者俱可聚取陰乾於瓷盆升煉之色如紫霜本品之第一次至者為接命至寶服法以陳酒和下逾時即昏醉不醒飲以人乳日後自蘇服後如能屏絕房室得延壽一紀其第二次以後之經水如合入二元丹用人乳服之亦能接命延年卻除百病次方異常神秘不宜輕泄二五華佗取金汁秘法本品之主治功用如救中砒毒河豚毒皆極神效又如傷寒陽毒發狂疔瘡痧症毒氣入內煩躁口渴脈大有力等症皆可治之取法以大毛竹一連二節用刀削去外青一半以磚扎節中沉入糞窖內一年後取起以長流水浸一日取起鑽開節孔即有清水流出是即金汁瓷罐收貯候用二六華佗取蟾酥秘法凡蟾不拘大小莫不有酥取法可用寬幅銅鑷鉗蟾之眉梭高肉上微緊旋即拔去酥即凝於鑷內多則刮下陰乾之其已經取過之蟾避風二日後仍送草園中自不致傷害其生二七華佗製附子秘法擇附子之大者以童便漬淹三寸每日換便浸至夏三冬五再換童便煮盡二香為度去皮臍線穿陰乾或日中曝之亦可收藏候用二八華佗種空青秘法空青為點眼神藥天產者極不易得今以人工種之其效與天產者不殊方用朴硝半錢白蒺藜龍膽草各一分仙靈脾葉旋覆花各一錢共為未以黃泥一塊如拳大同藥和勻水調似軟飯作成土餅用太平錢五枚按五方排定於光面書金木水火土五字所寫字向下錢字向上隨五方安之用硇砂如豆大每錢安四塊在四字孔罅中須要干黃土上順著土餅覆以新砂盆又將燥黃土覆盆冬月十日夏月五日取出於錢上摘取下細研入藥不可老亦不可嫩須得中也二九華佗煉鍾乳秘法本品能強陰益陽通百節利九竅補虛勞下乳汁服之令人陽氣暴充飲食倍進形體壯盛選擇法不問厚薄但令顏色明淨光澤者即堪入煉惟黃赤二色者不堪用煉時置一斤於金銀器中則以大鐺著置乳器於其中令沒煮之常令如魚眼沸水減更添若薄乳三日三夜若雁齒及厚肥乳管七日七夜俟乳色變黃白即熟如疑生更煮滿十日為佳煮訖出金銀器其鐺內水盡黃濁棄之勿令人服更著清水還納上件乳器煮之半日許出之其水猶清不變即止乳無毒矣二一華佗研鍾乳秘法取所煉鍾乳於瓷器中用玉錘搗令碎著水研之水盡更添常令如稀泔上乳細者皆浮在上粗者沉在下復繞錘研之易碎滿五日狀如乳汁至七八日其乳放白光非常可愛取少許置臂上試之狀如檢書中白魚滑自然白光出便以澆之不隨水落便熟若得水而落者便生更須研之以不落為度熟已澄取曝乾丸散任意服之
