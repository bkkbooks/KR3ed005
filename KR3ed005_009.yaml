body:
  text: 卷九華他眼科神方九一華他治虛火目痛神方凡虛火目痛其候紅而不痛不澀無眵無淚內服用熟地茯苓山藥山茱萸丹皮澤瀉各三錢白芍當歸甘菊花各三錢柴胡一錢以水煎服一劑輕二劑愈外用生地黃二錢葳蕤仁五分漬於人乳半碗中越宿再加白礬半分加水半碗時時洗之九二華他治有火目痛神方本症之狀目紅腫如含桃淚出不止痠痛羞明夜眠多眵治用黃連一錢紅椒七粒白礬三分荊芥五分生薑一片水煎半碗乘熱洗之日凡七次明日即愈九三華他治目腫神方患者目紅腫而痛狀如針刺眵多淚多治用柴胡梔子白蒺藜各三錢半夏甘草各一錢水煎服一劑即可奏功九四華他治眼暴痛腫神方決明子一升石膏研升麻各四兩梔子仁一升地膚子茺蔚子各一兩苦竹葉干藍葉各一升芒硝二兩車前草汁一升二合麥冬三升上以水二斗煮竹葉取七升二合去滓納諸藥煮取四升分為四服每服相去可兩食間再服為度小兒減藥以意裁之九五華他治眼赤神方蕤仁黃芩梔子仁黃連秦皮各二兩竹葉一升上以水五升煮取一升六合分三服外用淡竹葉五合黃連四枚青錢二十文大棗二十枚去皮核梔子仁七枚車前草五合上以水四升煮取二升日洗眼六七次極效九六華他治肝熱眼赤神方黃連秦皮各三兩上以水三升煮取一升五合去滓食後溫服分二次如人行七八里九七華他治目赤纍年神方胡粉六分蕤仁四分先研蕤仁使碎納胡粉中更熱研又搗生麻子為燭燃使著別取豬脂肪於燭焰上燒使脂流下滴入蕤仁胡粉中更研攪使均如餳以綿纏細杖子納藥內承軟點眼兩眥藥須臾冷還於麻燭上燒而用之九八華他治目中起星神方白蒺藜三錢水煎汁日洗眼七八次三日即除九九華他治風眼下淚神方雞舌香二銖黃連六銖乾薑一銖蕤仁一百枚礬石熬二銖上搗為末以棗膏和丸如雞距以注眼眥忌豬肉九一華他治目中風腫神方礬石熬末二錢以棗膏和如彈丸以揉目上下食頃止日三九一一華他治眼暗不明神方防風細辛各二兩芎藭白蘚皮獨活各三兩甘草炙橘皮去脈各二兩大棗去核二七枚甘竹葉一升蜜五合以水一斗二升煮取四升去滓下蜜更煎兩沸分為四服九一二華他治眼中息肉神方驢脂石鹽上二物和勻以之點眥即瘥九一三華他治眼珠脫出神方越燕矢真丹乾薑各等分上搗為細粉以少許點之良妙九一四華他治眼珠縮入神方老薑一塊燒極熱敷於眉心即愈九一五華他治風眼赤爛神方宣黃連去須半兩大棗肉去核三七枚杏仁不去皮尖五十粒腦子一付上以雪水一升砂鍋內文火煮留一盞許窨三七日以銅箸點食後臨臥日可三四次點之九一六華他治火眼赤爛神方艾葉燒煙以碗覆之俟煙盡由碗上將煤刮下溫水調化洗眼即瘥若入以黃連尤佳九一七華他治爛弦風神方枯礬一兩銅青三錢共研成末沸水溶之俟澄清後取以點洗極效九一八華他治眥爛多膿神方乾薑決明子礬石蕤仁細辛黃連戎鹽各六銖銅青三銖上以水少許漬一宿翌晨以白蜜八合和之著銅器中綿蓋器上著甑中以三斗麥屑蒸之飯熟藥成去滓以新死大鯉魚膽二枚和納藥中又以大錢七粒常著藥底兼常著銅器中竹簪綿裹頭以注目眥晝夜三四不避寒暑數著藥訖又以魚膽和好覆藥器頭勿令氣泄九一九華他治瞼腫如粟神方俗名偷針眼取生南星生地黃各等分同研成膏貼二太陽穴腫自漸消九二華他治瞼腫如瘤神方俗名櫻桃核即以櫻桃核磨搽瘤自漸消九二一華他治睛上生暈神方取大鯉魚膽滴銅鏡上陰乾竹刀刮下點入少許暈自漸消九二二華他治黑子障目神方雞子二枚蒸熟去殼與桑寄生同入水中煮之略和以砂糖食之數次自愈九二三華他治失明神方青羊肝一具去上膜薄切之以新瓦盆子未用者淨拭之納肝於中炭火上炙令極燥脂汁盡取之別搗決明子半升蓼子一合熬令香下篩三合和更篩以飲汁食後服方寸匙漸加至三匙不過兩劑能一發復可夜讀書九二四華他治青盲神方以豬膽一枚微火煎之丸如黍米納眼中食頃內服用黃牛肝一具土瓜根三兩羚羊角屑三升蕤仁三兩細辛六兩車前子一升上六味藥合肝於瓶中春夏之月封之十五日冬月封之二十日出曝乾搗下篩酒服方寸匙九二五華他治雀目神方老柏白皮四兩烏梅肉熬二兩細辛地膚子各四兩上搗篩為散每食後清酒服二方寸匙日三四服瘥又於七月七日九月九日取地衣草洗淨陰乾末之酒和服方寸匙日三服一月即愈九二六華他治白翳神方珊瑚琥珀玉屑曾青紫貝硃砂伏雞子殼去白皮上七味各等分研重篩為散仰臥以米許置翳上四五度九二七華他治赤翳神方熊膽五分以淨水略調去盡筋膜塵土加冰腦一分研勻癢則加生薑粉少許紙卷點眼九二八華他治瘴翳神方秦皮黃柏黃連黃芩決明子蕤仁各十八銖梔子七枚大棗五枚上以水二升漬煮取六合澄清仰臥洗日一九二九華他治目眯神方豬膏如半雞子大裹鼻孔中隨眯左右著鼻中以嗡之即便仰臥須臾不知眯處九三華他治目癢神方煎成白鹽三匙烏賊魚骨去甲四枚上二味以清酢漿水四升煎取二升澄清每旦及晚洗眼極效九三一華他治目澀神方於上巳或端午日採取青蒿花或子陰乾為末每次用井花水空腹下二錢久服自愈九三二華他治目睛擊傷神方煮羊肉令熟尉勿令過熟豬肝亦得九三三華他治物傷睛突神方如目系未斷者即納入急搗生地黃汁綿裹縛之切要避風九三四華他治瞳仁反背神方密蒙花蟬蛻白菊郁李仁生石膏生草決明石決明甘草穀精草白礬各四錢百部二錢珍珠四分共為末煮服若即發冷者其光必轉若光未盡轉再服一劑必愈九三五華他治畏日羞明神方石決明黃菊花甘草各一錢水煎冷服九三六華他治拳毛倒睫神方平晨日未出之際令一眼明人把鑷子拔之去倒睫毛勿使毛斷連根去之下手十減八九疼痛立止至夜點千歲虆汁三五日將息方得平復忌風寒日月光及煙火房室五辛九三七華他治麥芒入目神方取生蠐螬以新布覆目上將生蠐螬從布上摩之芒出著布良九三八華他治竹木入目神方以書中白魚和乳汁注目中良九三九華他治沙石入目神方以雞肝搗爛塗之極效九四華他治石灰入目神方先以蕓薹油洗滌更滴入糖水少許不久自愈九四一華他治鹼水入目神方以清水洗滌眼部自愈若用新鮮牛乳點之尤效九四二華他治飛絲入目神方雄雞冠血滴入目中見有紅絲即捲去之此方極效九四三華他治雜物入目神方新桑根皮洗淨搗爛入眼撥之極良
