body:
  text: 卷十三華他喉科神方一三一華他治喉痹神方喉痹者喉里腫塞痹痛水漿不得入也治用馬藺根一升升麻玄參各三兩瞿麥通草犀角屑各二兩射干十兩以水八升煮取二升去滓細細含咽一日令盡得破膿一三二華他治喉痹口噤神方草烏頭皂莢等分為末入麝香少許入牙並搐鼻內牙關自開一三三華他治急喉痹神方豬牙皂白礬黃連各等分瓦上焙乾為末以藥半錢吹入喉中少頃吐出膿血立愈一三四華他治客熱咽痛神方風邪客於喉間氣鬱成熱故為痛也方用薄荷防風玄參甘草片芩酒炒梔子各五分桔梗連翹各一錢大黃酒炒芒硝牛蒡荊芥各七分水煎食後溫服外用寒水石半兩煅紅硼砂牙硝硃砂各一錢龍腦五分共為細末摻入喉中每次一錢一三五華他治客寒咽痛神方寒氣客於會厭卒然如啞是為寒氣與痰涎凝結咽喉之間宜以甘辛溫藥治之忌寒涼方用母薑汁一升酥牛骨髓各一升桂心秦椒各一兩防風一兩半芎藭獨活各一兩六銖上為末納薑汁中煎取相淹濡下酥髓等合調微火三上三下煎平旦溫清酒一升下膏二合即細細吞之日三夜一一三六華他治咽痛失音神方栝蔞一枚白殭蠶去頭炒半兩甘草炙二兩上為細末每服三錢溫酒或生薑自然汁調下或用綿裹噙化咽津亦得日兩三服一三七華他治咽喉妨悶神方喉間痰氣結聚成核久而不散則生燥澀凡婦人多郁者恆患之治用厚朴薑汁炙赤苓紫蘇葉各一兩半夏薑製一兩半每服三錢入生薑三片同煎食後溫服一三八華他治喉腫神方豉一升半犀角屑一兩羚羊角屑一兩芍藥三兩升麻四兩杏仁去皮尖一兩甘草炙二兩梔子七枚上以水七升煮取一升半去滓分三服忌海藻菘菜一三九華他治喉痛神方敗筆一枝燒屑以漿飲服一方寸匙良驗或用龍腦三分殭蠶五釐硼砂二錢半牙硝七錢半共研細末吹患處立效一三一華他治喉閉神方鴨嘴膽礬研細以釅醋調灌藥下咽後即吐出膠痰其症自瘥一三一一華他治喉瘡神方生地黃五兩青竹茹玄參雞蘇各二兩茯苓升麻麥門冬去心各一兩上以水八升煮取二升五合去滓分三次服之每次如人行七八里忌生冷熱面炙肉油酢一三一二華他治喉風神方天南星三十枚大半夏白礬白鹽防風朴硝各四兩桔梗二兩甘草一兩大梅實擇七分熟者一百枚先將硝鹽水漬一伏時然後將各藥研碎方將梅實置於水淹過三指為度浸七日取出曝乾又入水中浸透曝之俟藥水干為度方將梅子入磁罐封密如霜衣白愈佳用時綿裹噙口中徐徐咽汁下痰出自愈一三一三華他治實火喉蛾神方山豆根黃連半夏柴胡甘草桔梗天花粉各二錢水煎服二劑自愈一三一四華他治虛火喉蛾神方本症與前症之區別系前症為口燥舌乾而開裂本症則口不甚渴舌滑而不裂前症晨重夜輕本症則反是證候不同治法自異法宜引火歸原火勢既除病自消亡方用熟地黃玄參各一兩茯苓五錢山藥山茱萸各四錢白芥子三錢肉桂二錢北五味子一錢水煎服一劑而痛除腫消二劑全愈一三一五華他治喉痧神方西牛黃五釐龍腦三釐珍珠三分人指甲男病用女女病用男五釐象牙三分焙壁錢土壁磚上者可用木板上者不可用二十枚焙青黛六分共為細末吹患處極效一三一六華他治喉癬神方龍腦莧菜根煅灰薄荷黃柏各一錢硼砂兒茶各一錢五分人中白山豆根胡黃連各二錢枯礬青黛龍骨烏梅肉各五分上各為末和勻吹用一三一七華他治喉癰神方可取蟾酥丸噙之見十一卷鼻疔項一二丸即愈一三一八華他治喉癤神方初生如梅核吐之不出咽之不下久之漸上於喉結之間宜用焰硝一兩五錢硼砂五錢雄黃二錢白殭蠶一錢龍腦二分共研末含之口中勿咽下一三一九華他治聲啞神方硼砂一兩訶子肉二錢元明粉膽星各一錢龍腦三分上共為末用大烏梅一兩搗爛和丸如彈丸大含於口中經宿即愈或用杏仁三分熬之別杵桂一分和如泥取李核用綿裹細細含之日五夜三一三二華他治喉癢神方薄荷二分麝香五釐研成細末吹入喉中俟吐出涎水碗許後再以陳米二合煎湯飲之切不可先飲茶酒湯水否則難治一三二一華他治喉爛神方銼薔薇根濃煮汁含漱之冬用根夏用枝葉一三二二華他治雜物鯁喉神方好蜜以匕抄稍稍咽之令下一三二三華他治魚骨鯁喉神方取飴糖丸如雞子黃者吞下不出又吞以漸大作丸用得效一三二四華他治諸骨鯁喉神方虎骨為末水服方寸匙即下或吞螻蛄腦亦下一三二五華他治竹木刺喉神方於臘月中取鱖魚膽懸北檐下令乾每服取一皂子許以酒煎化溫溫呷之若得逆便吐物即隨頑涎出若未吐更飲溫酒但以吐為妙酒即隨性量力也若未出更煎一塊子無不出者若求鱖魚不得蠡魚鯇魚鯽魚俱可臘月收之甚佳一三二六華他治鐵針刺喉神方癩蝦蟆數只去頭倒懸流血承以碗得杯許灌入喉中逾時連針吐出針自柔曲一三二七華他治諸豆鯁喉神方螻蛄數枚搗爛敷喉外腫處其豆自下一三二八華他治百物鯁喉神方茯苓貫衆甘草上等分米飲下一錢
