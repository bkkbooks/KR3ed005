body:
  text: 卷十華他耳科神方一一華他治耳聾神方巴豆杏仁各七枚印成鹽兩顆生地黃極粗者長一寸半頭髮雞子大燒灰上五味冶下篩以綿薄裹納耳中一日一夜若小損即去之直以物塞耳中俟黃水及膿出漸漸有效不得更著一宿後更納一日一夜還去之依前一二華他治暴聾神方細辛菖蒲杏仁曲末各十銖上和搗為丸干即著少豬脂取如棗核大綿裹納耳中日一易小瘥二日一易夜去旦塞一三華他治久聾神方萆麻子五分杏仁四分桃仁去皮尖熬四分巴豆去皮熬一枚石鹽三分附子炮薰陸香各一分磁石研菖蒲各四分蠟八分通草二分松脂二兩半先搗菖蒲石鹽磁石通草附子薰陸香成末別搗萆麻子等四味乃納松脂蠟搗一千杵可捻作丸如棗核大綿裹塞耳中日四五度抽出別捻之三日一易以瘥為度一四華他治風聾神方生雄鯉魚腦八分當歸菖蒲細辛白芷附子各六銖先將各藥搗末次以魚腦合煎三沸三下之膏香為成去滓候冷以一棗核大納耳中以綿塞之取瘥一五華他治腎虛耳聾神方鼠膽一具龍齒一分龍腦麝香硃砂各一分乳香潮腦各半分上研成極細末人乳為丸大如桐子裹以絲綿塞入耳中以不可受而止三日後取出耳聰永不復聾一六華他治病後耳聾神方菖蒲根一寸巴豆去皮心一粒二物合搗篩分作七丸綿裹臥即塞夜易之十日自愈一七華他治耳鳴神方當歸細辛芎藭防風白芷各六銖上為末以鯉魚腦八兩合煎三上三下膏成去滓取棗核大灌耳中旦以綿塞耳孔一八華他治耳痛神方菖蒲附子各一分上二味末之以麻油調和點耳中痛立止一九華他治耳癢神方生烏頭一枚削如棗核大塞入耳內日換數次三五日即愈一一華他治耳腫神方栝蔞根削可入耳以臘月豬脂煎之三沸冷以塞耳中取瘥日三作七日愈一一一華他治耳定神方取十大功勞葉煎取葉尖瓦上煅灰研細加冰片研勻吹入耳中自愈一一二華他治聤耳神方菖蒲一兩狼毒附子炮磁石燒礬石熬各一兩上搗篩以羊髓和如膏取棗核大塞耳以瘥為度一一三華他治纏耳神方取舊竹之經蟲蛀蝕者研為細末加麝香少許和勻吹入耳中極神效一一四華他治耳痔神方硇砂一錢輕粉雄黃各三錢龍腦五釐研細和勻水調濃用穀草細根咬細如毛蘸點患處並用梔子川芎熟石膏當歸牛蒡子柴胡白芍酒炒丹皮甘草各二錢黃芩黃連各五錢水煎食後服二劑當愈一一五華他治耳中有膿神方吳白礬燒汁盡八分麻勃思邈按即大麻花一分青木香二分松脂四分上四味搗末先消松脂後入藥末可丸如棗核淨拭以塞耳中取瘥一一六華他治耳爛有膿神方橘皮一錢燈芯燒灰一錢龍腦一分共為末和勻吹耳中極效一一七華他治耳中膿血神方鯉魚腦一枚鯉魚腸一具洗淨細切鯉魚鰓三枚烏麻子一升熬令香先搗麻子使碎次用余藥搗為一家納器中微火熬暖布裹敷耳得兩食頃開之有白蟲出更作藥若兩耳並膿出用此為一劑以敷兩耳若止一耳分藥為兩劑不過三敷便瘥慎風冷一一八華他治耳中出血神方生地一兩麥冬一兩水二碗煎取一碗食後頓服外用麝香一分沉香三分白礬一錢糯米五十粒共為末糊丸梧子大薄綿裹之如左耳出血塞右鼻右耳出血塞左鼻兩耳出血塞兩鼻一一九華他治凍耳成瘡神方生薑絞取汁熬膏塗之忌用火烘湯泡犯之者則肉死一二華他治耵聹堆積神方搗自死白項蚯蚓安蔥葉中用面封頭蒸令熱並化為水以汁滴入耳中滿即止不過數度即挑易出瘥後發裹鹽塞之一二一華他治耳內濕瘡神方蛇床子黃連各一錢輕粉一分共研末和勻吹之一二二華他治水銀入耳神方以黃金或金飾器枕耳自出一二三華他治百蟲入耳神方以雞冠血滴入耳中即出或搗韭菜汁灌耳中亦效一二四華他治蜈蚣入耳神方以木葉裹鹽炙令熱以掩耳上即出冷復易之或炙豬肉掩耳自出一二五華他治蚰蜒入耳神方熬胡麻搗之成末盛葛囊中枕之蟲聞香則自出或以牛酪灌滿耳即出出當半銷若入腹中空腹食好酪一二升即化為黃水而出不盡更作服一二六華他治螞蟻入耳神方燒鯪鯉甲末以水和灌之即出或炙豬脂安耳孔邊蟲自出一二七華他治飛蛾入耳神方先大吸氣仍閉口掩鼻呼氣其蟲隨氣而出或用醬汁灌入耳中亦效又可擊銅器於耳旁一二八華他治壁虎入耳神方秦椒末一錢醋半盞浸良久少少灌耳中自出或以雞冠血滴入耳中亦效一二九華他治蚤蟲入耳神方菖蒲末炒熱盛於葛囊枕之蟲自出一三華他治床蝨入耳神方緊閉口目以一手掩鼻孔一手掩其餘一耳力屏其氣蟲自出或用香油滴耳亦效一三一華他治蛆蟲入耳神方杏仁搗如爛泥取油滴入耳中非出即死一三二華他治水入耳神方以薄荷汁點之立效一三三華他治耳中有物不可出神方以麻繩剪令頭散敷好膠著耳中物上黏之令相著徐徐引之令出
