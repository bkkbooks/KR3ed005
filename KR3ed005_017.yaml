body:
  text: 卷十七華他急救法神方一七一華他救縊死神方凡自縊死旦至暮雖已冷必可活暮至旦則難療此謂其晝則陽盛其氣易通夜則陰盛其氣難通也治法先徐徐抱解其繩不得截斷上下安被臥之一人以腳踏其兩肩手挽其發勿縱之一人以手按據胸上數動之一人摩捋臂脛屈伸之若已僵但漸漸強屈之並按其腹如是一炊頃氣從口出呼吸眼開而猶引按莫置亦勿苦勞之並稍稍與以粥湯自能回生或以山羊血菖蒲蘇葉各二錢人參半夏各三錢紅花皂角刺麝香各一錢各為末蜜為丸如龍眼核大酒化開即以人口含藥水用蔥管送入死人喉內少頃即活此丸神效之極唯修合之時以端午日為佳一七二華他救溺死神方以灶中灰布地令厚五寸以甑側著灰上令死者伏於甑上使頭少垂下炒鹽二方寸匕內竹管中吹下孔中即當吐水水下因去甑以死人著灰中擁身使出鼻口即活或以一人將死者雙足反背在肩上行二里許則水必由口中而出乃置之灰內半日任其不動然後以生半夏丸納鼻孔中必取嚏而蘇急以人參三錢茯苓一兩白朮薏仁車前各五錢肉桂一錢煎湯半盞灌之無不生全也一七三華他救凍死神方以大器中熬灰使暖盛以囊薄其心上冷即易心暖氣通目得轉口乃開可溫尿粥稍稍吞之即活若不先溫其心使持火炙身冷氣與火爭立死一七四華他救卒死神方以蔥刺耳中鼻中血出者勿怪無血難療之有血者是活候也欲蘇時當捧兩手莫放之須臾死人目當舉手撈人言痛乃止男刺左女刺右令入七寸余無苦立效一七五華他救中惡神方本症之候為卒然心腹絞痛悶絶診其脈緊大而浮者死緊細而微者生治用麝香一分青木香生犀角各二分上為散空腹熱水下方寸匕日二立效未止更作一面灸兩足大拇趾甲後聚毛中各灸二七壯即愈一七六華他救客忤神方客忤者謂邪客之氣卒犯忤人精神也喜於道間門外得之其狀心腹絞痛脹滿氣衝心胸或即悶絶不復識人治宜灸鼻下人中三十壯自愈並以麝香一錢茯神人參天門冬去心鬼臼菖蒲各等分上以蜜丸如桐子大每服十丸日三一七七華他救卒魘神方卒魘者謂夢裡為鬼邪所魘屈也切勿以火照之否則殺人但痛齧其腳踵及足拇趾甲際而多唾其面則覺寤或以皂莢末用竹筒吹兩鼻孔中即起平時宜常以人參茯神茯苓遠志去心赤石脂龍骨乾薑當歸甘草炙白朮芍藥大棗去核桂心防風紫菀各二兩上以水一斗二升煮取三升半分為五服日三夜二一七八華他救鬼擊神方鬼擊者謂鬼厲之氣擊著於人也得之無漸卒著如人以刀矛刺狀胸脅腹內絞急切痛不可抑按或即吐血或鼻中出血或下血治法灸臍上一寸七壯及兩踵白肉際自愈或以特生礬石燒半日研皂莢去皮子炙雄黃研藜蘆熬上等分搗為末取如大豆許以管吹入鼻中得嚏則氣通便活若未嚏復更吹之得嚏為度一七九華他救尸厥神方人參一兩白朮半夏茯苓各五錢菖蒲一錢陳皮五分水煎服一劑可愈或以白馬尾二七莖白馬前腳甲二枚燒之以苦酒丸如小豆大開口吞二丸須臾更服一丸一七一華他救痰厥神方先以皂角刺為末用鵝羽管吹入鼻孔取嚏為度次以人參茯苓半夏天南星各三錢白朮五錢白芥子一錢生附子五分生薑一塊搗汁以酒與水各一碗煎取一碗溫服俟痰水吐盡即令安睡醒後再以人參白薇半夏各一錢茯苓白芥子各三錢白朮五錢陳皮甘草各五分水煎服一劑全愈一七一一華他救驚死神方急用醇酒一二杯乘熱灌之自活一七一二華他救跌死神方急扶起令盤腳坐地上手提其發取生半夏末吹入鼻中並用生薑汁灌之再以童子小便或糖水俾乘熱服之散去其瘀血一七一三華他救擊死神方取松節一二升搗碎入鐵鍋內炒之以發青煙為度用陳酒二三升四圍衝入去滓令溫服即活一七一四華他救自刎神方宜於氣未絶身未冷時先將頭墊正直刀口合攏試去鮮血急取大公雞一羽生剝其皮乘熱包貼患處不久自愈一七一五華他救酒醉不醒神方飲葛根汁一斗二升取醒為度或用蔓荊菜並少米熟煮去滓冷之使飲則良一七一六華他救電殛神方以潮潤砂土鋪地令患者身臥其上再以濕砂滿鋪於身僅留口鼻以司呼吸久而自醒一七一七華他救中蠱毒神方人有養畜蠱毒以病人者受毒者心腹切痛如有物齧或吐下血不即治療食入五臟盡即死欲知是蠱與否當令病人唾水沉者是浮者非也治用巴豆去心皮熬十枚豉熬半升釜底墨方寸匕上搗篩為散清旦以酒服如簪頭大小行蠱主當自至門勿應之去到家立知其姓名或以雄黃硃砂藜蘆炙馬目毒公皂莢去皮子炙莽草炙巴豆去心皮熬各二分共搗篩蜜丸如大豆許服三丸當轉下先利清水次出蛇等常煩悶者依常法可用鴨羹補之一七一八華他救中鯸鮧毒神方銼蘆根煮汁飲一二升良一七一九華他救中蟹毒神方凡蟹未經霜者多毒可用紫蘇煮汁飲之三升以子汁飲之亦治一七二華他救中魚毒神方濃煮橘皮飲汁或飲冬瓜汁亦效一七二一華他救中諸肉毒神方黃柏末服方寸匕未解者數服一七二二華他救中菌毒神方絞人尿汁飲一升即活服諸吐痢丸亦佳又掘地作土漿二三升則良中野芋毒亦同一七二三華他救中巴豆毒神方黃連小豆霍汁大豆汁並可解之一七二四華他救中射罔毒神方薑汁大豆豬犬血並解之一七二五華他救中躑躅神方飲梔子汁即解一七二六華他救中芫花毒神方防風甘葛桂並解之一七二七華他救中半夏毒神方生薑汁乾薑汁並解之一七二八華他救中附子毒神方大豆汁遠志汁並可解之中烏頭毒同治一七二九華他救中杏仁毒神方以藍子汁解之一七三華他救中莨菪毒神方煮甘草汁搗藍汁飲之並良一七三一華他救中鉤吻毒神方薺苨八兩水六升煮取三升服五合日五服一七三二華他救中木鱉毒神方肉桂煎汁服立愈一七三三華他救中諸毒神方取甘草煮濃汁多飲之或煮大豆汁令濃多飲之無大豆豉亦佳又煮薺苨令濃飲一二升如卒無可煮嚼食之亦可作散服之又凡煮此類藥汁解毒者不可熱飲因諸毒得熱更甚也宜使小冷為良一七三四華他救中砒毒神方初中毒時可用生甘草三兩煎濃汁加羊血半碗和勻飲之令吐如仍不吐是為毒已入腹此時五臟欲裂腹必大痛即用大黃二兩生甘草五錢白礬一兩當歸三兩水煎汁數碗飲之立時大瀉即生一七三五華他救中金毒神方凡食金已死者急取雞矢半升水淋得一升飲之日三服或吞水銀二兩即裹金出少者一兩亦足一七三六華他救中水銀毒神方草木灰煎濃汁飲之即解一七三七華他救中雄黃毒神方飲防己汁即解一七三八華他救中胡粉毒神方患者面青腹腫墜痛欲死是其候也急用白蜜調脂麻令多飲自解一七三九華他救中輕粉毒神方金銀花山慈菰紫草各一兩乳香沒藥各五錢以鹽水六碗陳酒五碗煎取六七碗空腹溫服取汁避風一七四華他救湯火傷神方外用未熬麻油和梔子仁末塗之以厚為佳已成瘡者篩白糖灰粉之即瘥內服用大黃生甘草各五錢荊芥黃芩防風各三錢黃耆茯苓各三兩當歸四兩水煎服一二劑愈一七四一華他救虎傷神方凡人被虎咬傷後血必湧出創口潰爛痛不可忍急燒青布以熏瘡口毒即出再煮葛根汁令濃洗之日十度並搗葛根為散葛汁下之每服一方寸匕日五甚者夜二又方急用豬肉貼之隨貼隨化隨化隨易並以地榆一斤為細末加入三七根末三兩苦參末四兩和勻摻之血止而痛自定一七四二華他救猘犬咬傷神方先嗍卻惡血灸瘡中十壯以後日灸一壯滿百乃止又凡狾犬咬傷七日一發過三七日不發則脫故每屆七日輒飲薤汁一二升過百日乃為大免終身戒食犬肉蠶蛹再發不救一七四三華他救豬齧傷神方煉松脂貼上或用屋溜中泥以敷之亦佳一七四四華他救馬咋踏傷神方取婦人血經敷傷處最效或割雞冠血點所齧瘡中日三若父馬用雌雞母馬用雄雞一七四五華他救毒蛇齧神方取慈菰草搗以敷之即瘥其草似燕尾者是大效或搗射罔塗腫上血出乃瘥一七四六華他救青蝰蛇螫神方此蛇色正緑喜緣木及竹上與竹木一色人入竹林中游行卒不及覺察落於頭背上齧人即死俗名青條蛇其尾二三寸色異者名熇尾蛇毒尤烈療法破烏雞熱敷之或以雄黃乾薑各等分搗篩和以射罔著小竹管中帶之行有急便用敷瘡兼療諸蛇毒一七四七華他救蝮蛇螫神方蝮蛇形不長頭扁口尖頭斑身赤文斑亦有青黑色者人犯之頭腹貼相著是也其毒最烈草行不可不慎治用細辛雄黃各等分研末以納瘡中日三四敷之或燒蜈蚣末敷瘡上亦效平時用桂心栝蔞各等分為末以小竹筒密塞之出外時佩用如卒為蝮蛇所螫即敷之此藥並療諸蛇毒惟塞不密則氣歇不中用一七四八華他救虺蛇螫神方以頭垢敷瘡中立愈或搗葎草敷之亦效一七四九華他救諸蛇螫神方此云諸蛇非前件三種蓋謂赤𧐖黃頷之屬治法急以繩縛創上寸許則毒氣不得走一面令人以口嗍所螫處取毒數唾去之毒盡即不復痛口嗍當少痛無苦狀或覓取紫莧菜搗飲汁一升其滓以少水和塗瘡上又搗冬瓜根以敷之或嚼乾薑敷之或煮吳茱萸湯漬之均效一七五華他救蜈蚣螫神方割雞冠取血塗之瘥或嚼大蒜小蒜桑白汁等塗之或挼藍汁漬之或以蝸牛擦取汁點入螫處一七五一華他救蜘蛛螫神方取蘿藦草搗入泥封之日二三毒化作膿膿出頻著勿停或以烏麻油和胡粉如泥塗之干即易去取瘥止又方用棗葉柏葉各五月五日採陰乾生鐵衣晚蠶砂各等分為末以生麻油和如泥先灸咬處塗之又治蜘蛛咬遍身生絲可急用羊乳一升飲之數日即愈一七五二華他救蠍子螫神方預於五月五日採蜀葵花石榴花艾心三物俱陰乾之等分為末和水塗螫處立愈一七五三華他救蜂螫神方取人溺新者洗之瘥或取蛇皮以蜜塗之炙令熱以點螫處或以醬汁塗蛇皮炙封之均效一七五四華他救諸蟲豸螫傷神方取大藍汁一碗入雄黃麝香二物隨意看多少細研投藍中以點咬處有是毒者即並細服其汁神效之極亦治蜘蛛咬傷
