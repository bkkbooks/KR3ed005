body:
  text: 卷二十一華他養性服餌法神方二一一華他茯苓酥神方本品主除萬病久服能延年製法取上品茯苓連皮乾蒸取出以湯淋之俟色白味甘為度曝乾搗篩得三斗取陳酒一石蜜一斗和茯苓末入容一石五斗之甕中熟攪之百遍密封勿令泄氣冬日五十日夏日二十一日其酥即浮於酒上接取酥飲之味甘美如甘露亦可作餅大如掌空屋中陰乾服一餅能終日不飢二一二華他杏仁酥神方本品主治萬病除諸風虛勞及感冷製法取味極甘香之家杏仁一石切忌用山杏仁因有大毒能殺人也須擇其顆粒完全者去皮尖微炒搗作細未取美酒兩石研杏仁取汁得一石五斗再以蜜一斗拌杏仁汁煎令極濃與乳相似納兩石甕中攪之密封泥勿令泄氣與上茯苓酥同法三十日看之酒上出酥接取酥納瓷器中封之取酥下酒別封之團其藥如梨大置空屋中干之服之令人斷谷二一三華他地黃酒酥神方本品能令人發白更黑齒落重生腦髓滿實還年卻老行及奔馬久服令人有子制用粗肥地黃十石切搗取汁三石麻子一石搗作末以地黃汁研取汁二石七斗杏仁一石去皮尖兩仁者佳搗作末以麻子汁研取汁二石五斗乃以曲末三斗浸入地黃等汁中七日以米三石分作三次投下凡閲三日一投如釀酒法熟後密封三七日其酥在酒中色黃如金以物接取可得九升然後取酒封之服法宜先食糟糟盡乃服酒及酥每服酒一升酥一匙乘溫服之二一四華他杏子丹神方本品久服可避谷制用上粳米三斗淘淨沙炒作飯曝乾搗篩杏仁三斗須擇取二仁者去皮尖曝乾搗碎以水五斗研取汁味盡乃止上二味先煎杏仁汁令如稀麵糊置銅器內粳米如稀粥煎以煻火自旦至夕攪勿停手候水氣盡則出之陰乾紙貯用時以暖湯二升納藥如雞子大置於湯中停一炊久任意取食二一五華他天門冬丸神方凡天門冬苗作蔓有鉤刺者是採得後當以酢漿水煮之使濕去心皮曝乾搗篩以水蜜中半和之仍更曝乾又搗末水蜜中半和之更曝乾每取一丸含之有津液輒咽之常含勿絶行亦含之久久自可絶谷禁一切食僅能食大麥二一六華他雲母丸神方雲母粉石鐘乳煉白石英肉蓯蓉石膏天門冬去心人參續斷菖蒲菌桂澤瀉秦艽紫芝五加皮鹿茸地膚子薯芋石斛杜仲炙桑寄生細辛乾地黃荊花柏葉赤翦酸棗仁五味子牛膝菊花遠志去心萆薢茜根巴戟天赤石脂地黃花枸杞子桑螵蛸茯苓菴䕡子天雄炮去皮山茱萸白朮菟絲子松實黃耆麥門冬去心柏子仁薺子冬瓜子蛇床子決明子菥蓂子車前子上各等分搗篩蜜丸如梧子大先服十丸漸至二十丸日三當勤相續不得廢缺百日始滿久服延年益壽強身健體聰強耳目流通營衛補養五臟調和六腑顏色充壯不知衰老二一七華他松脂神方松脂五斤灰水煮三十遍漿水煮三十遍清水煮三十遍茯苓五斤灰水煮十遍漿水煮十遍清水煮十遍生天門冬去心皮曝乾搗作末真牛酥三斤煉十三遍白蜜三斤煎令沫盡蠟三斤煉三十遍上搗篩以銅器重湯上先納酥次下蠟次下蜜候消訖乃下諸藥急攪之勿住手務令極勻內瓷器中密封勿令泄氣欲服之宜於先一日不食至翌日進美食令大飽然後絶食即服二兩二十日服四兩又二十日後服八兩二一八華他輕身神方茯苓桂心上二味等分為末煉蜜和酒服如雞子黃許大一日三丸一日服三次二一九華他不老延年神方雷丸防風柏子仁上三味等分為末酒服方寸匙日三六十以上人亦可服二匙久服延年益精補腦未六十太盛勿服二一一華他菖蒲膏神方本品主治症癖咳逆上氣痔漏等病最良久服能延年益壽耳目聰明智慧日增並令人膚體充肥光澤腴潤發白更黑身輕目敏行走如風填骨髓益精氣服一劑壽百歲製法於二月八日採取肥實白色節間可容指之菖蒲陰乾去毛距擇吉日搗篩以一兩為一劑以藥四分蜜一分半酥和如稠糜柔弱令極勻納瓷器中密封口埋谷聚中一百日欲服此藥宜先服瀉劑或吐劑候吐痢訖取王相日平旦空腹服一兩含而咽之有力能漸消加至三二兩服藥至辰巳間藥消訖可食粳米乳糜更不得食他物若渴可飲熱湯少許日一服一生忌羊肉熟葵二一一一華他耆婆湯神方本劑主治大虛冷風羸弱無顏色制用酥一斤煉生薑一合七薤白三握炙令黃酒二升白蜜一斤煉油一斤椒一合胡麻仁一升橙葉一握炙令黃豉一斤糖一升上先以酒漬豉一宿去滓內糖蜜油酥於銅器中煮沸令勻次納薤薑煮令熟次納椒橙葉胡麻煮數沸取出納瓷器中密封空腹吞一合如人行十里更一服冷者加椒二一一二華他牛乳湯神方牛乳三升蓽茇半兩為末上二味置銅器中取水三升和乳合煎空腹頓服日三服七日除本劑能除一切氣慎面豬魚雞蒜生冷二一一三華他豬肚煎神方本品補虛羸乏氣力制用肥大豬肚一具人參五兩椒一兩乾薑一兩半蔥白七兩細切粳米半升熟煮上五味和勻納豬肚中縫合勿令泄氣以水一斗半微火煮令爛熟空腹食之兼少與飲一頓令盡服四五劑神效二一一四華他羊頭蹄煎神方本品主治五勞七傷虛損制用白羊頭蹄一具草火燒令黃赤先以水煮半熟再用胡椒一兩蓽茇一兩乾薑一兩蔥白香豉一升納之更煮令大爛去骨空腹任性食之日食一具滿七具止禁生冷鉛丹瓜果肥膩白酒大蒜一切畜血等七日二一一五華他大黃耆丸神方主治虛勞百病制用黃耆柏子仁天門冬去心白朮乾地黃遠志去心澤瀉薯芋甘草炙人參石斛麥門冬去心牛膝杜仲炙薏苡仁防風茯苓五味子茯神乾薑丹參肉蓯蓉枸杞子車前子山茱萸狗脊萆薢阿膠炙巴戟天菟絲子覆盆子上各一兩搗篩蜜和丸酒下十丸日稍加至四十丸性冷者加乾薑桂心細辛各二兩去車前子麥門冬澤瀉健忘者加遠志菖蒲各二兩患風者加防風獨活芎藭各二兩老人加牛膝杜仲萆薢狗脊石斛鹿茸白馬莖各二兩無問長幼常服勿絶百日以內慎忌飲食切禁生冷油膩雞魚等二一一六華他柏子仁丸神方本劑久服能強記不忘制用柏子仁五兩蛇床子菟絲子覆盆子各半升石斛巴戟天各二兩半杜仲炙茯苓天門冬去心遠志去心各三兩天雄炮去皮一兩續斷桂心各一兩半菖蒲澤瀉薯芋人參乾地黃山茱萸各二兩五味子五兩鍾乳煉成者三兩肉蓯蓉六兩上搗篩蜜和丸如桐子大先服二十丸稍加至三十丸先齋五日乃服藥服後二十日後齒垢消去白如銀二十四日面悅澤六十日瞳子黑白分明尿無遺瀝八十日四肢遍潤白髮復黑腰背不痛一百五十日意氣如少年藥盡一劑藥力同至乃入房二一一七華他紫石英湯神方主治心虛寒熱百病令人肥健制用紫石英十兩白石脂赤石脂乾薑各三十兩上先取十分之一用微火煮之分為四服日三夜一服藥前勿宿食服後午時乃食日日依前稱取服之滿四十日止服訖即行勿專事坐臥須令藥力遍身百脈中行若大冷者春秋各四十丸日服令疾退為止惟服之過多令人大熱即須服冷藥壓之
