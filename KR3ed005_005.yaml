body:
  text: 卷五華他外科神方五一華他治陽症癰疽神方凡陽症癰疽發生時必突起分余其色紅腫發光疼痛呼號苦在五日之內猶可內散方用金銀花四兩蒲公英二兩生甘草二兩當歸二兩天花粉五錢水煎服一劑即消二劑痊愈若未服敗毒之散已在五日以外致成膿奔潰必用金刀去其口邊之腐肉使內毒之氣不藏刀長凡三寸寬約三分兩面之鋒俱利勘定患部橫直刀畫成十字形以末藥敷於膏藥之上貼上即能止痛三日之內敗膿盡出即消滅於無形矣大約膏藥一枚需用末藥二錢其末藥方為人參一兩龍腦一錢乳香一錢去油透明血竭五錢三七末一兩兒茶一兩水飛過去砂用倍子一兩藤黃三錢貝母二錢輕粉一錢各研成極細末以無聲為度內用煎方當歸一兩黃耆五錢人參一錢荊芥一錢金銀花二兩生甘草三錢用水煎服二劑已足五二華他治陰症癰疽神方陰症癰疽多生於富貴膏粱之徒急功好名之輩其人因心腎不交陰陽俱耗又重以憂愁抑鬱怫怒呼號其氣不散結成大毒任生於何部均屬險症初起時色必黑暗痛不甚劇瘡口亦不突起或現無數小瘡口以欺世人且覺沉沉身重宜急用附子三錢人參三兩生黃耆二兩當歸一兩金銀花三兩白芥子二錢治之外用膏藥加生肌末藥見前五錢貼之一日須兩換膏藥方如下金銀花一斤生地黃八兩當歸三兩川芎二兩牛膝一兩丹皮一兩麥冬三兩生甘草一兩荊芥一兩防風五錢黃耆三兩茜草根五錢人參五錢玄參五錢用麻油五斤煎數沸將藥渣漉出再熬將珠再入後藥廣木香一兩黃丹二斤炒飛過去砂沒藥一兩乳香一兩血竭一兩象皮為末五錢麝香一錢各為細末入油中少煎藏磁罐內候用每一個約用兩餘若系背疽須用二兩以上五三華他治背癰神方背癰初起時若審系陽症宜用忍冬藤二兩茜草三錢紫花地丁一兩貝母三錢甘菊花三錢黃柏一錢天花粉三錢桔梗三錢水煎服一劑輕二劑消三劑痊愈若系陰症則用人參二兩黃耆二兩金銀花半斤附子一錢荊芥三錢炒黑柴胡二錢白芍一兩天花粉五錢生甘草五錢水十餘碗煎汁二碗分前後二次服之則陰必變陽而作痛再劑而痛消數劑而痊愈矣若已潰爛洞見肺腑瘡口不收百藥敷之絶無一驗此方治之神效再用麥冬一兩熟地二兩山茱萸一兩人參五錢肉桂一錢當歸一兩忍冬藤一兩白朮五錢水煎服五劑痊愈五四華他治腦癰神方腦癰發於泥丸宮在頭頂之上倘色如葡萄之紫瘡口不一或如碎粟四圍堅硬瘡頂色紅赤不黑是為陽癰尚可醫療若色紫而黑暗無光神情悶亂不知人事者是為陰症十死其十百死其百必須以五日之前以火劑煎飲或尚有生機過此則生死難言矣方用金銀花八兩玄參三兩黃耆四兩麥冬三兩人參二兩先用水十大碗將金銀花煎湯再煎前藥二碗一日服二次連服四日其癰漸愈改用十全大補湯重四兩與之又改用八味地黃湯恣其酣飲可獲全愈是為九死一生之治法此外可於未潰敗時或用川芎一兩玄參二兩金銀花二兩山茱萸一兩麥冬一兩貝母三錢蔓荊子二錢用水三大碗煎服之即消最多兩劑痊愈五五華他治腦後癰神方一名落頭疽腦後癰生於玉枕部亦有陽症陰症之別其為患雖較腦癰為輕然醫不得法即腐爛落頭而死故有落頭疽之名凡屬陽症其形高突紅腫可用金銀花二兩蒲公英一兩生草三錢用水三碗煎八分服下未破者一劑即消已破者必須三服始膿盡肉生若系陰症則其旁必有無數小瘡先癢後痛遂至潰爛腫而不甚高突色必黑暗身體沉重困倦欲臥呻吟無力可用人參一兩生黃耆一兩當歸一兩金銀花二兩白芥子三錢肉桂一錢炒白朮一兩用水煎服一劑血止二劑肉生三劑口小四劑皮合又二劑痊愈五六華他治腰癰神方腰癰發於軟肋下近腰之部宜合陰陽兩性治之方用白朮一兩杜仲一兩當歸一兩金銀花三兩防己一錢豨蘞草三錢水煎服五七華他治肺癰神方玄參二兩麥冬三兩生甘草五錢金銀花十兩水煎服一劑痛減二劑內消五八華他治肝癰神方白芍三兩當歸二兩炒梔子三錢生甘草三錢水煎服約二劑而愈五九華他治腸癰神方腸癰生於大小腸之間其症口渴小便如淋時時汗出小腹腫痛手不可按又生於大腸者右足屈而不伸生於小腸者左足屈而不伸方用金銀花八兩地榆一兩薏苡仁五錢當歸一兩先金銀花煎水二碗余藥用水十餘碗煎作二碗同金銀花分作二服上午一服臨睡一服二劑而愈凡腸癰必須內消而火邪甚急非杯水可救必須大劑始效然大劑敗毒恐傷元氣惟金銀花敗毒而又補陰故可重用若用之過少反無效矣五一華他治臍後癰神方臍後癰發於背下命門之穴與臍正對其症為真水衰弱邪火熾盛非大補其水則邪火不散毒無自消初發之時尚未潰敗宜用金銀花五兩豨蘞五錢熟地一兩白朮一兩黃柏三錢車前子三錢先用水十碗煎金銀花四碗乃分之為二先以兩碗煎前藥得一碗空腹飲之少頃再將前汁二碗更煎藥滓得一碗服之連服二劑若已潰爛者宜改用人參三兩白朮五兩肉桂三錢附子一錢山茱萸一兩北五味子三錢金銀花三兩茯神三錢水十碗煎汁一碗服之五一一華他懸癰神方懸癰一名騎馬癰俗名偷糞老鼠多因嗜色忍精而發方用金銀花四兩蒲公英二兩人參一兩當歸一兩生甘草一兩大黃五錢天花粉二錢水煎服一劑即消二劑全愈五一二華他治搭手神方治法如背癰初起時極神效五一三華他治牛頭癰神方生於膝上紅腫而痛一名膝癰方用生黃耆四錢當歸一兩金銀花一兩茯苓三錢薏仁五錢牛膝三錢地榆一錢白朮三錢天南星一錢生地黃五錢水數碗煎一碗空腹服之五一四華他治多骨疽神方生於大腿之中癰生之後其口不收腐爛之中忽長一骨疼痛難忍俗以為骨實為濕熱之毒所化內服用茯苓一兩車前子一兩金銀花三兩牛膝五錢紫花地丁一兩水煎服六劑骨消再十劑而痊愈外用飛過密陀僧用桐油調膏貼於患處奏效尤捷五一五華他治脫骨疽神方此症發生於手指或足趾之端先癢而後痛甲現暗色久則潰敗節節脫落宜用極大生甘草研成細末麻油調敷極厚逐日更換十日而愈內服金銀花三兩玄參三兩當歸二兩甘草一兩水煎服連服十劑當愈五一六華他治癰腫無頭神方以蛇蛻燒灰和豬油塗之極效五一七華他治石疽神方此症腫不變色漫腫疼痛堅硬如石搗生商陸根加鹽少許敷之極效五一八華他治瘭疽神方射干甘草枳實升麻乾地黃黃芩各八分麝香二分前胡三分犀角六分大黃一錢以水煎之約三劑可愈五一九華他治甲疽神方本症之發生原於剪甲傷肌或甲長傷肉致使氣血淚遏不通久之腐潰而生瘡泡或赤肉突出指甲腫痛治法易剔去指甲則不藥而愈或以草烏五錢白醜一兩龍骨二錢五分共捶碎再用全文蛤四兩同炒至焦黑色以五倍子為末用麻油敷之濕則乾摻五二華他治乳癰神方本症初起時發寒熱先痛後腫方用貝母三錢天花粉一錢蒲公英一兩當歸一兩生甘草二錢穿山甲一片為末水煎服一劑即消五二一華他治井疽神方井疽發於胸部此症必須早治若下入於腹必死用人參一兩茯苓五錢麥冬五錢熟地一兩山藥一兩芡實一兩甘菊花五錢芍藥五錢忍冬藤二兩遠志三錢天花粉三兩王不留行三錢水數碗煎一碗一氣飲之二劑必愈倘已潰爛必須多服五二二華他治縮腳疽神方生於大腿外側以大戟甘遂研末用白蜜調敷內服用熟地一兩鹿角膠三錢肉桂一錢甘草一錢麻黃五分炮薑五分水煎服四五劑可愈不可開刀若開刀則必成縮腳五二三華他治小腹疽神方本症由七情六欲而生部位在臍下氣海穴一寸五分或關元穴二寸或丹田穴三寸依癰毒陰疽法治之可愈五二四華他治癭神方癭與瘤不同癭連肉而生根大而身亦大瘤則根小而身大癭之種類甚多形亦各異然皆為濕熱之病由小而大由大而破由破而死初起時宜用小刀割破略出白水以生肌散敷之立愈生肌散製法如下人參一錢三七三錢輕粉五錢麒麟血竭三錢象皮一錢乳香一錢沒藥一錢千年石灰三錢廣木香一錢冰片三分兒茶二錢各為極細末研無聲為度合時須用端午日不可使人見若癭已失治形已漸大宜用點藥點其陷處半日作疼必然出水點藥用水銀一錢硼砂一錢鵲粉一錢鶯糞一錢輕粉一錢冰片五分潮腦五分緑礬一錢皂礬一錢麝香三分共研之極細一日點一次三日後再以人參三錢茯苓五錢薏仁一兩澤瀉二錢黃耆一兩白芍五錢生甘草一錢陳皮一錢山藥三錢水煎服十劑全消須忌房事一月否則必破不能收口終身成漏五二五華他治腋下癭瘤神方長柄壺盧燒存性研末搽之以消為度或加麻油調敷尤效五二六華他治粉瘤神方粉瘤初生時宜即治否則日漸加大受纍不堪先用艾條十數壯再以酷磨雄黃塗紙上剪如螺厴大貼灸處外更貼以膏藥一二日一換必擠盡其中粉漿敷以生肌散自愈五二七華他治肉瘤神方水銀一錢兒茶一錢冰片三分硼砂一錢麝香三錢黃柏五錢血竭三錢共為細末擦其根部隨擦隨落五二八華他治血瘤神方血瘤小者如膽大者如茄以利刃割斷即用銀烙匙燒紅一烙即止血且不潰並不再生或以水銀輕粉潮腦鏡鏽貝母各一錢黃柏三錢兒茶二錢冰片三分共為細末擦之即落五二九華他治發瘤神方發生於耳後發下寸許按之不痛用針刺破擠盡粉發用生肌散敷之立愈五三華他治物瘤神方物瘤其根甚大最稱難治不時而動無故自鳴或如鳥號或如蟲鳴必須用刀破其中孔則物自難居必突圍而出後用生肌散敷之五三一華他治筋瘤神方筋瘤無甚大害本可置之不治若妄用刀針往往傷筋反至死亡故最忌刀割若欲割去須於初出之日以芫花煮細扣線系之日久自落五三二華他治骨瘤神方骨瘤生於皮膚之上按之如有一骨生於其中不可外治宜用烏賊魚骨一錢白石英二分石硫黃二分鍾乳三分紫石英二分乾薑一錢丹參八分琥珀一錢大黃一錢附子三分朝燕屎一錢石礬一錢水煎服十劑全消五三三華他治石瘤神方石瘤亦生於皮膚之上按之如石之堅不覺痛苦治法同骨瘤五三四華他治氣瘤神方氣瘤無痛無癢時大時小隨氣為消長氣旺則小氣弱反大氣舒則寬氣鬱則急治法必須補其正氣開其鬱氣則瘤自散方用沉香一兩木香二兩白芍四兩白朮八兩人參二兩黃耆八兩枳殼一兩檳榔一兩茯苓四兩香附二兩附子五錢天花粉四兩各為細末蜜為丸每日服三錢一料全消五三五華他治五疔神方疔瘡之生膏粱人居其半皆因營養過度火毒外發所致名稱雖有多種地位亦無一定其實可賅之為心肺肝脾腎五種即色赤者為心疔色白者為肺疔色青紫者為肝疔色黃者為脾疔色黑者為腎疔也初起時可用紫花地丁一兩甘菊花一兩水煎服六劑痊愈外用絲瓜葉十片明礬雄黃末各二錢搗絲瓜葉極爛取汁調二味末以鳥羽敷疔上隨干隨潤數日即消或以白菊花葉連根搗汁一杯沸酒沖服毒甚者須多服渣敷患處留頭不敷覆被令汗出其毒自散無時可用甘白菊花四兩代之少則不效五三六華他治疔瘡出血神方飲真麻油一大碗即止或用菜籽油亦效五三七華他治疔瘡走黃神方其原因為食豚肉所致患此者多不知宜以芭蕉根搗汁服之即解五三八華他治疔瘡不破神方蟬衣僵蟲上等份為末醋調敷四圍候根出拔去再塗即愈五三九華他治疔根不出神方鐵粉一兩輕粉一錢麝香少許上為末針畫十字以點藥入內醋調麵糊敷之極效五四華他治紅線疔神方紅線疔屬心疔類其形縷縷如絲線周身纏繞如在手足上則入心即死宜用松針刺去其血忌食熱物或以白菊花根葉雄黃錢許蜒蚰二條共搗極爛從疔頭敷至絲盡處為止以絹條裹緊越縮即消又此疔生於足者延至臍生於手者延至心生於唇面者延至喉亦皆死急用針或磁鋒刺破其紅絲盡處使出血以浮萍嚼塗刺處用白礬搗末包裹於搗爛蔥白中約三錢吞下再飲蔥酒一二杯覆被靜臥汗出即愈五四一華他治烏茄疔神方農家澆糞於地為烈日蒸曬人跣足行其上受其熱毒足趾腫痛似潰非潰即以鴨羽煎湯合皂礬洗之立愈五四二華他治刀鐮疔神方疔頭如韭葉長一二寸色紫黑忌針刺急用明礬三錢研末蔥白七個搗爛分為七劑每劑以熱酒送下服下即臥覆被取汗如無汗須再服蔥白外塗以溏雞糞遲則不治五四三華他治羊毛疔神方初起時頭痛發寒熱前心後背有紅點形類疹子宜先針刺破取出羊毛再以明礬末三錢用青布包緊蘸熱酒於前心瘡上一二寸外周圍擦之漸見瘡眼其毛即奔至後背仍依前法擦於後背部將羊毛拔置布上即埋入土中內用紫花地丁一兩金銀花三兩白礬甘草各三錢水煎服五四四華他治蛇頭疔神方生於手指尖腫若蛇頭痛楚連心寒熱交作初起時急用雄黃朴硝等分研末以豚膽汁少許加香油調塗或內服蟾酥丸汗之蟾酥丸製法如下蟾酥二錢酒化輕粉五分枯白礬寒水石煅銅緑膽礬乳香沒藥麝香各一錢雄黃一錢硃砂三錢蝸牛二十一個於端午日午時在淨室中先將蝸牛研爛同蟾酥和勻稠黏再將各藥研末與蝸牛蟾酥相和為丸如緑豆大每服三丸用蔥白五寸患者自嚼爛吐於男左女右手心包藥在內無灰熱酒送下覆被靜臥至發汗為止甚者再進一服五四五華他治蛇眼疔神方生於指甲兩旁治法同上五四六華他治蛇背疔神方生於指甲之下治法同上五四七華他治蛇腹疔神方又名魚肚疽生於指中節前面腫如魚肚治法同上五四八華他治螺疔神方生於手指之間可用榔雞根馬齒莧莖加酒釀搗爛敷之極效凡遇患處起紅點者用紅馬齒莧白點者用白馬齒莧五四九華他治唇疔神方唇疔切不可用涼藥敷於瘡上最佳以雞血點之內用烏桕葉或根搗汁服數杯若大腿彎中有紫筋可用銀針刺出惡血可保無虞五五華他治人中疔神方一名馬嘴疔先以銀針挑破後用瑞香花葉十四瓣鹽十四粒飯十四粒共搗爛敷於瘡上日夜換之極有效五五一華他治瘰癧神方瘰癧得病之原因有九一因怒二因郁三因食鼠食之物四因食螻蛄蜥蜴蠍子等所傷之物五因食蜂蜜之物六因食蜈蚣所遊之物七因大喜飽餐果品八因縱欲傷腎飽餐血物九因驚恐失忱氣不順其治之之法有三一為治肝膽鬱結之瘰癧方用白芍五錢當歸二錢白芥子三錢柴胡一錢甘草八分炙全蠍三個白朮三錢茯苓三錢鬱金三錢香附三錢天葵草三錢水煎服連服十劑自愈二為治脾胃多痰之瘰癧方用人參二兩白朮十兩茯苓六兩甘草一兩炙紫蘇八錢半夏二兩薑蟲二兩陳皮六錢白芷七錢木通一兩金銀花十兩天花粉三兩各為末蜜為丸飯後服三丸一料痊愈然必須戒色欲三月三為治心腎不交之瘰癧方用大龜二個一雄一雌遠志二兩麥冬三兩山茱萸四兩肉桂一兩白朮五兩蒼朮二兩熟地十兩玄參十兩茯神四兩何首烏十兩桑椹四兩紫花地丁四兩夏枯草五兩先將大龜蒸熟焙乾為末次將各藥研末和勻以蜜為丸日服三次每服三錢一料可痊愈五五二華他治各種瘰癧不消神方貓頭蹄骨一具炙酥為末昆布一兩五錢海藻一兩五錢上二藥須洗去鹽水曬乾連翹黃芩金銀花穿山甲枳殼香附各一兩皂角五錢共為細末以玄參為丸大如桐子每服七八十丸日凡三次以薑汁送下五五三華他治瘰癧潰爛神方凡瘰癧之症未破之先易於醫治既破之後難於收功可先用荊芥根下一段剪碎水煎成湯溫洗久之視破爛處有紫黑者以針刺之去血再洗三四次然後用樟腦明礬各三錢以麻油調敷次日再洗再敷以愈為度專忌酒色五五四華他治鼠瘻神方鼠瘻久不愈可取狼鼠不限多少常作羹粥任食之必驗或以白馬牛羊雞豬等矢屑各一斤漏蘆藁本各一斤並於石上燒成灰研之極細外以豚脂一升三合煎亂髮一兩五錢令沸俟發盡乃納諸藥屑在微火上煎五六沸藥成先去瘡上痂以新棉蘸鹽湯洗瘡拭之令乾然後敷膏日凡二次上覆以帛裹之極有效五五五華他治蛇瘻神方以蛇蛻燒灰和蠟月豚脂和封之五五六華他治蝦蟆瘻神方用五月五日蛇頭及野豬脂同水衣封之五五七華他治蠍瘻神方搗茅根汁著孔中即效五五八華他治蜂瘻神方取蜂巢燒灰臘月豚脂和敷孔中五五九華他治蜣螂瘻神方熱牛屎塗之數易應有蜣螂出五六華他治蚯蚓瘻神方雞屎蚯蚓屎等分為末用牡豬下頜骨髓和敷之五六一華他治雀瘻神方母豬屎燒灰臘月豚脂調敷當有蟲出如雀形五六二華他治九子瘍神方生於頸上連續得九數治用雞卵一麝香一分冰片五分先雞卵蒸熟後剖之為二去黃存白摻二藥於瘍上自初生第一瘍起覆以雞卵外用干艾燒之以痛為度痛極暫止痛止更燒且隨時更換雞卵日夜約燒五六度次日更換冰麝燒灼如前俟愈為止內用蒲公英夏枯草金銀花各二錢甘草節一錢水煎服數劑功效極偉五六三華他治流注神方流注者謂先發於背後旋流串散走於腰背四肢或來或去或痛或不痛無一定之部位也治法宜用去風去火之劑兼散其毒以升麻一錢當歸五錢黃芩一錢栝蔞二錢金銀花一兩甘草二錢炙連翹三錢秦艽二錢蒼耳一錢馬蘭根一錢牛膝一錢牽牛一錢水三碗煎服數劑自愈五六四華他治痰核神方大者謂之惡核小者謂之痰結毒根最深極不易治未潰之前忌貼涼膏忌服涼藥法以天南星磨酸醋調敷數次自消或捉蝙蝠炙成灰和菜子油塗之二三次即愈五六五華他治痄腮神方腮間突然腫起系屬風熱之症可用野菊花葉搗爛四圍敷之其腫自消或以蝸牛同面研敷之亦有效五六六華他治天泡瘡神方天泡瘡生於頭面及遍身手足之間以夏日居多治法宜補氣而佐之以解暑則火毒自消瘡亦易愈方用香薷天花粉生黃耆炙甘草黃芩各一錢白朮茯苓麥冬各二錢桔梗一錢五分人參厚朴各五分陳皮三分水煎服數劑自愈外用澱粉五錢煅輕粉五分雄黃三錢三者共研成細末用絲瓜葉搗汁半杯調搽瘡上其效如神若在小兒可用香爐蓋上煙脂三錢黃連青黛各二錢冰片二分各為細末用雞子清或豬膽汁調敷極效五六七華他治人面瘡神方此瘡非生於膝上即生於肘其形頗似人面重者有口鼻眼目皆能運動狀似愁苦口中與以肉食則即能化盡方用雷丸三錢輕粉一錢白茯苓一錢研極細和勻敷上即消五六八華他治血風瘡神方血風者多生於兩腿裡外之臁上下達於踝骨其原起於好飲初生時小而癢久則大癢治法先須戎酒然後用內藥補其氣血兼消風濕外用膏藥敷之不久即愈內服方用白朮當歸柞木枝薏仁各五錢茯苓生甘草萆薢澤瀉各二錢肉桂紅花各一錢黃耆一兩水煎服愈多愈佳外用方蚯蚓糞馬齒莧各一兩黃柏五錢硃砂四錢血竭烏桕根胡粉各三錢潮腦二錢輕粉一錢麝香三分共為末以豚脂調為膏貼於油紙上視瘡之大小貼之外用包扎任其出水換藥膏時先以金銀花煎湯溫洗不數日即愈五六九華他治翻花瘡神方翻花瘡瘡口內肉突出如菌如菌故有此名雖無痛苦然久流鮮血則易致虛損治宜滋肝補血益氣培元外用烏梅煅灰敷之或以馬齒莧煅灰豚脂調敷劇者用銅緑鉛粉等分研細香油調敷或以蒼耳葉搗汁日塗數次亦有效五七華他治內外臁瘡神方臁瘡有內外之異因臟腑內蘊有濕毒乃外發為瘡亦有因打撲抓磕或遇毒蟲惡犬咬破損傷因而成瘡者治法首宜節欲慎房內服人參二錢白朮三錢茯苓當歸生黃耆各二錢生甘草柴胡半夏各一錢金銀花五錢陳皮升麻各五分水煎服連用四劑外用龍骨二錢乳香沒藥各一錢血竭輕粉各五分阿魏二分研成細末再以水飛淨黃丹一兩生芝麻一合搗末香油三兩共入鍋熬數沸加入各藥粉末臨起鍋時再加冰片麝香各一分攪勻用甘草煮油紙兩面將藥膏攤於其上臨用時先以蔥二條將瘡口洗淨再將內服藥滓用水煎之洗瘡口一次乃貼藥膏於其上數日可愈五七一華他治黃水瘡神方黃水瘡又名滴膿瘡言膿水所到之處即成瘡也治法宜內服除濕清熱之藥佐以涼血之劑方用茯苓三錢蒼朮荊芥蒲公英各二錢防風黃芩半夏各一錢當歸五錢水煎服四劑外用雄黃防風各五錢荊芥苦參各三錢水煎湯取二碗洗瘡即愈五七二華他治瓜藤瘡神方此瘡一生十餘個極易滋蔓宜用尖尾芋茄子葉五月艾蔥薑共搗爛醋煮塗敷五七三華他治天蛇瘡神方此瘡生於皮膚似癩非癩由草中花蜘蛛螫傷所致治宜內服秦艽煎湯飲之外用蜈蚣一條研末和豬膽汁調塗之五七四華他治蜘蛛瘡神方形如蛛網癢不能忍先用苧麻絲搓瘡上令水出次以雄黃枯礬等分為末乾擦之極效五七五華他治蛇形瘡神方形如蛇故名內用雄黃沖酒服外用雄黃麻油調敷頗效五七六華他治蜂窩瘡神方形如蜂窩故名以胡粉硃砂等分為末白蜜調敷極效五七七華他治魚臍瘡神方生於肘肚與小腿肚間極疼痛初起一二日先用灸法極易解散內服金銀花一兩當歸黃耆各五錢生甘草青黛地榆各二錢白礬一錢水煎服五七八華他治魚脊瘡神方多生筋骨間堅凝作痛初起時為白色小泡漸長成魚脊狀久則潰流黃水宜初起時用老蒜切片如三文錢厚置瘡上再以艾一團如豆大安蒜片上燒之蒜壞再換痛定乃止內用人參白朮茯苓川芎金銀花當歸各一錢白芷皂角刺桔梗甘草各五分水二碗煎八分食後服脾弱者去白芷倍用人參五七九華他治貓眼瘡神方形似貓兒眼而有光彩故名無膿無血時痛時癢一名寒瘡用生草烏三兩生薑二兩煨白芷炒南星各一兩肉桂五錢共為末燒酒調敷多食雞魚蒜韭忌用鮎魚蝦蟹五八華他治纏腰龍神方生腰下長一二寸或碎如飯或紅腰堅硬以雄黃研末醋調敷極效五八一華他治捲毛瘡神方生於頭上狀如葡萄用黃柏一兩乳香二錢五分共為末槐花煎濃汁二者調作餅貼瘡口並用吳茱萸研末醋調敷兩足心即愈五八二華他治寒毛瘡神方豆腐渣滓炒熱敷患處布包緊冷則更易一宿即愈五八三華他治對口瘡神方生後頸正中處以鮮茄子十四枚生何首烏二兩煎服二三劑未破即消已破拔膿生肌雖根盤八九寸寬大者亦效外用貝母研末敷之或尋取韭地蚯蚓搗爛以涼水調敷五八四華他治骨羡瘡神方生於神堂二穴或膈關膈俞之穴上此瘡不痛而癢癢極必搔爬愈搔爬而愈癢終至皮破肉損骨乃盡見方用人參五錢當歸黃耆各一兩金銀花二兩茯苓貝母各三錢水煎服數劑後即癢止而愈五八五華他治羊胡瘡神方生於下唇及頜下宜內服除濕清熱之劑方用茯苓二錢天花粉一錢五分炙甘草白朮蒼朮蒲公英澤瀉豬苓各一錢白芷羌活各五分水煎服外用輕粉一錢黃丹三錢兒茶炒黃柏各三錢枯礬五分冰片三分各為細末濕則干糝干則香油調敷數日即愈五八六華他治坐板瘡神方生於臀上癢而兼痛內服藥用白朮五錢茯苓三錢澤瀉二錢豬苓黃柏各一錢肉桂二分水煎服外用蘿蔔種一兩火煅存性為末敷於新瓦上煨微熱坐於其上數次自愈或以松香五錢雄黃一錢研末濕癢加蒼朮三錢以棉紙捻成條豚脂浸透燒取油搽上立愈又以灰莧燒為末摻於瘡上亦效或以輕粉二錢石膏六錢共為末燈油調敷即愈五八七華他治蛇窩瘡神方生於臍腹上下左右無定處其形如蛇重者潰深輕者腐淺或有皮肉蠕蠕暗動欲行而不可得者治用蜈蚣十條雄黃生甘草各三錢研為末浸於香油二兩中隨浸隨塗極效五八八華他治石癤神方瘍之小者曰癤其根硬者曰之石癤以白菊花葉搗汁調白蜜敷之更以渣敷四圍留頭不敷俟毒水流盡即消五八九華他治軟癤神方代赭石虢丹牛皮膠等分為末陳酒一碗沖之俟澄清後服下更以渣外敷干則易之五九華他治𤸈㿉癤神方古舊瓦片火煅醋淬凡七次為末香油調敷五九一華他治痔神方病之種類甚多如肛門旁生肉如鼠乳出孔外時時流膿血者名曰牡痔若肛邊腫痛生瘡者名曰酒痔肛邊有核痛及寒熱者名曰腸痔若大便輒有出血者名曰血痔若大便難肛良久肯入名曰氣痔統治之方亦甚多一兒茶麝香唾津調敷二先以皂角煙燻之次以鵝膽汁調白芷末塗之三赤足蜈蚣焙為末與冰片少許同研唾液調敷四生槐煎五分皂角二兩麝香雄黃茛菪丁香木香炙鰻鱺魚各二分上各藥為五丸取淨瓶可容一升者掘地埋之著一疊子於瓶上鑽疊子作孔納火瓶中灰蓋之然後納藥一丸燒之以下部著疊孔上坐便通汗盡一丸藥即止五以無花果葉煎湯熏洗能止痛極有效五九二華他治痔瘡作癢神方水銀棗膏各二兩同研綿裹納下部翌日蟲出癢止或以豬大腸六兩蚯蚓十餘條煮融去蚓食腸極效五九三華他治痔瘡出血神方內服用當歸尾一錢五分生地二錢赤芍一錢黃連二錢枳殼一錢炒黃芩一錢炒槐角三錢炒地榆二錢炒荊芥一錢升麻五分天花粉八分甘草五分生側柏二錢水煎服三四劑後即痛止腫消外用地骨皮槐花韭菜根朴硝各二兩白礬蘇葉各五錢蔥頭七個用水十五大碗煎百沸傾淨桶內令患者坐之四周密閉勿令泄氣先熏後洗俟痔出黃水為度五九四華他治久遠痔漏神方牆上生之緑苔刮下之需五錢火焙乾為細末羊蹄殼五副炒白朮白芷各一兩茯苓二兩槐花五錢共為細末米飯為丸每日臨臥先服一錢後壓之美膳一月即愈五九五華他治痔瘡腫痛神方以壁上背包蜒蚰一個搗為泥入冰片薄荷少許同敷極效五九六華他治內外痔神方在肛門內外皆有之遇大便即出血疼痛者是用胡黃連五錢血竭兒茶各二錢熊膽三錢冰片一錢麝香三分共研細水調敷日凡三四次五九七華他治內痔神方在肛門之內大便時則出血便畢以手按之良久乃入內服用生枳殼三兩陳皮一兩水煎服外用生草烏尖一錢刺蝟皮末三錢枯礬五分冰片三分各為細末用蔥汁調藥送入肛門約一時許其痔即翻出洗淨之用雞糞四兩取公雞母雞各一餓之二日次早以豬胰子切碎拌糯米粉一二合喂之凡越六七日得糞四兩曬乾候用雌黃雄黃各六錢明礬皮硝各一兩膽礬五錢共為末傾入銀罐內火煅出青煙為度加乳香沒藥各三錢冰片五分用唾津調敷七日後其痔自脫再用珍珠散敷之使收口內服收肛散珍珠散方如下珍珠石膏赤石脂輕粉各一錢白龍骨三錢孩兒骨五分冰片二分共為末收肛散方如下陳皮三兩枳殼一兩水二碗煎一碗服五九八華他治外痔神方金腳砒二錢白礬一兩共為末傾銀罐內煅至煙盡為度加蠍尾七個生草烏研末和入前藥塗瘡上凡七日而根脫五九九華他治雞冠痔神方黃連末敷之加赤小豆末尤效五一華他治野雞痔神方先用槐柳煎水熏洗次以艾灸七壯即愈五一一華他治翻花痔神方肛門周圍翻出如碗肉色紫黑疼痛異常時流血水內服用缸砂一兩水浸半月微煅條芩二兩每斤用皂角柏子仁側柏各四兩水煎煮半日汁干為度黃連槐角各二兩梔子黃花地丁各一兩青黛五錢共為末用柿餅肉為丸大如梧子每服四五十丸空心清湯送下外用藥水熏洗見痔瘡出血五九三條後再用藥線扎之藥線製法如下鮮芫花根一錢雷丸一錢蟾酥一錢草烏三錢水二碗煎一碗去渣取汁以生絲一錢入藥汁內以文火熬汁將干取出曬乾再浸再曬以汁盡為度收藏候用至六七月取露天蛛絲合成藥線五一二華他治血箭痔神方與內痔同但無痛癢耳大便時不問糞前糞後俱射血如箭治法用百草霜四兩黃芩梔子各一兩黃連槐花地榆各五錢共為末糊為丸每服三錢清湯下五一三華他治無名腫毒神方無名腫毒者以其隨處而生不按穴次不可以命名也非速行醫治常有生命之虞方用硃砂雄黃硼砂血竭苦葶藶沒藥去油各二錢乳香去油蟾酥人乳浸牛黃冰片沉香各一錢麝香珍珠熊膽各六分先將諸藥研成細末次以人乳浸透蟾酥研入諸藥中和勻為丸如梧子大金箔為衣凡遇有無名腫毒及各種瘡毒可用藥一丸壓舌根底含化隨津咽下藥盡用蔥白與酒隨量飲之覆被取汗極有效驗合藥宜祕三七日更妙五一四華他治無名惡瘡神方本方功效極偉能起死回生奪造化之權凡癰疽疔毒及中一切毒禽惡獸肉毒所致之瘡俱可治之用硼砂黃丹硇砂巴豆去油人言各一錢硃砂二錢斑蝥蟾酥乳香血竭沒藥各三錢麝香半夏各五分共研細末用第一次生小兒乳汁搗蝸牛為丸如緑豆大每服五七丸各隨症飲送下亦分上下前後服之五一五華他治一切風毒神方凡肩背腰俞臂腿環跳貼骨等處感受風寒濕氣致漫腫無頭皮色不變痠痛麻木者是名風毒可急用沉香丁香木香各五分乳香六分麝香一分共研勻將大核桃殼半個內容藥末至將滿覆痛處外灸以艾團一二壯不覺熱十餘壯稍覺痛即愈五一六華他治諸瘡不破頭神方硇砂二錢五分白丁香輕粉各一錢五分巴豆五分共為細末以醋調塗瘡上頭自破五一七華他治毒瘡不收口神方輕粉鉛粉各一兩珍珠一錢飛辰砂四分冰片二分共為末摻瘡上不日即收口
