body:
  text: 卷二十二華佗注倉公傳附二二一疽齊侍御史成自言病頭痛臣意診其脈告曰君之病惡不可言也即出獨告成弟昌曰此病疽也內發於腸胃之間後五日當癰腫後八日嘔膿死成之病得之飲酒且內成即如期死成既疽發於腸胃正可剖而洗之不待其癰腫而嘔膿也雖熱上熏陽明爛流絡至於頭痛亦豈無藥況其時疽尚未成癰尚未發去其爛菌自無後患惜乎成之不遇也華佗注二二二氣隔齊王中子諸嬰兒小子病召臣意診切其脈告曰氣隔病病使人煩懣食不下時嘔沫病得之少憂數乞食飲臣意即為之作下氣湯以飲之一日氣下二日能食三日即病愈此病主在心周身熱宜養心不得專下氣下氣雖效強制力耳意之言曰煩懣食不下則絡脈有過絡脈有過則血上出血上出者死此悲心所生也既知心病而治氣未免自相矛盾且不懼其強制之後而有反抗力乎世以香散下降治肝氣終至愈發劇亦猶此耳華佗注二二三湧疝齊郎中令循病眾醫皆以為蹶中而刺之臣意診之曰湧疝也令人不得前後溲循曰不得前後溲三日矣臣意飲以火齊湯一飲得前溲再飲大溲三飲而疾愈意之言曰右口脈大而數數者中下熱而湧既知其熱投以火齊湯以熱攻熱雖得法若熱加增由中下而上湧將奈如其得溲也亦幸矣哉華佗注二二四熱病氣齊中御府長信冬時為王使於楚至莒縣陽周水而莒橋梁頗壞信則攬車轅未欲渡也馬驚即墮信身入水中幾死吏即來救信出之水中衣盡濡有間而身寒已熱如火至今暑汗不可以見寒臣意即為之液湯火齊逐熱一飲汗盡再飲熱去三飲病已此水氣入腠理針天柱骨可愈意不用針而用湯幸汗出否則必成紫雲瘋若謂失治一時即轉為寒熱殆漠視耳若依脈法熱病陰陽交者死則信萬不致此因信汗肌能排泄水氣伏寒不致內陷也華佗注二二五風癉客脬此難於大小便溺赤臣意飲以火齊湯一飲即前後溲再飲病已溺如故意之言曰脈大而躁大者膀胱氣也躁者中有熱而溺赤又切其太陰之口濕熱風氣也予嘗以白蝴蝶花根煎湯飲見效考意火齊湯用附子肉桂大戟大黃漢防己車前子防風此豈可常用意何恃為絕技也哉吳普注二二六肺消癉即肺氣熱山跗病得之盛怒而以接內所以知山跗之病者臣意切其脈肺氣熱也齊太醫先診山跗病灸其足少陽脈口而飲之半夏丸病者即泄注腹中虛又灸其少陰脈是壞肝剛極深如是重損病者氣以故加寒熱所以後三日而狂者肝一絡連屬結絡乳下陽明故絡絕開陽明脈陽明脈傷即當狂走後五日死者肝與心相去五分故曰五日盡盡即死矣按此先病肝後痰肺繼之以灸夏飲半夏燥烈品然苟大補元氣如漆葉青䴴散非不可治第須久服緩不濟急耳樊阿注二二七積瘕瘕與症異症堅而瘕軟症以血為之瘕以氣為之也齊中尉潘滿如病少腹痛臣意切其脈深小弱其卒然浮合也是脾氣也右脈口氣至緊小見瘕氣也後溲血死按此若經吾師治必不令其瘕之自潰溲血而死意蓋僅能診脈決死生而決不能治病也脾去而人不致死瘕破而肉不致痛此理彼猶未知耳樊阿注二二八迴風又名內風俗名酒膈陽虛侯相趙章病得之酒眾醫皆以為寒中臣意診其脈曰迴風迴風者飲食下嗌而輒出不留法曰五日死而後十日乃死因其人嗜粥中臟實故過期師言安穀者過期不安穀者不及期按此若翻胃可用桑榾柮即桑枝拳曲處煎湯服或服葛花若吾則以針刺胸背散其酒氣內風自平樊阿注二二九風蹶濟北王病得之汗出伏地臣意切其脈時風氣也陽氣盡行而陰氣入陰氣入張則寒氣上而熱氣下故胸滿即為藥酒盡三石病已藥酒盡三石阿信用之堅如不飲酒則此風終不愈矣可知醫雖良須病者服從耳或實有可治之質耳樊阿注二二九氣疝齊北宮司空命婦疝氣客膀胱雖於前後溲而溺赤病見寒氣則遺溺眾醫皆以為風入中病主在肺刺其足少陽脈臣意謂腹之所以腫者厥陰之絡結小腹也厥陰有過則脈結動動則腹腫臣意即灸其厥陰之脈左右各一所即不遺溺而溲清小腹痛止即更為火齊湯以飲之三日而疝氣散即愈按意治病純用火齊湯所謂得意佳作也不知此病之愈得力在灸以厥陰病灸厥陰脈一灸而絡舒吾之攻灸有鑑於斯樊阿注二二一一熱蹶濟北王阿母自言足熱而懣臣意告曰熱蹶也則刺其足心各三所即三壯也按之無出血病旋已病得之飲酒大醉也大醉者至於四肢發瘋斑或腹下膿瘡累累若用瀉劑中氣愈虛長熱不退刺其足心以泄內熱誠捷訣也予願師事之樊阿注二二一二嘔血濟北王女子豎奉劍從王之廁王去豎後王令人召之即僕於廁嘔血死病得之流汗流汗者同法法當春嘔血死也病內重毛髮色澤脈不衰脾可割可補故脾雖傷而毛髮色澤脈不衰惟大忌嘔血大忌流汗醫遇此症貿然進藥者多矣吾願舉是以曉之樊阿注二二一三齲齒一名蛀齒缺朽也齊中大夫病齲齒臣意灸其左陽明脈即為苦參湯日漱三升出入五六日病已得之風及臥開口食而不漱食後宜漱口為保齒秘訣況臥時受風風將內襲即醒而咀嚼使風聚而不散齒故先病至於缺朽苦參子澀斂漱之用風解而齒固此牙科丹方之一也二二一四通乳菑川王美人懷子而不乳召臣意臣意往飲以莨碭藥一撮以酒飲之旋乳臣意復診其脈而脈躁躁者有餘病即飲以硝石芒硝石膏一劑出便也血血如豆比五六枚莨碭今無買可用穿甲代之腸胃內燥血氣不流行是以無乳飲以硝石則熱降而燥潤瘀去而新生矣醫生多治標而不知治本如治無乳則僅通乳而已必不顧其餘病若治至出血病家且將大咎醫生由是醫生多用酬方有宿疾者永不可去中國醫途可見一斑矣樊阿注二二一五傷脾氣齊丞相舍人奴病得之流汗數出灸於火而以出見大風也望之殺然黃黃者土氣也土不勝木當至春隔塞不通不能食飲法至夏泄血死眾醫以為大蟲不知其傷脾氣也醫不能望色即不能辨症自並生死不能決矣若再訣治勢必加劇若此症眾醫以為大蟲必投瀉藥化蟲藥無疑故成傷脾否則流汗見風病在皮孔何以傷及脾氣哉且傷脾不比傷肺傷肝況當能食治之尤易乃知其病而無方則亦何貴乎有名醫不惟舍人不幸當時病者亦皆不幸也樊阿注二二一六蹶上為重菑川王病得之沐發未乾而臥蹶上為重頭痛身熱使人煩懣臣意即以寒水拊其頭刺足陽明脈左右各三所痛漸已寒水有反激力足以使熱從上出針刺有溫瀉力足以使風從下泄下泄則心懣除上出則頭痛止不用湯藥蓋亦可治病也樊阿注二二一七腰脊痛宋建弄石不能起即復置之暮腰脊痛不得溺臣意見其色太陽色干腎部上及腰以下枯四分所故以往四五日知其發也臣意即為柔湯服之十八日所而痛愈又曰不亟治痛即入濡腎及其未舍居也五臟急治之病方今客濡腎即腎外膜濡濕處也此所謂腎痹也柔湯即陽和湯流暢血脈化滯去瘀此湯肆中人皆知何經十八日始愈因陽數止於九九九相生則陽復矣吾謂吾師有膽倉公有識樊阿注二二一八月事不下濟北王侍者韓女病腰背痛寒熱眾醫皆以為寒熱也診其脈時切之腎脈也澀而不屬故月事不下肝脈弦出左口此由欲男子而不可得也即竄以藥旋下痛已吾師有四物女宛丸專治女病意藥當不外此可笑眾醫以此症為寒熱吾不知其用常山柴胡草果仁乎抑同鱉甲龜膠乎樊阿注二二一九蟯瘕臨菑汜里女子薄吾病蟯瘕蟯瘕為病腹大上膚黃粗循之慼慼然動貌臣意飲以芫花一撮即出蟯可數升病已三十日如故病蟯得之於寒濕寒濕氣宛篤不發化為蟲其色澤者中臟無邪氣及重病也凡寒濕雖居陰亦喜外出蟯成於寒濕其性亦然故遇芫花引吐而大出眾醫以此病為寒熱篤當死不治可笑也夫樊阿注二二二飽食疾走齊淳于司馬食馬肝食飽甚見酒來即走去驅疾至舍即泄數十出臣意告曰為火齊米鬥飲之七八日而當愈飽食疾走震動腸胃失其分泌故泄數十以火齊化其積滯見上以米汁潤其穀道經七日一來復自能愈矣或謂米汁可治迴風迴風之狀飲食嗌輒後之即泄也見上此方勿輕視因試見效也樊阿注二二二一傷肺溲血齊中郎破石病得之墮馬僵石上肺傷不治其人嗜黍黍主肺故不及期死診脈法曰病喜養陰處者順死喜養陽處者血死其人喜自靜不躁又久安坐伏几而寐故血下泄按傷肺者必吐血彼獨溲血自由靜也凡病肺最難治吾師雖能割腹不能剪肺故肺傷者必不治人言白芨可補肺可補癰痿之肺耳非補墮傷者也倉公不以湯藥著於病理脈理獨詳耳樊阿注二二二二中熱齊王侍醫遂名也中熱論曰中熱不溲者不可服五石石性重膩服之增悶石之為藥精悍公服之不得數溲便閉也亟勿服色將發癰遂曰扁鵲曰陰石以治陰病陽石以治陽病也夫藥石者有陰陽水火之劑故中熱即為陰石柔齊治之中寒即為陽石剛齊治之意謂扁鵲雖言若是然必審診起度量立規矩稱權衡合色脈表裡有餘不足順逆之法參其人動靜與息相應乃可以論論曰陽疾處內陰形應外者不加悍藥及鑱石診法曰二陰應外一陽接內者不可以剛藥剛藥入則動陽陰病益衰陽邪益著邪氣流行為重困於愈忿發為疽意告之後百餘日果為疽髮乳上入缺盆死此請用藥石者鑑樊阿注二二二三脅下大如覆杯陽虛候時名也病得之內眾醫皆以為蹶臣意診脈以為痹根在右脅下大如覆杯令人喘逆氣不能食臣意即以火齊粥且飲六日氣下即令更服丸藥出入六日病已予治一人腹下堅痞大如覆杯不痛腫惟氣逆病得之暮年納妾投以黃耆熟地黨參氣下痞消即此類也樊阿注二二二四沓風成開方病得之數飲酒以見大風氣苦沓風三歲四肢不能自開使人喑喑即死酒後受大風漸入於內發熱口燥至四肢不能用經絡病矣至於失音肺氣絕矣酒有發酵力最傷腦與肺觀此沓風當知所戒樊阿注二二二五牡疝項處病牡疝牡疝在膈下上連肺病得之內即上腹下堅痞大如覆杯是也臣意謂之慎毋為勞力事為勞力事則必嘔血死處後蹴踘腰蹶寒汗出多即嘔血死牡疝之成由腎氣虛勞力則汗出肺氣不能制因嘔血凡成橫痃者亦牡疝之類也第地位較牡疝又為下耳戒之在色人何忽諸樊阿注二二二六喘文王病喘頭痛目不明臣意心論之以為非病也以為肥而蓄精身體不得搖骨肉不相任故喘不當醫治脈法曰年二十脈氣當趨年三十當疾步年四十當安坐年五十當安臥年六十以上氣當大董文王年未滿二十方脈氣之趨也而徐之不應天道四時後聞醫灸之即篤此論病之過也臣意論之以為神氣爭而邪氣入非年少所能復之也以故死所謂氣者當調飲食擇宴日車步廣志以適筋骨肉血脈以瀉氣故年二十是謂易𧵍法不當砭灸砭灸至氣逐頭痛目不明濕重可知陰虛亦可知濕重之人大可砭灸惟陰虛則不可灸況又病喘灸固不宜若以年齡拘則世有下胎而灸嬰得不免者將何說哉樊阿注
