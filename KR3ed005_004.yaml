body:
  text: 卷四華他內科神方四一華他治傷寒初起神方傷寒始得一日在皮當摩膏火炙即愈若不解者至二日在膚可法針服解肌散發汗汗出即愈若不解者至三日在肌復發汗則愈若不解者止勿復發汗也至四日在胸宜服藜蘆丸微吐則愈若更困藜蘆丸不能吐者服小豆瓜蒂散吐之則愈視病尚未醒者復一法針之五日在腹六日入胃入胃則可下也又傷寒初起時用柴胡白芍茯苓甘草桂枝麻黃各一錢當歸二錢陳皮五分水煎服極效四二華他治傷寒不汗神方凡患傷寒一日至二日不汗者宜用葛根半斤烏梅十四枚蔥白一握豆豉一升綿裹以水九升煮取三升分為三服初一服便厚覆取汗汗出粉之四三華他治傷寒譫語神方大黃四兩厚朴二兩炙枳實三枚炙以水四升煮取一升二合去滓分溫再服若一服得利譫語止勿服之也四四華他治傷寒發狂神方凡傷寒熱極發狂驚悸恍惚可急用石膏二錢黃連一錢為末煎甘草水冷服有效四五華他治傷寒結胸神方傷寒結胸者謂熱毒氣結聚於心胸也此由病發於陽而早下熱氣乘虛而痞結不散也按之痛寸脈浮關脈沉是也可用蜀大黃半斤葶藶子半升熬杏仁半升去皮尖熬令赤黑色芒硝半升上四味搗篩二味杏仁合芒硝研如泥和散合劑丸如彈子大每服一丸用甘遂末一錢匕白蜜一兩水二升同煮取一升溫頓服之一宿乃自下如不下更服取下為要或用栝蔞一枚捶碎甘草一錢同煎服之極神效四六華他治傷寒發斑神方傷寒內發斑身熱心如火口渴呼水氣喘舌燥是謂陽火焚於胃口宜用大劑寒涼撲滅之方用元參三兩黃芩一兩麥冬三兩升麻二錢防風天花粉青黛生甘草各三錢生地一兩桑白皮五錢蘇葉一錢一劑即消大半二劑全愈按此方雖傳自神仙惟升麻用至二錢余藥也用至數兩用者大宜斟酌不可泥古孫思邈注四七華他治傷寒發黃神方用麻黃一握去節綿裹陳酒五升煮取半升頓服取小汗春月可用水煎四八華他治傷寒中風神方丹砂十二銖蜀椒蜀漆乾薑細辛黃芩防己桂心茯苓人參沙參桔梗女萎烏頭各十八銖雄黃二十四銖吳茱萸三十銖麻黃代赭石各二兩半上十八味冶下篩酒服方寸匕日三覆令汗出四九華他治傷寒吐血神方青柏葉三兩乾薑二兩艾三把以水五升煮取一升去滓別絞取新出馬通汁一升相和合煎取一升綿濾之溫分再服馬通汁是馬屎汁也四一華他治傷寒下血神方釜灶下黃焦土半升棉裹甘草三兩炙乾地黃三兩白朮三兩附子三兩炮研阿膠三兩炙黃芩三兩先以水八升煮六味取三升去滓納膠令煬分三服忌海藻菘菜蕪荑豬肉桃李等四一一華他治傷寒衄血神方衄者鼻出血也此由五臟熱結所為方用左顧牡蠣十分熬石膏五分上二味搗末酒服方寸匕日三四亦可蜜丸如梧子大酒服十五丸四一二華他治傷寒煩渴神方知母六兩石膏一升粳米六合人參三兩甘草二兩先以水一斗二升煮米熟去米納諸藥煮取六升去滓溫服一升日三忌海藻菘菜四一三華他治傷寒食積神方黃芩大黃各五兩梔子仁十六枚黃連五兩去毛豆豉一升熬甘遂三兩麻黃五兩去節芒硝二兩巴豆一百枚去皮及心熬研上九味搗篩白蜜和丸如梧子服三丸以吐下為度若不吐利加二丸四一四華他治傷寒咳嗽神方知母二兩貝母葛根芍藥各三兩石膏四兩黃芩三兩杏仁一兩去皮尖及雙仁梔子仁三兩上八味切以水七升煮取二升五合去滓分為三服如人行八九里再服忌蒜面七日四一五華他治傷寒目翳神方秦皮升麻黃連各一兩上三味用水四升煮取二升半冷之分用三合仰眼以綿繞筋頭取湯以滴眼中如屋漏狀盡三合止須臾復日五六遍乃佳忌豬肉冷水四一六華他治傷寒口瘡神方升麻炙甘草各一兩竹葉五分麥門冬三分去心牡丹一分干棗二十枚上六味以水四升煮取一升半去滓分五服含稍稍咽之為度忌海藻菘菜胡荽等四一七華他治傷肢痛神方煮馬屎與羊屎汁漬之日三度或以豬膏和羊屎塗之亦佳四一八華他治傷寒虛羸神方本症為其人血氣先虛復為虛邪所中其後經發汗吐下後熱邪始散真氣尚少五臟獨虛穀神未復故其候為虛羸少氣氣逆並嘔吐方用石膏一斤竹葉一把人參二兩半夏一升生薑四兩炙甘草二兩上藥以水一斗二升煮取六升去滓納粳米一升米熟去米飲一升日三服忌海藻菘菜羊肉餳四一九華他治傷寒不眠神方本病為陽獨盛陰偏虛之症其候為不得眠反復顛倒心內苦痛懊憹方用肥梔子十四枚香豉四合綿裹以水四升先煮梔子取二升半去滓納豉更煮取一升半去豉分溫再服得吐止服四二華他治傷寒小便不利神方滑石二兩葶藶子一合熬二物以水二升煮取七合去滓頓服之四二一華他治傷寒下利神方傷寒腹中微痛下痢不止方用秦皮三兩黃連四兩白頭翁二兩阿膠三兩先以前三味入水八升煮取二升去滓納膠令煬適寒溫先食飲七合日二服忌豬肉冷水四二二華他治傷寒頭痛神方乾薑防風沙參細辛白朮人參蜀椒茯苓麻黃黃芩代赭石桔梗吳茱萸各一兩附子一枚上為末先食酒服一錢匕日三四二三華他治傷寒喉痛神方此為下部脈不止陰陽隔絶邪客於足少陰之經毒氣上熏故喉咽不利或痛而生瘡方用半夏炙甘草桂心三味等分各搗篩畢更合搗之以白湯飲服方寸匕日三服四二四華他治傷寒舌出神方梅花片腦半分為末搽之即收四二五華他治傷寒氣喘神方紫蘇一把水煮稍稍飲之其喘立止或以防己人參等分為末桑白皮煎水服二錢四二六華他治傷寒便祕神方大黃厚朴炙各三兩枳實炙六片以水五升煮取二升體強者服一升羸者服七合四二七華他治傷寒厄逆神方蓽澄茄高良薑各等分為末每服二錢水六分煎十沸入醋少許服之四二八華他治傷寒嘔噦神方橘皮炙甘草各一兩人參二兩生薑四兩以水六升煮取二升去滓分三服忌海藻菘花四二九華他治傷寒厥逆神方其症為面青四肢厥冷腹痛身冷用大附子二枚炮製去皮臍為末每服三錢薑汁半盞送下以臍下如火暖為度四三華他治傷寒搐搦神方本症為汗後覆蓋不密致腰背及四肢搐搦用牛蒡根十條麻黃牛膝天南星各六錢銼細再入陳酒一碗於盆內同研以新布絞汁以炭火燒藥至黑色每服一錢溫酒下日凡三服四三一華他治傷寒脅痛神方本症為心下痞滿痛引兩脅以芫花甘遂大戟各等分為末大棗十枚水一碗半煎取八分去滓身強者服一錢弱者五分宜平旦四三二華他治傷寒血結神方胸膈脹滿痛不可近用海蛤滑石甘草各一兩芒硝五錢共為末每服二錢雞子白調下四三三華他治傷寒腹脹神方桔梗半夏陳皮各三錢生薑五片水兩碗煎服四三四華他治傷寒中寒神方生附子一兩去皮臍炮乾薑一兩每服三錢水二碗煎取一碗溫服四三五華他治陰症傷寒神方陰症傷寒即夾色傷寒俗名夾陰傷寒先因欲事後感寒邪陽衰陰勝六脈沉伏小腹絞痛四肢逆冷男子腎囊或女子乳頭內縮或手足彎曲紫黑黑甚則牙緊氣絶宜急下人參乾薑各一兩生附子一枚剖為八片水四碗半煎取一碗頓服須臾自脈出而身溫矣四三六華他治傷寒陰陽易神方本症為男女傷寒病新瘥未平復與之交接而得病者其在男子病新瘥未平復而婦人與之交接得病者名陽易婦人病新瘥未平復而男子與之交接者名陰易其狀身重小腹裡急或引陰中拘攣熱上衝胸頭重不能舉眼內生曦四肢拘急不速治多死婦人陽易方宜用乾薑四兩搗末湯和一頓服溫復汗出得解男子陰易宜用薤白一大握豭鼠糞十四枚以水五升煮取二升盡飲之溫臥汗出便愈又男子陰易可取女人中褌近陰處燒之取其灰為散服方寸匕日三小便即利陰頭微腫此為愈也若女人病可取男子褌如前法酒水服四三七華他治傷寒勞復神方本症為傷寒病新瘥津液未復血氣尚虛若勞動早更復成病故云復也宜用鼠屎二十一枚香豉一升梔子七枚大黃三兩以水五升煎取二升七合分三服微取汗數試異驗四三八華他治傷寒食復神方本症為傷寒病新瘥脾胃尚虛穀氣未復若食豬肉腸血肥魚及油脂物必大下利醫所不能治必至於死若食餅餌粢飴脯膾炙棗栗諸果物堅實之物胃氣虛弱不能消化必更結熱適以藥下之則胃氣虛冷大利難禁不下必死下之又復危險不可不慎宜用香豉五合炙甘草桂心各二兩大黃四兩芒硝半斤以水六升煮取二升去滓先食適寒溫飲一升日再忌海藻菘菜生蔥等物四三九華他治傷寒百合病神方百合病者謂無經絡百脈一宗悉致病也皆因傷寒虛勞大病之後不平復變成斯病也其狀如欲食復不能食欲臥不得臥欲出行而不能出行如有寒復如無寒如有熱復如無熱諸藥不能療得藥則劇而吐利行持坐臥神靈式憑治法以百合為主而佐以知母者為治已經發汗後更發之法方用百合七枚知母三兩先用泉水洗漬百合一宿去其水更以泉水二升煮取一升去滓次以水二升煮知母得一升與百合汁和復煮取一升半分二次服若已經下後更發者則如前法浸煮百合七枚外可更以滑石三兩代赭一兩用水二升煮取一升和百合汁復煮得一升半如前法服之又百合病已經吐後更發者亦如前法先浸煮百合七枚乃以雞子黃納汁中攪勻分再服又若百合病始不經發汗吐下其病如初者可仍如前法先浸煮百合次以生地黃汁一升與百合汁相和再煮取一升半溫分再服一服中病可勿更服大便當出惡沫四四華他治中風神方凡卒中風欲死身體緩急口目不正舌強不能語奄奄忽忽神情悶亂宜急用麻黃防己人參黃芩桂心白芍藥甘草川芎杏仁各一兩防風一兩半附子一枚生薑五兩先以水一斗一升煮麻黃三沸去沫乃納諸藥煮取三升分三服極效四四一華他治中風口噤神方淡竹瀝一斗防風葛根菊花細辛芍藥白朮當歸桂心通草防己人參炙甘草炮附子茯苓玄參各一兩秦艽生薑各二兩桑寄生三兩以淡竹瀝煮諸藥得四升分四次服之忌海藻菘菜豬肉生菜生蔥醋桃李雀肉等物四四二華他治中風口喎神方取葦筒長五寸以一端刺耳孔中四面以面密塞勿令泄氣一端納大豆一粒並艾燒之令燃灸七壯即瘥患右灸左患左灸右四四三華他治中風失音神方羌活十分炙甘草人參各二分荊瀝竹瀝生地黃汁各二升大附子一枚炮以諸藥納三汁中煎取一升六合去滓分二次服未瘥四五日更進一劑取微利忌面海藻菘菜豬肉冷水蕪荑魚蒜黏食四四四華他治中風不語神方取人乳汁半合以著美酒半升中合攪分為再服四四五華他治中風舌強神方雄黃荊芥穗等分為末豆淋酒服二錢四四六華他治中風痰厥神方生川烏頭生附子各半兩去皮臍生南星一兩生木香二錢半每服五錢生薑十片水煎一盞溫服四四七華他治中風痰壅神方旋覆花洗淨焙乾為末蜜為丸大如梧子臥時茶下五丸至七丸或十丸四四八華他治中風氣厥神方治法略同於中風痰厥可略為加減四四九華他治中風發熱神方大戟苦參各四兩用白醋漿一斗煮沸洗之四五華他治中風掣痛神方凡身中有掣痛不仁不隨處者取干艾葉一糾許丸之納瓦甑下塞余孔唯留一目以痛處著甑目下燒艾以熏之一時間愈矣四五一華他治中風腹痛神方取鹽半斤熬令盡著口中飲熱湯二升得便吐愈四五二華他治中風角弓反張神方雞屎二升大豆一升防風三兩以水三升先煮防風取三合汁納豆雞屎二味熬之令黃赤色用酒二升淋之去滓然後用防風汁和分為再服相去如人行六七里衣覆取汗忌風四五三華他治中風口眼歪斜神方皂角末陳醋調塗口上右喎塗右左喎塗左俟干即換數次即愈或以生烏頭青礬搐鼻亦效四五四華他治中風頸項直硬神方此肝腎受風寒所致也將宣木瓜去瓤入乳香沒藥於其中以線縛定飯鍋上蒸三四次研成膏入生地黃汁熱酒沖服四五五華他治中風手足不遂神方白朮地骨皮荊實各五升菊花三升以水三石煮取一石五斗去滓澄清取汁釀米二石用曲如常法以酒熟隨量飲之常取半醉勿令至吐四五六華他治中風半身不遂神方獨活四兩桂心五兩生葛根八兩炙甘草防風當歸各二兩芍藥附子各一兩炮半夏一升洗上藥以水一斗煮取三升分為三服日三大驗忌海藻菘菜生蔥豬肉羊肉餳四五七華他治五癲神方癲病有五一曰陽癲發時如死人遺尿有頃乃解二曰陰癲乃初生小時臍瘡未愈數洗浴因此得之三曰風癲發時眼目相引牽縱反急強羊鳴食頃方解由熱作汗出當風因以房室過度醉飲飽滿行事令心氣逼迫短氣脈悸得之四曰濕癲眉頭痛身重坐熱沐發濕結腦汗未止得之五曰馬癲發時反目口噤手足相引身皆熱系小時風氣腦熱不和得之下方任何癲症俱可用之方用銅青雄黃空青東門上雞頭水銀各一兩豬苓茯苓人參白芷石長生白蘞白薇各二兩卷柏烏扇各半兩硫黃一兩半上為末以青牛膽和著銅器中於甑中五斗大豆上蒸之藥成丸如麻子每服三十丸日二夜一按此方首尾多金石之品宜於西北若大江以南水土柔弱症多虛弱不宜用此恆有以烏蠍六君鹿茸八味收功者未可執此概論也孫思邈注四五八華他治風癲神方凡風癲失性卒然倒地吐涎沫遺糞便人事不知者用下方治之鴟頭一枚炙葶藶子鉛丹虎掌烏頭栝蔞根各三分甘遂大戟炙天雄炮蜀椒各二分白朮一分鐵精䕡茹各一兩上共為末蜜丸大如梧子酒下二丸日三忌桃李雀肉豬肉冷水四五九華他治羊癇風神方卒然仆地不省人事口吐白沫聲如羊鳴可用鉛丹二兩熬成屑珍珠雄黃雌黃水銀各一兩丹砂半兩各研末和以蜜又搗三萬杵乃為丸如胡頭大先食服三丸日再四六華他治發狂神方發狂為一種熱病登高而歌見水而入戲笑怒罵不絶於口舌生芒刺面目火腫治法宜用石膏半斤玄參一斤白芥子半夏各三兩知母甘草人參各一兩麥冬五兩竹葉數十片先用糯米半斤煮湯得半鍋去米入前藥煎之得數碗患者索水時即與之飲後必睡急用玄參一斤麥冬半斤煎湯俟醒時呼飲即與之服後又睡醒時仍將前滓煎湯與之後用熟地三兩元參六兩山茱萸一兩水煎三碗與之一劑即愈四六一華他治癡呆神方此病患者常抑鬱不舒有由憤怒而成者有由羞恚而成者方用人參柴胡當歸半夏酸棗仁菖蒲各一兩茯苓三兩白芍四兩甘草天南星神麯鬱金各五錢附子一錢水十碗煎取一碗強飲之少頃困倦欲睡任其自醒即愈四六二華他治花癲神方此病多發於女子緣肝木枯槁內火燔盛所致宜平肝散郁祛邪之劑方用柴胡五錢芍藥一兩當歸五錢炒梔子三錢甘草一錢茯神三錢菖蒲一錢麥冬五錢元參三錢白芥子五錢水煎服飲後即臥臥後醒時即愈四六三華他治牛馬癲神方牛馬癲病發時作牛馬之聲以大人居其多半宜健胃祛痰之劑方用白朮五兩人參三兩甘草生南星半夏各一兩陳皮一錢附子一錢共為末蜜為丸須於病未發前服之服後永不再發患羊癲者亦可先用此方治之四六四華他治五邪神方凡中邪者多由心神怯弱外邪乘之遂致痰迷心竅一時卒倒患者精神錯亂心悸跳動妄言譫語似有鬼神憑之宜安神開竅導熱壯元之劑方用茯神茯苓菖蒲人參各三兩赤小豆四合以水一斗煮取二升半分三服四六五華他治尸厥神方人參一兩白朮半夏茯苓各五錢菖蒲一錢陳皮五分水煎服四六六華他治見鬼卒倒神方凡人偶遊神廟之內在棺槨之旁偶迫尸氣感中陰邪鬼魅易致此症宜先以瓜蒂赤小豆各一兩研末更以香豉一合熱湯七合煮成稀糜去滓取汁和前藥溫頓服之俟快吐乃止後用白朮一兩茯苓五錢白薇二錢陳皮五分半夏一錢神麯炮姜各一錢水煎服四六七華他治男女風邪神方凡男女偶中風邪男夢見女女夢見男夢中交歡日久成勞悲愁憂恚喜怒無常日漸羸瘦連年纍月深久難療或半月或數月一發宜散肝風去痰濕方用桑寄生三兩白朮茵芋各二兩桂心天雄菖蒲細辛茜根附子乾薑各一兩上共搗為末用酒服下方寸匕日三修合時勿令婦人雞犬及病者家人知見令邪氣不去禁之為驗四六八華他治中賊風神方賊風者謂冬至之日有疾風從南方來者人若中之則五臟四肢及心胸腰背等處痛不可忍至能傷害於人故名賊風宜以桂心防風黃芩乾薑茱萸秦艽甘草各三兩用水五升煮取一升半分再服以愈為止忌海藻菘菜生蔥四六九華他治歷節風神方患此者歷節疼痛不可忍屈伸不得由飲酒腠理汗出當風所致亦有血氣虛受風邪而得之者宜用獨活羌活松節等分用酒煮空心服四七華他治白虎風神方日夜走注百節如齧以陳醋五升蔥白三升切待陳醋煎數沸納蔥白煎一沸濾出以布蘸汁乘熱裹之四七一華他治鬼箭風神方患者頭項肩背手足腰肢等處筋骨疼痛不安用鯪鯉甲一錢炒黃澤蘭三錢酒煎服四七二華他治骨軟風神方患者腰膝痛不能行且遍身瘙癢可用何首烏牛膝各一斤以酒一升浸七日取出曝乾搗為末棗肉和丸如梧子大每服三五十丸空心酒下四七三華他治鶴膝風神方此病初起時膝下痠痛漸至膝蓋膨脹股筋憔瘦其病原為腎虛虧可用新鮮白芷酒煮成膏每日以膏二錢陳酒送服再用以塗患處至消乃止四七四華他治鵝掌風神方手掌白皮堅硬幹燥層層蛻皮血肉外露或痛或癢久則難愈用鴿屎白雄雞屎炒研煎水洗之忌入口四七五華他治雞爪風神方發時手指拘攣拳縮如雞爪故名急於左右膝蓋骨下兩旁鬼眼穴中各灸三壯立愈四七六華他治大麻風神方本症由水枯火盛乘天地肅殺之氣所致形雖見於皮膚毒實積於臟腑其候先麻木不仁次發紅斑再次浮腫破爛無膿再久之則濕熱生蟲攻蛀臟腑往往眉落目損唇裂聲嘶耳鳴足底穿指節脫落鼻梁崩塌治法先以麻黃蘇葉各半斤防風荊芥各四兩煎湯一桶沐浴浸洗換新衣然後以生漆松香各半斤和勻盛瓦盆內入大螃蟹七隻小者倍之以盆一半埋入土內日則曬之用柳枝攪擾夜則覆之閲二十一日而成水再以雄黃半斤蛇蛻七條川烏草烏俱以薑汁浸泡人參天麻各二兩共研為末以蟹漆汁為丸於洗浴後服之每服三錢陳酒送下再飲至醉覆被取汗汗乾後去衣於隙地焚之更換新衣至午再服三錢陳酒下至醉再用夏枯草蒸鋪席下臥之不取汗次日仍如前行之並焚去舊衣舊草如是七日其病盡出如痘如瘡再服七日痂脫而愈終身忌螃蟹犬肉四七七華他治大癘風神方凌霄花五錢地龍焙殭蠶炒全蠍炒各七個為末每服二錢溫酒下先以藥湯浴身次乃服藥俟出臭汗為度四七八華他治走遊風神方風菱殼燒灰研細香油調敷極效四七九華他治繡球風神方茄一枝連根葉煎湯熏洗凡七日而脫殼極靈效四八華他治癧瘍風神方石硫黃三兩硇砂生附子各二兩雄黃一兩共搗成末以苦酒和如泥塗瘍處干即更塗瘥為度四八一華他治白癜風神方苦參三斤露蜂房炙松脂附子炮防風各三兩梔子仁五兩烏蛇脯炙六兩木蘭皮共搗為末一服一匕陳酒下外用附子天雄烏頭各三兩防風二兩以豚脂煎膏塗之四八二華他治白駁風神方多生於頸項及頭面上浸淫漸長狀類癬而無瘡治法先洗拭駁上以竹篦亂之使磣痛拭乾後以干鰻鱺魚脂塗之輕者一次即愈重者不逾三次四八三華他治各種癱瘓神方癱瘓謂四肢不能動彈頑痹不仁筋骨攣縮也治法須視其得疾之原因而異如因中風而癱瘓者宜用鯪鯉甲川烏頭炮紅海哈各二兩為末每用半兩搗蔥白為汁和成泥餅經約寸許隨左右貼腳心縛定以腳浸熱湯盆中待身汗出即去藥半月行一次自能除根如因風濕而成癱瘓者宜用鳳仙花柏子仁朴硝木瓜煎湯洗浴每日二三次因熱風而起癱瘓者可用羌活二升枸子一升為末酒服一匕日三因暑濕而成癱瘓者用自然銅燒紅酒浸一宿川烏頭五靈脂蒼朮各一兩當歸二錢酒浸後乾研為末酒糊丸梧子大服七丸酒下覺四肢麻木始止四八四華他治腎囊風神方鱉甲蛇床子白芷各等分研末以香油調敷極效四八五華他治霍亂吐痢神方霍亂者由溫涼不調陰陽清濁二氣有相干亂之時其亂在於腸胃之間者因遇飲食而變發則心腹絞痛其有先心痛則先吐先腹痛者則先痢心腹俱痛則吐痢兼發謂之霍亂者言其病揮霍之間便致撩亂也宜急用半夏人參各三兩附子炮乾薑炮各四兩桔梗二兩共搗為末為丸如梧子以苦酒下二丸不瘥復服如霍亂已死上屋喚魂又以諸治皆至而獨不瘥者可捧病人腹之伸臂對以繩度兩頭肘尖頭依繩下夾背脊不骨穴中去脊各一寸灸之百壯可治者可灸肘椎已試數百人皆灸畢即起坐四八六華他治霍亂轉筋神方轉筋者由冷氣入於筋故也凡霍亂大吐痢之後陰陽俱虛則手足逆冷而營衛不理冷搏於筋則筋為之轉急用吳茱萸一升甘草炙乾薑炮各二兩蓼子一把亂髮一兩燒桂心二兩以水七升煮取二升三合去滓分溫三服服畢相去如人行六七里並灸蹶心當拇指大聚筋上六七壯名湧泉又灸足大趾下約中一壯神驗四八七華他治霍亂乾嘔神方乾嘔者謂欲嘔而無出也用厚朴炙二兩生薑枳實炙各三兩以水六升煮取二升分三服並灸手腕後三寸兩筋間左右各七壯名間使若正厥嘔絶灸之便通四八八華他治霍亂腹痛神方人參乾薑炮甘草炙白朮各三兩當歸芍藥各二兩以水三升去滓溫服一升日三四八九華他治霍亂四逆神方霍亂大吐大下後其腸胃俱虛乃主汗出其脈欲絶手足皆冷者各為四逆宜急用吳茱萸細辛通草甘草炙葛根各二兩當歸桂心芍藥各三兩生薑八兩以水六升酒六升合煮取三升分四服並灸兩足內踝上一尖骨是也兩足各七壯不愈加數名三陰交在內踝尖上三寸是也四九華他治霍亂煩躁神方其症為霍亂吐下之後煩躁而不得安臥用蔥白二十莖大棗二十枚以水二升半煮取一升去滓頓服之四九一華他治霍亂煩渴神方本症因大吐之後上焦虛氣不調氣乘於心則煩悶也大利之後則津液竭津液竭則臟燥臟燥則渴也可用木瓜一枚以水四升煮取二升渴則即令飲之根莖亦可用之四九二華他治乾霍亂神方凡霍亂多吐利若上不得吐下不得利腹痛欲死者名乾霍亂宜用鹽一匕熬令色黃和童溺一碗溫服之俟能吐即愈四九三華他治絞腸痧神方馬糞一兩炒黑入黃土一撮微炒以陳酒熱服五錢一劑即痛去如失四九四華他治噤口痧神方患者寂無聲息宜先用瓷匕浸於熱水與香油汁中在背心自上而下刮之始輕後重俟刮之痧點起塊乃止再用烏藥青皮陳皮山楂紫朴上五味等分溫服四九五華他治羊毛痧神方患者腹脹痛延及背心或腰胯如有芒刺可用燒酒罈頭泥土研之極細和燒酒作輥擦痛處即有細白毛黏於其上四九六華他治𭼼痧神方患者滿身脹痛面色黯然各部皆現黑斑是為毒在臟腑以致氣滯血凝方用蘇木延胡索五靈脂天仙子蘿蔔子各一兩三稜莪朮薑黃陳皮檳榔枳實厚朴各七錢烏藥五錢香附四錢沉香降香各三錢阿魏二錢搗細末為丸如緑豆大每服十五丸砂仁湯下四九七華他治斑痧神方患者頭眩眼花噁心嘔吐身有紫斑痧在肉內治法先以治噤口痧法次以天花粉丹皮薄荷地骨皮山梔玄參細辛七味等分煎服四九八華他治各種痧症神方初起時多半腹痛亦有並不痛只覺昏沉脹悶者切忌服姜急用南蛇藤煎水沖酒服之四九九華他治夏季中暑神方人參一兩青蒿三兩香薷三錢白朮五錢水煎服極有效如中暑發狂氣喘汗如雨下宜急用人參石膏各四兩黃連三錢水煎服一劑而神定二劑而汗止若中暑猝倒心痛欲死者宜急用青蒿一兩黃連人參白朮各三錢茯神藿香各五錢香薷半夏各一錢水煎服一劑而痛即止又如中暑忽倒口吐白沫將欲發狂身如火燒紫斑爛然者多不可救宜急用玄參麥冬各三兩天冬青蒿各一兩升麻荊芥黃連黃芩各三錢水煎服一劑而斑色變淡三劑而斑色褪盡矣四一華他治核子瘟神方生石膏一兩玄參野菊花金銀花連翹丹皮各四錢薄荷射干貝母各二錢甘草一錢清水煎服至愈而止四一一華他治大頭瘟神方延胡索一錢五分皂角川芎各一錢藜蘆五分躑躅花二錢五分共為末用紙捻蘸藥探入鼻中取嚏即愈無嚏者難治四一二華他治蝦蟆瘟神方患者面赤項腫狀似蝦蟆故名即用青蛙搗汁水調空心頓服極效四一三華他治肺熱瘟神方西牛黃一分吞當門子二釐吞老梅冰片一分吞大黃芒硝各五錢犀牛角磨一錢服之四一四華他避疫酒神方大黃十五銖白朮桂心各十八銖桔梗蜀椒各十五銖烏頭六銖菝葜十二銖上搗末盛絳袋中以十二月晦日中懸深井中令至泥正月朔旦平曉出藥置酒中煎數沸於東向戶中飲之一人飲一家無疫一家飲一里無疫四一五華他避瘟丹神方雄黃雌黃鬼臼曾青珍珠丹砂虎頭骨桔梗白朮女青芎藭白芷鬼督郵蕪荑鬼箭羽藜蘆菖蒲皂莢各一兩上十八味末之蜜丸如彈子大絹袋男左女右帶之卒中惡病及時疫吞如梧子一丸燒彈大一丸戶內極效四一六華他治水穀痢神方人參地榆厚朴炙乾薑烏梅熬各六分白朮當歸各五分赤石脂龍骨各七分熟艾甘草各四分黃連十分上共搗為末蜜為丸如梧子大米飲汁下二十丸日三服四一七華他治水痢神方茯苓白龍骨訶黎勒皮黃連酸石榴皮各八分上搗篩為末蜜丸如梧子大空心服三十丸日再服瘥止四一八華他治冷痢神方冷痢者由腸胃虛弱受於寒氣腸虛則泄故為冷痢凡痢色青色白色及黑色皆為冷也診其脈沉則生浮則死方用黃連二兩甘草炙附子炮阿膠炙各半兩水三升煮取一升半分二服之四一九華他治白滯痢神方白滯痢者為腸虛而冷氣客之搏於腸間津液凝滯成白者宜用赤石脂八兩乾薑龍骨當歸各三兩附子炮牡蠣熬各二兩芍藥甘草炙各一兩半人參一兩半白朮一升先以水一斗二升煮白朮取九升內藥煮取三升分為三服膿者加厚朴三兩嘔者加陳皮二兩四一一華他治冷熱痢神方冷熱痢者其痢乍黃乍白由腸胃虛弱宿有寒而為客熱所傷冷熱相乘而致方用香豉一升白朮六兩薤白一升升麻二兩以水七升煮取二升半分為三服四一一一華他治熱毒痢神方苦參橘皮獨活阿膠炙藍青黃連鬼箭羽黃柏甘草上等分搗末蜜煬膠為丸如梧子水下十丸日三或以生犀角酸石榴皮枳實共為末每服二三寸匕日再四一一二華他治赤痢神方香淡豉半升黃連一升先以水一升半浸豉一日濾取汁碎黃連薄綿裹豉汁中煎取強半升空腹頓服即止四一一三華他治久痢神方久患赤痢連年不愈以地榆鼠尾草各一兩用水二升煮取一升分為二服如不瘥取屋塵水盡去滓服一升日二服四一一四華他治赤白痢神方凡痢皆由營衛不足腸胃虛弱冷熱之氣乘虛入於腸間腸虛則泄故為痢也熱乘於血血滲腸內則為赤痢冷氣搏於腸間津液凝滯則為白痢冷熱相交則赤白相雜宜用鹿茸二分石榴皮二兩乾薑二分棗核中仁七枚赤地利一兩燒灰上共搗為散先食飲服方寸匕日三夜一若下數者可五六服四一一五華他治五色痢神方酸石榴皮五個蓮子搗汁二升每服五合神效四一一六華他治休息痢神方腸胃虛弱易為冷熱所乘其邪氣或動或靜故其痢乍發乍止治宜黃連二兩龍骨如雞子大一枚阿膠如掌大炙熟艾一把上四味水五升煮三物取二升去滓乃納膠煬之分再服四一一七華他治噤口痢神方木鱉子六枚去殼取淨仁研泥分作二分用面燒餅一枚切作兩半以半餅作一竅其藥納中乘熱覆患者臍約炊許再換其半痢止即思食四一一八華他治瘧疾神方常山甘草炙大黃桂心各四分上四味末之蜜為丸如兔屎每欲發服六丸飲下之欲服藥先進少熱粥良四一一九華他治溫瘧神方凡瘧疾先寒而後熱者曰寒瘧因先傷於寒而後傷於風也若先傷於風而後傷於寒則先熱而後寒名曰溫瘧方用知母六兩石膏一斤甘草二兩炙粳米六合上四味以水一斗二升煮取米爛去滓加桂心三兩煎取三升分溫三服覆令汗先寒發熱汗出者愈四一二華他治山瘴瘧神方本症生於嶺南帶山瘴之氣也重於傷暑之瘧治宜用蜀漆知母升麻白薇地骨皮麥門冬各五分烏梅肉鱉甲炙葳蕤各四分石膏三分甘草三分炙常山六分豆豉一合熬上搗為末蜜和丸如梧子大飲下十丸日再服加至二十丸此方用無不瘥四一二一華他治間日瘧神方大黃三分常山甘草炙各一分半上三味以水三升煮取一升去滓更以水二升煮滓取一升未發服醨醨是後煮者相次服醇醇是前煮者瘥四一二二華他治三日瘧神方陳香櫞一枚去頂皮入研細明雄黃同納火中煅之取出研極細每服七分乾咽下不用水四一二三華他治三陰瘧神方凡瘧過正午而發者謂之三陰瘧用花椒二錢五分硃砂一錢二分五釐麝香冰片各三分共末之分摻二膏藥一貼背脊第三椎肺俞穴一貼當胸極效四一二四華他治勞瘧神方瘧積久不愈則表裡俱虛客邪未散真氣不復故疾雖暫閒少勞便發謂之勞瘧鱉甲炙蜀漆知母各二兩常山三兩烏賊魚骨附子蜀椒各一兩上七味以酒三斗浸一宿平日服一合稍稍加至二合日三四服四一二五華他治久瘧神方龍骨一兩常山三兩大黃二兩附子二分炮上末之以雞子黃丸如梧子大先發臨發各飲服五丸無不斷忌生蔥生菜豬肉等四一二六華他治水腫神方葶藶子炒黑甘遂各一兩吳茱萸四兩上三味別搗異下篩和以蜜丸如梧子服五丸四一二七華他治風水神方風水者由腎脾氣虛弱所為腎勞則虛虛則汗出汗出逢風風氣內入還客於腎脾虛又不能制於水故水散溢皮膚又與風濕相搏故云風水也其候全身浮腫如裹水之狀方用木防己白朮各四兩黃耆五兩生薑三兩甘草二兩炙大棗二十枚上六味以水六升煮取二升分三服喘者加麻黃身重胃中不和者加芍藥氣上衝者加桂心下久寒者加細辛防己黃耆為本服藥欲解當如蟲行皮中狀從腰以下冷如冰服湯後坐被上又以一被繞腰溫下令得汗汗出則愈四一二八華他治水通身腫神方麻子五升商陸一斤防風三兩附子一兩炮赤小豆三升先搗麻子令熱以水三斗煮麻子取一斗三升去滓納藥及豆合煮取四升去滓食豆飲汁日再四一二九華他治水氣腫臌脹神方葶藶子七兩熬甘遂五兩茯苓椒目各三兩吳茱萸二兩上搗末蜜和丸如梧子大以飲服五丸日三服不知稍加丸以利為度四一三華他治病後浮腫神方選家鶩之年久者三匹加厚朴蒸食之極有效惟體虛者勿服四一三一華他治水臌神方水臌者謂滿身皆水按之如泥者是不急治則水蓄於四肢不得從膀胱出變為死症而不治方用牽牛甘遂各二錢肉桂三分車前子一兩水煎服一劑則水流升余二劑則愈斷不可與三劑病後宜以參朮之品補脾更須忌食鹽四一三二華他治氣臌神方氣臌者乃氣虛作腫症一如水臌之狀第按之皮肉則不如泥耳先起於足面漸及於上身與頭面治法宜健脾行氣輔以利水之劑與治水臌法大異方用白朮苡仁茯苓各一兩人參山藥車前子神麯萊蔔子各一錢枳殼五分甘草肉桂各一分水煎服日服一劑十劑覺氣漸舒三十劑而全愈亦禁忌食鹽須於三月後用之犯則不救四一三三華他蟲臌神方患者小腹微痛四肢浮脹面紅而帶黑壯如蟲蝕眼下無臥蠶微腫之形是為本症之候治宜殺蟲蟲去則臌脹自消方用雷丸神麯茯苓白礬各三錢車前子五錢當歸鱉甲醋炙地栗粉各一兩一劑即下蟲無數二劑而蟲盡愈後乃須補脾以防再發四一三四華他治血臌神方本症之原因或由傾跌後血瘀不散或因郁憂而血結不行遂致腹中結成血臌倘不明證治之法而妄用治水治氣之法治之其患匪少治宜消瘀蕩穢方用水蛭三錢炒末雷丸紅花枳實白芍牛膝各三錢桃仁四十粒去皮尖搗碎當歸二兩水煎服一劑即下血鬥余再劑則血盡而愈愈後宜補氣血之劑調理之否則恐成乾枯之症四一三五華他治腳氣初發神方腳氣病者皆由感風毒所致凡濕冷之地久立與久坐皆能使熱濕與冷濕之氣入於經絡始從足起漸及小腹甚乃上攻心胸若不急治逐至殺人宜於其初發時即以胡麻葉搗蒸薄裹日二易即消若冬月取蒴藋根切搗和糟三分根一分合蒸令熱裹如前法效四一三六華他治腳氣衝心神方凡遇腳氣攻心腹脹氣急則死急用吳茱萸三升木瓜二合檳榔二十顆竹葉二升上四味以水一斗煮取三升分三服得快利急瘥忌生菜熟面蕎麥蒜等物外用糜穰一石納釜中煮取濃汁去滓納椒目一斗更煎十餘沸浸腳三兩度如冷溫浸洗瘥止四一三七華他治腳氣腫滿神方大豆二升以水一斗煮取五升去豆桑白皮一握檳榔二十七枚茯苓二兩將上列三味以前豆汁浸經宿煮取二升去滓添酒二合納藥中隨多少服之忌酢物四一三八華他治腳氣心腹脹急神方本症系風濕熱毒從腳上入於內與臟氣相搏結聚不散故心腹脹急治宜下氣消脹用昆布八兩射干四兩羚羊角橘皮各三兩茯苓乾薑各一兩蓽茇吳茱萸大黃各六分杏仁去皮尖五分上搗末蜜和為丸如梧子大飲服十五丸利多服七丸以意消息不能食者加白朮六分神麯末十分氣發服已前丸得定如不定作檳榔皮湯壓之忌酢物四一三九華他治腳氣痹攣神方腳氣病有挾風毒者則風毒搏於筋筋為之攣風濕乘於血則痹故令痹攣也下方專治風虛氣滿腳疼冷痹攣弱不能行石斛丹參各五兩側子秦艽杜仲山茱萸牛膝各四兩桂心乾薑羌活芎藭橘皮椒黃耆白前茵芋當歸各三兩防風二兩薏苡仁一升五加皮根五兩鍾乳八兩上二十一味以絹袋盛之浸清酒四斗內三日初服三合日再稍稍加之以知為度忌豬肉冷水生蔥四一四華他治老人腳氣神方豬胃一具洗淨細切水洗布絞乾和蒜椒醬醋五味常食之四一四一華他治諸黃症神方諸黃病者謂一身盡疼發熱面色洞黃此由寒濕在表則熱蓄於脾胃腠理不開瘀熱與宿谷相搏鬱蒸不得消則大小便不通故身體面目皆變黃色其類別有黃疸黑疸赤疸谷疸白疸馬黃等宜用瓜蒂二十七枚赤小豆二十七枚秫米二十七粒上搗為散取如大豆粒吹鼻中四一四二華他治急黃神方脾胃有熱穀氣鬱蒸因為熱毒所加故卒然發黃心滿氣喘發於傾刻故云急黃有得病即身體面目發黃者有其初不知直至死後而身現黃者其候得病時但發熱心戰者是急黃也治用赤小豆丁香黍米瓜蒂各二十七枚麝香薰陸香等分別研青布二方寸燒為灰上搗為散飲服一錢匕則下黃水其黃即定忌生冷熟面黏食陳糗等四一四三華他治黃疸神方患者身體面目爪甲及小便皆黃由飲酒過度所致方用茵陳柴胡各四兩升麻黃芩大黃各三兩龍膽草二兩以水九升煮取三升分三服若身體羸去大黃加梔子仁五六兩生地黃一升四一四四華他治陰黃神方患者身目色黃頭痛而不發熱其病原為陽氣伏陰氣盛熱毒乘之所致治宜用茵陳四兩白蘚皮黃芩芍藥青木香柴胡枳實炙黃連土瓜根大青各三分栝蔞梔子各四分紫雪八分大黃十分上十四味搗篩為散煮茅根飲待冷平旦空腹以茅根飲服五錢匕一服少間當一兩行微利利後煮稀蔥豉粥食之利多以意漸減常取微泄利通一兩行為度瘥止四一四五華他治酒疸神方患者身目發黃心中懊痛足脛滿小便黃面發赤斑其原為虛勞之人飲酒多進谷少脈浮者先吐之沉弦者先下之方用梔子七枚枳實五枚香豉一升大黃一兩以水六升煮取二升去滓溫服七合日三服四一四六華他治谷疸神方患者每於食畢後頭眩心忪怫鬱不安而發其原為失飢大食胃氣衝熏所致可用茵陳四兩大黃二兩梔子七枚先以水一斗煮取茵陳六升再用其汁煎余藥得二升分為三服黃從小便去病出立愈四一四七華他治勞疸神方勞疸者謂因勞而得也方用苦參三兩龍膽草二兩梔子三七枚上搗末豬膽和為丸如梧子大一服五丸日三四服以飲汁下之四一四八華他治女疸神方患者身目皆黃發熱惡寒小腹滿急小便困難其原因為大勞大熱而房室房室畢入水所致也治用硝石枯礬二味搗末以大麥粥汁和服方寸匕日三覆被取汗病隨大小便去四一四九華他治黑疸神方此症為患黃疸酒疸女疸勞疸積久而變成者患者身體盡黃額上反黑足下熱大便黑者是也治用赤小豆三十枚茯苓六銖瓜蒂四銖雄黃二銖甘草半兩炙女萎四銖上六味先以水三升煮小豆茯苓取八合汁搗後四藥為散去前汁調半錢匕適寒溫服之須臾當愈吐則愈四一五華他治五蒸神方蒸者系附骨熱毒之氣皆為死之端漸約舉其類有五蒸焉一曰骨蒸其根在腎二曰脈蒸其根在心三曰皮蒸其根在肺四曰肉蒸其根在脾五曰內蒸其根在五臟六腑之中解治之法用石膏五兩茯苓乾地黃各三兩人參黃芩各二兩葛根三兩知母二兩甘草一兩炙竹葉二把粳米一合上以水九升煮取二升半分為三服四一五一華他治骨蒸神方凡男子因五勞七傷或緣肺壅瘴瘧之後宿患痃癖婦人因産後虛勞漏汗寒熱或為月閉不通因茲漸漸瘦損初者盜汗後則寒熱往來漸增咳嗽面色蒼白兩頰有時赤如胭脂此病不治者多宜急用青葙苗六月六日採知母黃連大黃梔子仁栝蔞常山葳蕤各八分苦參皮十二分甘草炙蜀漆洗各五分上搗末蜜和丸如梧子飲服五丸漸加至十五丸日再以知為度四一五二華他治瘦病神方凡虛勞之人精髓枯竭氣血虛弱不能充盛肌膚故羸瘦也且其候多腳手痠疼口乾壯熱方用獺肝炙六分天靈蓋燒生犀角屑前胡升麻各四分松脂甘草炙各五分枳實炙四分上搗篩蜜和丸如梧子空腹以小便浸豉汁下二十丸日再四一五三華他治傳尸神方此病多系臨尸哭泣尸氣入腹連綿或五年三年微勞即發不除其根禍堪滅門方用獺肝破干炙一具鱉甲炙野貍頭炙各一枚漢防己一兩半蜀漆洗麥冬門去心甘草炙各一兩上搗篩以羊腎脂二分合蜜一分煬和為丸如梧子服十丸加至十五丸日再以飲下之其藥合和訖一分著頭邊一分懸門額上一分系臂上先服頭邊次服臂上次服門上者大驗忌海藻菘菜莧菜四一五四華他治飛尸神方飛尸者發無由忽然而至若飛走之疾故云其候心腹刺痛氣息喘急脹滿上衝心胸治用細辛天雄炮莽草各一分珍珠雄黃各二分桂心三分附子炮乾薑烏頭炮各四分上搗散服五分匕不知稍增用陳酒下忌豬肉冷水生蔥生菜四一五五華他治遁尸神方遁尸者言其停遁起人肌肉血脈之間有觸即發久而不消故名其候略同飛尸治用鸛骨炙三寸羚羊鼻炙令焦二枚蜥蜴炙一枚斑蝥去翅足熬十四枚芫青去翅足熬二枚雞屎白熬三兩藜蘆去蘆頭熬令黃乾薑各一兩巴豆去心皮熬令黑五枚麝香二分上搗末蜜和丸如小豆空腹以飲服三丸日二服稍加至六七丸以知為度至吐痢乃止四一五六華他治鬼魅精魅神方人為鬼物所魅則好悲而心自動或心亂如醉狂言警怖向壁悲啼夢寐喜魘或與鬼神交通病者乍寒乍熱心腹滿短氣不能食治宜殺鬼之劑丹砂龍骨雄黃馬目毒公鬼箭各五兩鬼臼二兩赤小豆三兩芫青一枚桃仁去皮尖熬別研百枚上九味搗下篩別研雄黃丹砂細絹絲合諸藥拌令和調後納蠟和之大如彈丸絳囊盛之係臂男左女右小兒系頭合藥勿令婦人雞犬見之所服蜜和丸如梧子一日服三丸日三忌五辛生血物四一五七華他治鬼神交通神方男女夢與鬼神交通致心神恍惚者用鹿角屑酒服三撮日三四一五八華他治盜汗神方盜汗者因睡眠而身體流汗也此由陽虛所致久不已令人羸瘠枯瘦心氣不足亡津液故也方用麻黃根牡蠣碎之綿裹各三兩黃耆人參各二兩枸杞根白皮龍骨各四兩大棗七枚上以水六升煮取二升五合去滓分溫六服如人行八九里久中間任食一日令盡禁蒜等物四一五九華他治不眠神方燈芯草一握睡前煎湯代茶飲即得安睡四一六華他治咳嗽神方紫菀五錢五味子一兩桂心二兩麻黃去節四兩杏仁去皮尖碎之七十枚乾薑四兩甘草炙二兩上藥以水九升煎取二升半去滓溫服七合日三四一六一華他治五嗽神方五嗽者謂上氣嗽飲嗽燥嗽冷嗽邪嗽等是也方用皂莢炙乾薑桂心等分末之蜜和丸如梧子服三丸酒飲俱可日三忌蔥四一六二華他治新久咳神方款冬花乾薑芫花根各二兩五味子紫菀各三兩先以水煎三味取三升半去滓納芫花乾薑加白蜜三升合投湯中令調於銅器中微火煎如飴可一升半服棗核大含之日三服曾數用甚良忌蒜面腥膩四一六三華他治積年久咳神方香豉熬四分杏仁去尖皮二分紫菀桂心各三分甘草炙八分乾薑二分細辛三分吳茱萸二分上為末蜜和丸如梧子服四丸日三不知增之能含嚼咽汁亦佳四一六四華他治熱咳神方杏仁去皮尖炒研四十枚柴胡四兩紫蘇子一升橘皮一兩上以水一斗煮三升分三服四一六五華他治冷咳神方芫花乾薑各二兩白蜜二升先以前二味為散納蜜中攪令和微火煎令如糜服如棗核一枚日三夜一欲痢者多服四一六六華他治乾咳神方熟栝蔞白礬用熟栝蔞搗汁入蜜加白礬熬膏含化極效四一六七華他治咳嗽有痰神方芫花二兩煮汁去滓和飴糖熬膏每服棗許神效四一六八華他治咳嗽膿血神方人參二分瓜蒂三分杜仲五分上搗末平旦空服以熱湯服方寸匕當吐痰水惡汁一二升吐已復煮白粥食痰水未盡停三日更進一劑四一六九華他治老年咳嗽神方杏仁去皮尖核桃肉各等分蜜丸彈子大每服一丸細嚼薑湯下四一七華他治肺熱兼咳神方生地黃汁生麥門冬各三升生薑汁一合酥白蜜各二合先煎地黃麥冬薑汁三分可減一分納酥蜜煎如稀湯納貝母末八分紫菀末四分攪令調一服一匙日二夜一四一七一華他治肺熱咳痰神方半夏栝蔞各一兩上為末薑汁丸如梧子大每服二三十丸熱湯下四一七二華他治喘嗽神方蒲頽葉焙乾碾為細末米飲調服二錢取瘥四一七三華他治氣喘神方杏仁桃仁各半兩上藥去皮尖炒研水調生面和丸如梧子大每服十丸姜蜜湯下微利為度四一七四華他治痰喘神方半夏二錢甘草炙皂角各一錢五分生薑一錢水煎服至愈乃止四一七五華他治氣喘上逆神方本症人多以為氣盛有餘不知實為氣虛不足稍有錯誤去生便遠宜用人參一兩牛膝三錢熟地黃麥冬各五錢生茱萸四錢枸杞子北五味各一錢核桃三枚生薑五片水煎服四一七六華他治風痰神方知母貝母各一兩為末每服一錢用姜三片二面蘸末細嚼咽下即臥其嗽立止四一七七華他治氣痰神方南星曲半夏曲陳橘皮各一兩上三味搗篩薑汁和丸如梧子每服四十丸薑湯下四一七八華他治痰哮神方海帶四兩浸透煎汁調飴糖服有效四一七九華他治哮喘神方白鳳仙花一棵連根葉搗汁與燒酒等量相和曝日候溫以手蘸汁拍膏肓穴初覺微冷旋熱旋辣繼而微痛乃止以巾拭乾毋令感風續行數日輕者當愈四一八華他治喘急神方桔梗一兩搗為散用童子小便半升煎取四合去滓溫服四一八一華他治年深氣喘神方雞卵童便將雞卵略敲損浸童便中三四日煮食良四一八二華他治肺痿喘嗽神方生天門冬搗取汁陳酒各一升飴糖一斤紫菀四合上共置銅器中於湯上煎可丸服如杏仁一丸日三忌鯉魚四一八三華他治肺痿喘嗽神方防己末二錢漿水一錢煎七分細呷四一八四華他治肺脹上氣神方患者肺脹氣急咳嗽喘粗眠臥不得勢極沉重氣似欲絶宜用紫菀六分甘草炙八分檳榔七枚茯苓八分葶藶子炒三合上以水六升煮取二升半去滓分三服以快利為度四一八五華他治肺癰咳唾神方胸中滿而振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如粳米者是為肺癰之候治宜用桔梗貝母各三分巴豆一分去皮心熬研作脂上搗篩強人飲服半錢匕羸人減之若病在膈上者必吐膈下者必利飲冷水一杯則定忌豬肉蘆筍等四一八六華他治肺虛咳嗽神方木鱉子款冬花各一兩同為末每日三錢焚之吸其煙良久吐涎以茶潤喉五六次即愈四一八七華他治久嗽喘急神方知母五錢杏仁姜水泡去尖隔紙炒之五錢以水一碗半煎取一碗食後溫服次以萊蔔子杏仁等分為末糊丸每服五十丸薑湯下四一八八華他治咳嗽唾血神方鍾乳五兩牡蠣熬桂心各六兩射干桃仁去皮尖貝母橘皮百部根五味子各三兩生薑六兩白石英半夏各五兩款冬花甘草炙厚朴炙各二兩羊肺一具先以水二斗三升煮羊肺煮取一斗去肺納藥取三升分四服日三夜一忌羊肉四一八九華他治肺癰咯血神方薏苡仁三合搗爛水兩大碗煎取一碗入酒少許分二次服之四一九華他治肺痿咯血神方防己葶藶子上藥等分為散每服一錢米飲湯下四一九一華他治肺損咯血神方香附一錢為末米湯下日二服四一九二華他治痰中帶血神方款冬花百合等分為末蜜為丸如彈丸大臨睡嚼一丸薑湯下四一九三華他治積熱吐血神方馬勃研末砂糖和丸如彈子大每服半丸冷水送下四一九四華他治勞心吐血神方蓮心七枚糯米半兩共為末陳酒下四一九五華他治心痛神方吳茱萸乾薑各一兩半桂心人參橘皮蜀椒甘草炙黃芩當歸各一兩白朮一兩附子炮一兩半上搗篩為散蜜丸如梧子每服五丸日三服稍加至十二丸四一九六華他治九種心痛神方九種心痛者一蟲心痛二注心痛三氣心痛四悸心痛五食心痛六飲心痛七冷心痛八熱心痛九去來心痛下方悉主之附子炮巴豆仁去心皮熬人參生狼毒炙令極香吳茱萸乾薑各一兩搗末蜜和丸如梧子空腹服三丸弱者二丸一日一服四一九七華他治諸蟲心痛神方鶴蝨當歸桔梗芍藥橘皮各八分檳榔十分人參桂心各六分上搗篩為散空腹煮薑棗服方寸匕漸加至二匕四一九八華他治卒心痛神方苦參龍膽升麻各二兩梔子仁三兩用苦酒五升煮取一升分二服當大吐乃瘥四一九九華他治心背徹痛神方烏頭炮去皮赤石脂乾薑各二分附子炮去皮蜀椒各一分上為末蜜和丸如麻子先食服三丸少少加之四二華他治久心痛神方雷丸鶴蝨貫衆狼牙桂心當歸各八分上搗為散空腹煮蜜水半雞子許服方寸匕日二服若重不過三劑則瘥四二一華他治腹痛神方當歸三兩甘草炙二兩人參大黃各一兩芍藥八分乾薑六分茱萸五分桂心三分以水六升煮取三升去滓溫服一升日三四二二華他治肝胃氣痛神方香附子炒五兩烏藥炮二兩共研細末水醋煮蒸餅和丸梧子大每服二三錢白湯下四二三華他治心腹俱痛神方凡心腹俱脹痛知氣欲死或已絶取下方服立效梔子十四枚豉七合先以水二升煮豉取一升二合去滓納梔子更煎八合去滓服半升不愈者盡服之四二四華他治腰痛神方桑寄生獨活桂心各四兩黑狗腎杜仲各五兩附子炮芍藥石斛牛膝白朮人參各三兩甘草炙二兩芎藭一兩以水一斗煮取三升分三服四二五華他治腎虛腰痛神方丹皮去心二分萆薢白朮各三分上為散以酒服方寸匕亦可作湯服之四二六華他治虛寒腰痛神方虛寒腰痛內用八角茴香研末酒服下外以糯米炒熱袋盛之尉痛處四二七華他治風濕腰痛神方麻黃去節甘草炙各二兩獨活防風桂心栝蔞乾葛各三兩芍藥四兩乾地黃五兩生薑六兩上以水八升酒二升煎取三升分三服不瘥重作四二八華他治背熱如火神方生附子研末水調敷兩足心立效四二九華他治胸脅痛神方訶黎勒炮去核四顆人參二分上藥搗末以牛乳二升煮三四沸頓服之分為二服亦得四二一華他治脅肋痛神方脅下偏痛發熱其脈緊弦此寒也當以溫藥下之方用大黃三兩細辛二兩附子炮三枚上以水五升煮取二升分三服若強盛人煮取三升半分為三服服則如人行四五里進一服四二一一華他治諸疝初起神方鮮地骨皮生薑各四兩搗成泥絹包囊上雖極癢宜忍之並以連蒂老絲瓜燒存性研末每服三錢熱酒下重者不過二三服即愈四二一二華他治熱疝神方痛處如火溲赤便艱口乾畏熱此熱疝也以芙蓉葉黃柏各三錢為末木鱉子磨醋調塗囊上極效四二一三華他治寒疝神方繞臍苦痛發時則白汗出手足厥冷脈沉弦此寒疝也治用大烏頭十五枚白蜜二斤先以水三升煮烏頭取二升去烏頭納蜜煎令水氣盡得二升強人服七合弱人五合一服不瘥明日更服日止一服不可再也四二一四華他治心疝神方病發時心部似被錐刀所刺或四肢逆冷或唇口變青其原由陰氣積於內寒氣不散上衝於心遂致心痛故名心疝治用芍藥桔梗細辛蜀椒桂心乾薑各三分附子一分上末之蜜和丸如梧子服七丸以酒下日二服四二一五華他治㿗疝神方本症發生時陰囊腫縋如升如斗不癢不痛得之地氣卑濕所生故江淮之間湫溏之處多感此疾治用香附二錢海藻一錢先香附為末海藻煎酒空心調下並食海藻四二一六華他治狐疝神方狐疝者其狀如瓦臥則入小腹行立則出腹入囊中狐晝出穴而溺夜入穴而不溺此疝出入上下往來正與狐類故名方用杜仲五錢人參一兩肉桂桂枝小茴香核桃各一錢先杜仲搗汁以涼水浣之取汁一碗納諸藥水煎服一服伸出二服即消三服痊愈四二一七華他治橫梁疝神方此疝小腹有塊直衝心胸婦人患之居多最難醫治方用補骨脂一斤黑胡麻二兩上二味拌炒去胡麻取補骨脂研末以酒為丸服三錢沸湯下四二一八華他統治諸疝神方諸疝名狀不一其痛在心腹者凡七曰厥疝曰症疝曰寒疝曰氣疝曰盤疝曰腑疝曰狼疝痛在睪丸者亦七曰寒疝曰水疝曰筋疝曰血疝曰氣疝曰狐疝曰㿗疝下方悉主之蜀椒四分桔梗芍藥乾薑厚朴炙細辛附子炮各二分烏頭炮一分上末之蜜和丸如大豆服三丸至七八丸日三四二一九華他治怔忡神方怔忡之症擾擾不寧心神恍惚驚悸不已此肝腎之虛心氣之弱也方用人參熟地黃白芍各一兩生棗仁麥冬各五錢玄參一兩白朮白芥子各三錢水煎服四二二華他治心中嘈雜神方水仙花子芍藥荷葉同搗末白湯下頗效四二二一華他治癖神方臟腑攝養乖方則三焦痞膈腸胃不能宣行因飲水漿便令停滯不散更遇寒氣積聚而成癖癖者謂僻側在於兩脅之間有時而痛者也方用牛膝枳實炙茯苓鱉甲炙各八分桔梗芍藥白朮人參厚朴炙大黃桂心檳榔各六分上搗篩蜜和丸空腹溫酒服如梧子二十丸日二服漸加至三十丸四二二二華他治療症神方症者由寒溫失節致臟腑之氣虛弱而食飲不消聚積在內漸染在生長塊段盤牢不移動若積引歲月人則柴瘦腹轉大遂至於死治用射罔二兩熬蜀椒三百粒上搗末以雞子白為丸半如麻子半如赤小豆先服如麻子漸服如赤小豆二丸不知稍增之以知為度四二二三華他治暴症神方患者腹中卒然有物堅如石痛如刺晝夜啼呼不療之百日死方用牛膝根二斤酒一斗先曝令牛膝根極干納酒一斗浸之密器中封口置熱灰中溫之令味出先服五六合至一升以意量多少之四二二四華他治米症神方人有好啞米思邈按啞者飢而思食之義者轉久彌嗜啞之若不得米則胸中清水出得米便止米不消化遂生癥結治用雞屎一升白米五合合炒取米焦搗成散用水一升頓服取盡少時即吐吐出症如研米汁碎若無症即吐白沫痰水乃憎米不復食之無所忌四二二五華他治肉症神方有人卒大能食乖其常分因飢值生蔥便大食之乃吐一肉塊繞畔有口其病則愈故謂肉症治用狗矢五升燒灰末之綿裹以酒浸再宿濾取分十服日三服三日令盡四二二六華他治鱉症神方鱉症者謂腹內癥結如鱉之形狀也有食鱉觸冷不消而生者有食雜冷物不消變化而作者治用白馬尿一升五合溫服令盡瘥或用蟹爪麝香各三分生薑四分附子炮半夏鱉甲炙防葵各六分郁李仁八合上搗篩蜜為丸如梧子空服酒下二十丸日再服四二二七華他治發症神方此係飲食內誤有頭髮隨食入胃成症胸喉間如有蟲上下來去者是也治用蔥豉油煎蔥豉令香二日不食張口而臥將油蔥豉置口邊蟲當漸出徐徐以物引去之四二二八華他治蟲症神方人有多蝨性好齧之所齧既多而臟腑虛弱不能消之遂生蝨症有蝨生長在腹內有時從下部出治用故篦子故梳子各一枚將二物各破為兩分各取一分燒作灰末之又取一分以水五升煮取一升用以頓服前末令盡少時當病出無所忌四二二九華他治蛇症神方人有食蛇不消或由蛇之津液誤入飲食內皆足令人病瘕其狀常苦飢而食則不下喉食至胸內即吐出治用大黃半兩芒硝如雞子大一塊烏賊骨三枚黃芩半兩甘草炙如人指一尺皂莢炙去皮子六枚上以水六升煮之三沸去滓納芒硝適寒溫盡服之十日一劑宿無食平旦服當下四二三華他治蛟龍病神方三月八月蛟龍子生芹菜上人食芹菜隨入人腹變成蛟龍其病發似癲面色黃青少腹脹如懷孕治用粥餳三升寒食粥餳三升日三服吐出蛟龍有兩頭及尾四二三一華他治翻胃神方其症朝食夜吐心下堅如杯往來寒熱吐逆不下食此為寒癖所作治用珍珠雄黃丹砂各一兩朴硝二兩乾薑十纍上五味搗篩蜜丸先食服如梧子二丸少煩者飲水則解之忌生血物四二三二華他治嘔吐神方嘔吐有兩種一者積熱在胃一者積冷在胃二事正反須細察之如屬熱症宜用生蘆根生麥門冬去心青竹茹各一升生薑汁五合茯苓五兩上以水八升煮取二升半去滓加竹瀝六合攪調分三服相去如人行十里久始服一劑忌醋物如服前藥未能全除宜再用茯苓五兩人參三兩麥門冬去心一升生薑六兩青竹茹一升共搗篩蜜和為丸煎蘆根湯飲下之初服十五丸日二服稍稍加至三十丸如梧子大如系冷症宜用半夏小麥面各一升先搗半夏為散以水溲麵丸如彈子大以水煮冷麵熟則是藥成初吞四五丸日二服稍稍加至十四五丸旋煮旋服病自漸減又如服前藥病雖漸減惟病根不除欲多合前丸又慮毒藥不可久服可改用人參白朮各五兩生薑八兩厚朴炙細辛各四兩橘皮三兩桂心二兩上搗篩蜜和丸如梧子飲下之初服十丸日再稍加至二十丸若與半夏丸間服亦得忌桃李羊肉雀肉生蔥生菜四二三三華他治乾嘔神方乾嘔者胃氣逆故也但嘔而欲吐吐而無所出故云乾嘔治用生葛根絞取汁服一升四二三四華他治飢餓嘔吐神方蜀椒煮汁溫服立效四二三五華他治嘔吐清水神方干蘄艾煎湯啜之立愈四二三六華他治嘔吐酸水神方黑山梔三錢煎濃汁入生薑汁少許和服或以黃連六分吳茱萸一分煎湯飲四二三七華他治吐血神方生地當歸各一兩川芎元參各五錢黃芩三七各三錢甘草荊芥各一錢水煎服或用鮮生地汁一碗三七末三錢炮薑炭末五分調服一劑即止血極神效四二三八華他治五膈神方五膈者謂憂膈恚膈氣膈寒膈熱膈是也方用麥門冬去心十分蜀椒遠志附子炮乾薑人參桂心細辛各六分甘草炙十分上搗篩蜜和丸如彈子以一枚著牙齒間含稍稍咽汁日三四二三九華他治七氣神方七氣者謂寒氣熱氣怒氣恚氣喜氣憂氣愁氣是也此七氣為病皆生積聚堅牢如杯心腹絞痛不能飲食時去時來發則欲死方用紫菀前胡半夏細辛丹參茯苓芎藭桃仁去皮尖吳茱萸桂心桔梗石膏各三分乾薑蜀椒各二分人參甘草防葵各四分烏頭炮大黃各三分菖蒲三分上搗篩為末蜜和丸酒服如梧子三丸日三加至十丸一方去半夏加甘遂三分四二四華他治五噎神方五噎謂氣噎憂噎食噎勞噎思噎等是也皆由陰陽不和三焦隔絶津液不行憂恚嗔怒所生謂之噎者言噎塞而不通也方用乾薑蜀椒食茱萸人參桂心各五分細辛白朮茯苓附子炮各四分橘皮六分上搗篩以蜜和為丸如梧子酒下三成日再四二四一華他治痞疾神方皂礬六兩醋炒九次沒藥三兩炒去油共為末棗肉為丸空腹湯下七丸七日有效或用五靈脂香附各一斤黑白醜各二兩共搗末半炒熟半生用醋和丸日服三錢四二四二華他治痞積神方桔梗枳殼等分水煎溫服有效四二四三華他治厄逆神方黃連一錢紫蘇葉八分水煎服極神效四二四四華他治陰寒厄逆神方乳香硫黃陳艾各二錢上搗末以陳酒煎數沸乘熱嗅之外以生薑擦當胸極效四二四五華他治消渴神方消渴者謂渴而不小便也由少服五石諸丸散積久經年石勢結於腎中使人下焦虛熱及至年衰血氣減少不能制於石石勢獨盛則腎為之燥故飲水而不小便也方用麥門冬茯苓黃連石膏葳蕤各八分人參黃芩龍膽各六分枳實五分升麻四分生薑枸杞子栝蔞根各十分上為末蜜丸如梧子大以茆根一升粟米三合煮汁服十丸日再若渴則與此飲大麻亦得四二四六華他治內消神方本症之原當由熱中所致小便多於所飲令人虛極短氣食物皆消作小便而又不渴此病雖稀極屬可畏宜急用枸杞枝葉一片栝蔞根黃連石膏各三兩甘草炙二兩上五味以水一斗煮取三升去滓分溫五服日三夜五困重者多合渴即飲之若恐不能長愈可改用鉛丹二分熬別研入栝蔞根甘草炙各十分澤瀉五分胡粉二分熬研入石膏白石脂赤石脂各五分上搗研為散水服方寸匕日三服少壯人一匕半患一年者服之一日瘥二年者二日瘥丸服亦佳一服十丸以瘥為度此方用之如神忌海藻菘菜四二四七華他治寒瀉神方寒瀉一名鶩溏其原為脾氣衰弱及寒氣在下遂致水糞並趨大腸色多青黑宜溫之春夏宜用川桂枝白芍藥白朮各半兩甘草炙二錢水煎服秋冬宜用白芍藥白朮各三錢乾薑炮半兩甘草炙二錢水煎服甚者則除去乾薑加附子三錢四二四八華他治熱瀉神方熱瀉者夏月熱氣乍乘太陰與濕相合如水之注故一名暴瀉其候腹痛自汗煩渴面垢脈洪數或虛肛門熱痛糞出如湯方用香薷一斤白扁豆半斤微炒厚朴去皮薑汁炙熟半斤上研末每服三錢水煎服四二四九華他治久泄神方久瀉不止由於有陳積在腸胃之間積一日不去則瀉一日不止治宜先去陳積而後補之方用厚朴乾薑甘草桂心附子各二兩大黃四錢上細銼先以前五味用水二升半煎八合並將大黃切碎水一碗漬半日煮湯與前汁相合再煎取六和去滓分三服一日服盡四二五華他治腎泄神方腎泄者五更溏泄也其原為腎陽虛虧既不能溫養於脾又不能禁固於下故遇子後陽生之時其氣不振陰寒反勝則腹鳴奔響作脹瀉去一二行乃安此病藏於腎宜治下而不宜治中方用肉豆蔻五味子各二兩吳茱萸一兩補骨脂四兩生薑八兩紅棗一百枚上搗末以蒸熟棗肉和丸如梧子大每服五七十丸空心或食前熱湯下晚食前更進一服四二五一華他治飧泄神方飧泄者完穀不化也脾胃氣虛不能熟腐水穀故食物完出也治用人參茯苓川芎官桂當歸白芍白朮各等分每服二錢加粟米百粒與水一升同煎取七合去滓空腹溫服若虛勞嗽加五味子有痰加半夏發熱加柴胡有汗加牡蠣虛寒加附子或乾薑四二五二華他治暑泄神方暑泄一名伏暑泄瀉治用白朮一兩車前子五錢上二味姜水煎服神效四二五三華他治便血神方便血一名腸風又名腸紅其原為濕熱相侵或酒毒深結非逐去其濕熱酒毒而徒用止澀之劑未見其能劑方用熟地一兩地榆白芍當歸黃連各三錢甘草葛根各一錢柞木枝五錢水煎服第一劑下血必更多二劑略少三劑痊愈四二五四華他治大便祕澀神方本症之原為三焦五臟不和冷熱之氣不調熱氣偏入腸胃津液竭燥故令糟粕痞結壅塞不通也方用大黃三兩黃芩二兩甘草炙一兩梔子二七枚以水五升煮一升八合分三服四二五五華他治老人虛祕神方肉蓯蓉酒漬焙二兩沉香末一兩上二味搗末用麻子仁汁為丸如梧子白湯下七八丸四二五六華他治脫肛神方磁石研四兩桂心一尺蝟皮炙黃一枚上三味搗篩為散服方寸匕一日服十次即縮勿舉重須斷房室周年乃佳四二五七華他治肛門腫痛神方馬齒莧葉三葉酸草各等分水煮湯熏洗一日二次極有效四二五八華他治肛門奇癢神方蛇床子楝樹根各三錢防風二錢甘草一錢皂角五分上搗末蜜煉條塞入二次即愈四二五九華他治肛門蟲蝕神方蜣螂蟲七枚新牛矢五錢羊肉一兩炒黃上搗為泥為丸如彈丸大烘熱綿裹塞入半日蟲出四二六華他治九蟲神方九蟲者一曰伏蟲二曰蛔蟲三曰白蟲四曰肉蟲五曰肺蟲六曰胃蟲七曰弱蟲八曰赤蟲九曰蟯蟲此諸蟲皆依腸胃之間若臟腑氣實不為害虛則能侵蝕方用貫衆石蠶各五分狼牙四分藜蘆二分蜀漆炙六分殭蠶三分雷丸六分蕪荑四分厚朴三分檳榔六分上搗末蜜為丸空腹暖漿水下三十丸日三不知稍稍加之四二六一華他治蛔蟲神方蛔蟲長一尺亦有五六寸者發動時腹中作痛口多涎沫及吐清水貫心則殺人治用酸石榴根東引入土五六寸者二升檳榔十枚上以水七升煮取二升半去滓著少米煮稀粥平旦空腹食之少間蟲即死四二六二華他治寸白蟲神方寸白蟲長一寸而色白形小褊乃飲白酒以桑枝貫牛肉炙食之及食生魚後即飲乳酪而生者其發動則損人精氣腰腳疼弱治用酸石榴根東引者一大握蕪荑三兩牽牛子半兩熬末上以水六升先煮前三味得二升去滓分三服別和牽牛子末每服如人行五里更服盡快利蟲亦盡死出四二六三華他治蟯蟲神方蟯蟲形甚小狀如菜蟲居胴腸之間多則為痔劇則為癩因人瘡處即生諸癰疽癬瘻瘑疥無所不為治用蕪荑狼牙雷丸桃仁上搗為散宿勿食平旦以飲服方寸匕當下蟲也四二六四華他治關格不通神方吳茱萸熬一升乾薑大黃桂心當歸甘草炙芎藭各二兩雄黃三分研珍珠一分研人參細辛各四兩桃白皮一握上以水一斗煮取三升去滓納雄黃珍珠末酒一升微火煮三沸服一升得下即止不必盡也每服如人行十里久進之四二六五華他治小便不通神方本症之原因為膀胱之氣化不行其候少腹脹氣急甚者水氣上逆命人心急腹滿乃至於死治用人參蓮心茯苓車前子王不留行各三錢甘草一錢肉桂三分白果二十枚水煎服一劑即如注四二六六華他治老人尿閉神方黃耆蜜炒二錢陳皮去白一錢甘草八分水一升半煎八合頓服有效四二六七華他治小便頻數神方本症之原因為膀胱與腎俱虛有客熱乘之所致治宜用黃連苦參各二分麥門冬去心一兩土瓜根龍膽各一分上搗篩蜜丸如梧子每服十丸加至二十丸四二六八華他治小便過多神方補骨脂酒蒸十兩茴香鹽炒十兩共為末酒糊丸梧子大鹽湯下百丸頗效四二六九華他治小便不禁神方菟絲子酒浸二兩蒲黃黃連各三兩硝石一兩肉蓯蓉二兩五味子雞膍胵中黃皮炙各三兩上搗篩為散每服方寸匕日三服每服如人行三四里又服四二七華他治遺尿神方羊肚用羊肚系盛水令滿急系兩頭熟煮開取水頓服之立瘥四二七一華他治溺血神方菟絲子蒲黃乾地黃白芷荊實葵子敗醬當歸茯苓芎藭各二兩上搗為末白蜜和丸如梧子飲服二丸不知加至五六丸四二七二華他治諸淋神方䗪蟲熬五分斑蝥去足熬二分地膽去足熬二分豬苓三分上為末每服四分匕小麥汁下日三夜二有熱者去豬苓服藥二日後以器盛小便當有所下肉淋則下碎肉血淋下如短繩若如肉膿氣淋下如羹上肥石淋下石或下砂劇者十日即愈四二七三華他治石淋神方石淋者淋而出石也其症小便則莖里痛溺不能卒出痛引小腹膀胱裡急砂石從小便導出甚者塞痛令悶絶治用柏子仁芥子滑石各等分搗為末以米汁飲服方寸匕三服當效四二七四華他治熱淋神方熱淋者三焦有熱氣搏於腎流入於胞而成淋也治用滑石二兩栝蔞三兩石葦去毛二分上為散以大麥粥清服方寸匕日三四二七五華他治血淋神方血淋者熱在下焦令人淋閉不通熱盛則搏於血脈血得熱而流溢入於胞中與溲便俱下故為血淋也治用白茅根芍藥木通車前子各三兩滑石黃芩各一兩五錢亂髮燒灰冬葵子微炒各五錢上八味搗篩每服三錢水煎溫服日三四二七六華他治勞淋神方勞淋者謂勞傷腎氣而生熱成淋也其狀尿留莖內數起不出引少腹痛小便不利勞倦即發故云勞淋方用滑石三分王不留行冬葵子車前子桂心甘遂通草各二分石葦去毛四分上為散以麻子粥和服方寸匕日三服尿清瘥四二七七華他治氣淋神方氣淋者氣閉不能化水病從肺而及於膀胱也其候小腹滿氣壅小便澀而有餘瀝治宜以清肺金為主方用沉香石葦去毛滑石王不留行當歸各五錢冬葵子白芍各七錢五分橘皮甘草各二錢五分上為散每服二錢煎大麥湯下四二七八華他治膏淋神方膏淋者小便肥濁色若脂膏故名一名肉淋其原因由於腎血不能制於肥液故與小便俱出也治用磁石火煅醋淬三七次肉蓯蓉酒浸切焙澤瀉滑石各一兩上為末蜜丸梧子大每服三十丸溫酒下不拘時如臍下妨悶加沉香一錢以行滯氣四二七九華他治遺精神方本症之原因為腎氣耗竭上不能通於心中不能潤於肝下不能生於脾土以致玉關不閉無夢且遺法當大劑補腎而少佐以益心益肝益脾之品方用熟地一兩棗仁薏仁各五錢山茱萸四錢茯苓白芍當歸各五錢茯神二錢北五味白芥子各一錢肉桂黃連各三分水煎服一劑即止十劑痊愈四二八華他治心虛遺精神方本症之外表雖屬於腎火之虛然究其根原實不得不推原於心君之虛故宜心腎交補乃能水火相濟方用熟地八兩山藥山茱萸白朮各四兩人參茯苓麥冬巴戟天肉蓯蓉各三兩肉桂北五味遠志棗仁炒柏子仁杜仲破故紙各一兩砂仁五錢附子一枚鹿茸一付紫河車一具上搗末蜜和丸湯下二三十丸日再服四二八一華他治陰虛夢遺神方熟地山藥芡實白朮各八兩山茱萸炒棗仁各四兩北五味麥冬車前子茯苓各三兩遠志一兩上末之蜜和丸熱湯下一兩日一次四二八二華他治虛勞失精神方人參二兩桂心牡蠣薯蕷黃柏細辛附子炮苦參各三分澤瀉五分麥門冬去心乾薑乾地黃各四分菟絲子二分上搗合蜜為丸酒服如梧子大三丸四二八三華他治虛勞尿精神方本症為腎氣衰弱所致腎藏精其氣通於陰勞傷腎虛不能藏其精故因小便而精液出也治用韭子熬麥門冬去心各一升菟絲子車前子各二合芎藭二兩白龍骨三兩上搗末酒服方寸匕日三不知稍稍增之甚者夜一服四二八四華他治強中神方強中者謂強陽不倒也此虛火炎上而肺金之氣不能下行故也治用元參麥冬各三兩肉桂三分水煎服即愈他日並可重整戈矛再圓歡合四二八五華他治陰痿神方熟地一兩白朮五錢山茱萸四錢人參枸杞子各三錢肉桂茯神各二錢遠志巴戟天肉蓯蓉杜仲各一錢水煎服一劑起二劑強三劑妙四二八六華他治脫精神方男女交感樂極一時精脫不能制止此時切不可離爐仍然摟住男脫則女以口哺送熱氣女脫則男亦如之則必能陽氣重回並急用人參數兩附子一錢煎汁乘熱灌之後再用人參黃耆熟地麥冬一兩附子北五味各一錢水煎服四二八七華他治陽縮神方人參乾薑各五錢白朮三兩附子一兩肉桂六錢急以水煎汁服之立效四二八八華他治陰腫神方雄黃一兩研碎綿裹甘草一斤水一升煮取二升洗之四二八九華他治陰囊濕癢神方烏梅十四枚錢四十文鹽三十撮上三味以苦酒一升於銅器中浸九日洗之效四二九華他治囊癰神方本症由肝腎陰虛濕熱下注所致雖與疝氣相類癰則陰囊紅腫內熱口乾小便赤澀疝則小腹痛牽引腎子少熱多寒好飲熱湯此其異耳初起時即宜用川芎當歸白芍生地柴胡膽草梔子天花粉黃芩各一錢澤瀉木通甘草各五分清水二碗煎取一碗食前服之四二九一華他治子癰神方子癰者謂腎子作痛潰爛成膿不急治愈有妨生命方用川楝秦艽陳皮赤芍甘草防風澤瀉各一錢五分枸橘一枚水煎服一劑即愈四二九二華他治頭風神方附子一枚炮裂鹽一撮如附子大二味作散沐頭畢以方寸匕摩頂日三或服愈風散亦效四二九三華他治頭疼神方蔓荊子白芷甘草半夏細辛各一錢川芎五錢以酒煮一醉即愈不知再服四二九四華他治腦痛神方柴胡郁李仁麥冬各五錢辛夷桔梗各三錢白芍三兩甘草一錢水三碗煎汁加陳酒一升乘熱飲之以醉為度四二九五華他治偏頭痛神方川芎硃砂水飛內一兩為衣石膏龍腦各四兩人參茯苓甘草炙細辛各二兩生犀角梔子各一兩阿膠炒一兩半麥冬去心三兩上為末蜜丸彈子大酒下一丸神效四二九六華他治雷頭風神方本症因頭痛而起核塊或頭中如雷之鳴蓋為邪風所客風動則有聲也治法輕則用連翹黃芩黑山梔犀角牛蒡子各一錢薄荷七分桔梗五分等散之重則用瓜蒂好茶各等分共為末每服二錢薺汁調空心服取吐並用大黃黃芩各二兩牽牛滑石各四兩黃連薄荷葉川芎各半兩上為末水為丸梧子大食後溫湯下五十丸四二九七華他治濕熱頭痛神方本症因濕與熱合交蒸互郁其氣上行與清陽之氣相搏則作痛也治宜用羌活防風各一兩柴胡七錢川芎五錢甘草炙一兩半連翹炒一兩黃芩一半炒一半酒製三兩上為末每服二錢入茶少許湯調如膏抹在口內少用白湯送下四二九八華他治風熱頭痛神方菊花石膏川芎上等分為末每服錢半茶調下四二九九華他治眩暈神方本症由血氣虛風邪入於腦而引目系故也蓋臟腑之精氣皆上注於目血氣與目並上為系上屬於腦後出於項中逢身之虛則為風邪所傷入腦則腦轉而目系急故成眩也治用人參當歸防風黃耆芍藥麥門冬各一兩獨活白朮桂心各三兩上以水一斗煮取三升分三服四三華他治頭鳴神方患者頭部覺如蟲蛀其名曰天白蟻治用桑葉黑芝麻牡丹皮梔子上各等分搗末蜜和丸梧子大陳細茶煎湯下二十丸不知稍稍加至四十丸四三一華他治緊唇神方患者唇部微腫濕爛或冷或熱乍瘥乍發積年纍月不易告痊亦名沉唇又名繭唇方用石硫黃白礬硃砂水銀麝香黃柏各一分上共研瓷鉢中以水銀不見為止用臘月豚脂和如泥先拭淨塗之日三五以瘥為度甚良四三二華他治唇菌神方患者唇一時翻突腫起如菌症極危急宜速灸兩手少商穴並以蚯蚓十條吳茱萸二錢研末加灰面少許熱醋調敷兩足心以布包裹二三時更易以愈為度四三三華他治人中腫大神方生蒲黃二錢黃連龍腦各一錢共搗末香油調敷極效四三四華他治口瘡神方龍膽黃連升麻槐白皮大青各二兩苦竹葉一升白蜜半升水五升煮取一升去滓下蜜煎之敷患處取瘥即止四三五華他治口臭神方桂心甘草細辛橘皮各等分上四味搗篩以酒服一錢匕瘥止為度四三六華他治口乾神方酸棗去核一升酸石榴子五合乾葛三兩烏梅去核五合麥門冬去心四兩覆盆子三合甘草炙栝蔞各三兩上八味搗以蜜為丸如棗核大以潤為度四三七華他治舌腫神方以蒲黃頻刮舌上腫自退俟能咽再以黃連煎汁飲之即愈四三八華他治舌縮神方獨活芎藭各三兩天雄防風各一兩蜀椒二合莽草十葉細辛桂心各一兩苦李根皮三兩豚脂二兩先用苦酒浸各藥一宿次以豚脂微火煎之去滓成膏綿裹少許含於舌下四三九華他治舌瘡神方柴胡升麻梔子仁芍藥通草各四兩黃芩大青杏仁去皮尖生薑各三兩石膏八兩以水一斗煎取三升半分四服日三夜一四三一華他治舌血神方木賊草煎湯漱之立止四三一一華他治舌斷神方舌被咬斷急用人參一兩煎汁含漱歷半日再以龍齒末血竭各三分人參末麥冬末各一兩龍腦二分土狗一枚地蝨十枚干為末存性於含漱既了即以舌餂之伸出口外三次即能生肉四三一二華他治舌皮破碎神方卵衣雞卵外殼與卵白間之薄膜以卵衣套舌上易三四次舌即脫皮而愈四三一三華他治舌長口外神方牝雞血浸舌上即縮
