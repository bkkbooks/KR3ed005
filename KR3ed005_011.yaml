body:
  text: 卷十一華佗鼻科神方一一一華佗治鼻中息肉神方通草細辛蕤仁雄黃皂莢去皮子各一分白礬燒二分礜石泥裹燒半日研三分藜蘆炙地膽熬瓜蒂各三分巴豆去皮十枚䕡茹地榆各三分上十三味搗篩以細辛白芷煎湯和散敷息肉上又以膠清和塗之取瘥一一二華佗治鼻窒塞不通神方白芷當歸芎藭細辛辛夷通草桂心薰草各三分上八味以苦酒漬一宿用豬膏一升煎之以白芷色黃為度膏成去滓取少許點鼻中或綿裹內鼻中瘥止一一三華佗治鼻塞多清涕神方細辛蜀椒乾薑芎藭吳茱萸皂莢去皮尖附子各三兩豬膏一升三合先將各藥漬苦酒中一宿次以豬脂煎之候附子色黃為止膏成去滓俟凝以綿裹少許導鼻中並摩頂一一四華佗治鼻齆神方甘遂通草細辛附子炮各一分上四味搗成末以白雄犬膽丸少許納鼻中瘥一一五華佗治肺寒鼻齆神方棗肉二升取膏杏仁去皮尖研酥薑汁蜜餳糖各一升上六味依常微火煎每服一匙瘥止一一六華佗治鼻痛神方以油塗鼻內外或以酥潤之亦得一一七華佗治鼻聾神方鼻聾者謂不聞香臭也治用細辛白芷羌活防風各五分芎藭當歸橘皮桔梗茯苓各一錢薄荷三錢生薑三片水煎服立效一一八華佗治鼻淵神方馬兜鈴五錢麻黃三錢五味子甘草各一錢以水二碗煎取一碗加黑砂糖少許臥時溫服即愈如服藥罔效者惟灸上心穴五壯自愈一一九華佗治鼻衄神方生地黃八兩黃芩一兩阿膠甘草各二兩柏葉一把上以水七升煮取三升去滓納膠煎取二升半分三服外用蝸牛焙乾一枚烏賊骨五分共研細末吹入鼻中神效一一一華佗治鼻瘡神方黃芩半夏各二錢天冬麥冬五味子各一錢五分杏仁一錢甘草五分用水二盅加生薑三片煎八分食後服外用軟石膏煅一兩黃連二分辰砂五服龍腦二分共研成細末和勻送入鼻孔內日三五次立效一一一一華佗治鼻疔神方蟾酥酒化二錢輕粉五分枯白礬寒水石煅銅青膽礬乳香沒藥麝香各一錢雄黃二錢硃砂三錢蝸牛二十一枚上先將各藥搗末於端午日午時在淨室中先將蝸牛研爛同蟾酥和勻稠黏方入各藥共搗勻丸如綠豆大每服三丸熱酒下覆被安臥汗出為效如鼻外發腫可用陳墨一兩蟾酥膽礬血竭各三錢硃砂二錢麝香一錢五分上共為末以涼水調成錠臨用以涼水磨如墨以筆蘸藥塗之一一一二華佗治鼻痔神方鼻痔生於鼻內形如石榴子漸大而下垂令人氣不通暢治用辛夷六分黃芩梔子麥冬百合知母石膏各一錢升麻三分甘草五分枇杷葉三片以水二碗煮取一碗食後服外用硇砂一錢輕粉雄黃各三分龍腦五分上為細末用草梗咬毛蘸點痔上日五七次漸化為水一一一三華佗治酒渣鼻神方麻黃麻黃根各二兩以頭生酒五壺重湯煮三炷香露一夜早晚各飲三五杯至三五日出膿成瘡十餘日膿盡膿盡則紅色退先黃後白而愈
