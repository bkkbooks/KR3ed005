body:
  text: 卷十六華他結毒科神方一六一華他治白濁神方桑螵蛸炙白龍骨上二味等分為末空服鹽湯下二錢日三一六二華他治赤濁神方菟絲子麥門冬等分為末蜜丸梧子大鹽湯下每服七十丸一六三華他治赤白濁神方石菖蒲萆薢益智仁烏藥上四味各一兩水煎八分溫服以瘥為度一六四華他治穢瘡風毒神方土茯苓三斤生黃耆一斤當歸八兩先以水三十碗將土茯苓煎湯取黃耆當歸拌勻微炒干磨為末蜜為丸白湯下三錢日三一劑當效一六五華他治穢瘡初發神方膽礬白礬水銀各等分搗研至水銀不見星為度入香油唾津各小許拌勻坐於帳內取藥塗兩足心以兩手心對足心摩擦良久再塗再擦旋即覆被安臥取汗或俟大便去垢出穢涎為度每次強者需四錢羸者二錢續行三日內服藥同上條並時行澡洗一六六華他治穢瘡結毒神方麥冬三兩甘草一兩桔梗黃芩連翹貝母寒水石研細末各三錢土茯苓夏枯草各二兩先以水三升煎各藥得一升半乃調寒水石末溫服一劑瘥二劑效即已經鼻梁脫落及前陰潰爛者亦能見效一六七華他治穢瘡鼻柱將落神方人參一兩麥冬三兩金銀花三兩桔梗一兩蘇葉五錢甘草一兩水五碗煎取一碗一劑能辨知香臭而不落矣一六八華他治穢瘡前陰腐爛神方金銀花半斤土茯芩四兩當歸熟地各二兩黃柏一兩山茱萸三錢肉桂二錢北五味子一錢上搗末每日沸水調服一兩其功效能阻止前陰潰爛即已脫落者亦能重生一六九華他治穢瘡成圈神方本症因瘡發已久行將結痂復犯房室遂致作痛生圈治宜大補氣血以人參茯苓甘草各二錢當歸白朮黃耆各三錢熟地土茯苓各五錢芎藭一錢柴胡五分肉桂三分上以水煎服約十劑當瘥虛甚者以多服為妙外用人參粉霜甘草輕粉丹砂槐米各一錢石膏二錢龍腦三分共研細末豬膽調搽極效一六一華他治穢瘡生癬神方是為女子感染男子餘毒而生者或瘡已告痊因偶食牛肉或當風洗浴或房室過勞遂致膚上毒結不散因而生癬其候或血乾而起白屑者有之或肉碎而流紅水以致淋漓臭穢者有之內服用天花粉威靈仙胡麻槐角甘草各二錢生地黃麥冬天冬各三錢當歸黃耆各五錢柴胡乳香末各一錢荊芥一錢五分白蘚皮一錢上以水煎服約須十劑外用黃柏雄黃各二錢孩兒茶三錢沒藥輕粉粉霜枯礬各一錢丹砂五分龍腦三分蝸牛十個共為末豬膽調搽日數次三日漸愈一六一一華他治翻花穢瘡神方黃耆一兩土茯苓二兩白芍茯苓各五錢人參甘草各三錢當歸白礬各二錢水煎服四劑重者十劑外用粉霜輕粉龍腦黃柏炒胡粉各二錢百花霜黃丹水飛生甘草各三錢蚯蚓糞火焙乾一兩各研細末點搽自愈一六一二華他治陽性穢瘡神方穢瘡有陰陽性之分凡色紅作痛而高突者是為陽性治宜補氣之藥佐以化毒之味方用人參白朮各五錢甘草茯苓各三錢半夏一錢陳皮五分土茯苓金銀花各一兩上以水煎服十餘劑瘥止外用搽藥詳下一六一三華他治陰性穢瘡神方本症之候與前症相反即色雖紅而低陷且患部不痛不癢治宜補血之藥而輔以消毒之品方用熟地當歸各五錢川芎茯苓甘草天花粉各二錢白芍一錢金銀花土茯苓各一兩水煎服二十劑外用丹砂粉霜輕粉甘草各一錢雄黃二錢孩兒茶三錢露蜂房燒灰五分龍腦三分各為細末和勻豬膽調搽自愈前症亦可用此藥搽之一六一四華他治下疳神方初起時即用生黃耆土茯苓各三兩生甘草三錢水煎服數劑外用輕粉乳香百草霜各一錢孩兒茶三錢黃柏五錢水粉龍腦各三錢上共為末豬膽調搽一六一五華他治橫痃神方鯪鯉甲五錢豬苓二錢上二味並以醋炙研末酒下二錢外亦用鯪鯉甲與輕粉共研末香油調敷一六一六華他治魚口神方雄黃乳香各二兩黃柏一兩上三味共為細末用新汲水調敷腫處自消
