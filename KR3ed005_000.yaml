body:
  text: 孫序原夫玄黃肇剖天地攸分萬匯畢陳人類始出吾人含生負氣孑身於高厚之間寒暑乘其外陰陽薄其中彼其疾病夭折不得其正命而死者奚堪勝數自神農嘗百草而知物性軒轅詢岐伯而著靈樞素問是由本草內經之學始燦然大備其後春秋戰國時有和緩扁鵲之徒漢代有淳于意郭玉之輩皆挾方術以治人疾病或以生氣決生死或以針灸起沉疴史策所載班班可考惟皆傳其軼事而不獲睹其方書讀者憾焉仲景氏生於有漢桓靈之間會當大疫乃始有傷寒論暨金匱玉函之作惟專重方藥猶未若傷他之刳腸湔胃用法奇而奏效尤速也余秉資羸弱日與藥爐相炙近既博綜群籍彙集古方有千金要方暨千金翼方之作日者隱居終南山麓有以方書見遺者余展卷讀之審為華先生之作其中所用為治病之法舍方劑之外兼重針灸與洗伐且所用各藥取材於日用之品為多而步武不難誠救世之祕籍而生死人肉白骨之奇籍也惟原書編制散亂門類錯雜蓋系隨時手録之本且文字有難解之處字迹多漶漫之憂非盡人所能索解余端居多暇尤性耽方術得茲鴻寶苟不為之從事排比奚以傳先賢之妙術而登斯民於耄耆乃日事鉛槧散者集之蝕者補之期以不負先生濟世之苦心庶貽之子孫播之人間自茲元元之民或得保其正命不為寒暑陰陽所播蕩乎永淳元年仲春孫思邈識於終南山下徐序後漢書方術傳載華他精於方藥處劑不過數種心識分銖不假稱量針灸不過數處裁七八九若疾髮結於內針藥所不能及者乃令先以酒服麻沸散既醉無所覺因刳破腹背抽割積聚若在腸胃則斷截煎洗除去疾穢既而縫合敷以神膏四五日創愈一月之間皆平復先生之以神醫見稱於世者蓋以此相傳先生性好恬淡喜味方書多遊名山幽洞往往有所遇一日因酒息於公宜山古洞前忽聞人論療病之法先生訝其異潛逼洞竊聽須臾有人云華生在邇術可付焉復有一人曰是人性貪不憫生靈安得付也先生不覺愈駭躍入洞見二位老人衣木衣頂草冠先生躬趨左右而拜曰適聞賢者論方術遂乃忘歸況夙所好所恨者未遇一法可以施驗徒自不足耳願賢者少察愚誠乞與開悟終身不負恩首坐者云術亦不惜恐異日與子為纍若無高下無貧富無貴賤不務財賄不憚勞苦矜老恤貧為急然後可脫子禍先生再拜謝曰賢聖之語一一不敢忘俱能從之二老笑指東洞云石床上有一書函子自取之速出吾居勿示俗流宜祕密之先生時得書回首已不見老人乃懾怯離洞忽然不見云崩雨瀉石洞摧塌既覽其方論多奇怪從茲誠施靡不神效是先生得享盛名於世者實由於神仙之豫以祕方也先生既得此祕方又恐其有失也乃手録之隨時佩之囊中借便臨時檢索之需仍將原書藏之家中嘗為曹操治頭風久而不愈又去家思歸乃就操求還取方因托妻疾數期不返操纍書呼之又敕郡縣發遣先生恃能厭事猶不肯至操大怒使人廉之知妻詐疾乃收付獄訊考驗首服荀或請曰他方術實工人命所懸宜加全宥操不從竟殺之先生臨死出書一卷與獄吏曰此可以活人吏畏法不敢受先生亦不強索火燒之於是世遂謂先生之祕方從茲失傳矣不知先生手録之本雖毀於火其家藏之本則固無恙也況世間奇籍決無湮沒而不章之理凡閲數百有餘年輾轉流傳此書遂入於孫真人之手真人固沉酣典籍遂於方書者獲睹是編覺視所著之千金要方與千金翼方其治病之法更為精確即為之排比後先補苴罅漏藏之篋笥傳之子孫於是先生祕傳之先方乃始得復出於世且視原本尤釐然有當矣余雅好軒岐之術尤嗜讀古方書歲在壬辰薄遊皖之亳州館於姚氏雨窗無事主人姚君季虔輒出其所蓄舊籍藉資鑑賞而消永晝忽於古紙堆中獲睹是編紙墨暗淡古色盎然望而知為千百餘年之物也逮觀其內容則見其所載治病之法視若奇異而實則一本於至理且其書中所記麻沸散及神膏等方尤為世人所渴望而急欲一睹以為快者急慫恿姚君付之剞劂他日者一編風行俾患病家得按圖而索無庸更假手於庸醫則其裨益於人生以視施醫施藥不更勝萬萬耶姚君以為然且欲假餘一言以為重余遂不辭而述此書之緣起如上云乾隆二十七年壬辰仲秋洄溪老人徐大椿序於亳州之墨海樓時年六十有九沈序華他治病之法專注重於刳腸湔胃不專事方藥其法蓋於今之言西醫者無殊史策昭垂固夫人而知矣惟其治病之方書被收時以豫獄吏獄吏畏法不敢受他即索火燒之由是其書遂致失傳是又言醫術者所同為扼腕太息者也庸詎知天地之奇夕則必宣況方書攸關民生生命與苦樂視其他載籍為尤重所至必有神物呵護之詎能任其湮沒而不彰耶歲在戊午於役皖北奉職於淮泗道尹公署公餘少暇輒搜羅古籍以資消遣其年季冬因公住亳調查學務晤縣立高等小學校校長姚君侗伯相與討論學藝間及典籍姚君博聞強識且家富收藏暇日即邀與觀書於墨海樓樓凡五楹蓋建於遜清壅乾之間其高祖父季虔先生所經營也余得此良晤不忍遽捨去凡流連浹旬得盡觀其所藏中有華他方書尤為平時所渴望而不得見之祕籍且內有孫真人及徐靈胎先生序各一於是書之原由敘述綦詳姚君先人蓋欲付梓而不果者余謂姚君昔張文襄視學西蜀嘗謂凡有力好事之人若自揣得業學問不足過人而欲求不朽者莫如刊布古書則其書終古不廢而刊書之人亦與之終古不泯況方書關係民命視刊布其他古籍為尤有裨益圖不朽利民生承先志一舉而數善備焉姚君重韙余請即以剞劂之事相委比來海上與諸同志商榷僉謂是書所列各方雖間有分兩過大不合於今人者然病家果能斟酌用之其奏效必諱且書中如麻沸散及神膏等配合之法尤為世人所渴欲一睹者藉茲播之於世亦足令今之歐化家俾知刀圭解剖之術固非今世歐西醫學家所得自誇為絶技也余深韙其言即述其緣起而為之序中華民國九年仲春之月沈驤序於滬西古書保存會
