body:
  text: 卷七華他産科神方七一華他治安胎神方厚朴薑汁炒蘄艾醋炒各七分當歸酒炒川芎各一錢五分黃耆荊芥穗各八分菟絲子酒泡一錢白芍酒炒二錢羌活甘草各五分枳殼麵炒六分上以水二碗煎取一碗臨服時再用貝母去心為末一錢以藥沖服此方功效極偉凡妊娠七月者服一劑八月者服二劑九月十月皆服三劑臨産服一劑且凡胎動不安勢欲小産及臨産艱危橫生逆産兒死腹中皆可服之極有奇效惟預服者空心溫服保産及臨産者皆臨時熱服一劑不足繼以二劑如其人虛弱可加人參三五分更佳逮已産後切忌入口慎之七二華他治妊娠惡阻神方患者心中憒悶空煩吐逆惡聞食氣頭眩體重四肢百節疼煩沉重多臥少起惡寒汗出疲極黃瘦治用半夏生薑各三十銖乾地黃茯苓各八十銖橘皮旋覆花細辛人參芍藥芎藭桔梗甘草各十二銖上以水一斗煮取三升分三服七三華他治妊娠嘔吐神方青竹茹橘皮各十八銖茯苓生薑各一兩半夏三十銖以水六升煮取二升半分三服不瘥重合七四華他治妊娠吞酸神方人參白朮半夏陳皮茯苓甘草炙枳實炒神麯炒砂仁研各五分薑引水煎食後服七五華他治妊娠心痛神方青竹茹一升白蜜三兩羊脂八兩上三味合煎食前服如棗核大三枚日三七六華他治妊娠腹痛神方鮮生地黃三斤搗碎絞取汁用清酒一升合煎減半頓服七七華他治妊娠傷寒神方石膏八兩大青黃芩各三兩蔥白一升前胡知母梔子仁各四兩水七升煮取二升半去滓分五服相去如人行七八里久再服七八華他治妊娠患瘧神方常山二兩黃芩三兩甘草一兩石膏八兩烏梅十四枚上以酒水各一升半合漬藥一宿煮三四沸去滓初服六合次服四合後服二合凡三服七九華他治妊娠霍亂神方白朮紫蘇條芩各錢半藿香橘皮甘草各一錢砂仁研五分薑棗引水煎服七一華他治妊娠下痢神方人參黃芩酸石榴皮各二兩橘皮四兩粳米三合水七升煮取二升半分三服七一一華他治妊娠尿血神方黍穰燒灰酒服方寸匕日三若氣體虛寒者宜用桂心鹿角屑大豆黃卷各一兩共搗末酒服方寸匕日三服七一二華他治妊娠子淋神方地膚草大雨各三兩知母黃芩豬苓芍藥枳實炙升麻通草甘草炙各二兩上十味以水八升煮取三升分三服七一三華他治妊娠子癇神方妊娠臨月忽悶憒不識人吐逆眩倒少醒復發名為子癇治用貝母葛根丹皮去心木防己防風當歸芎藭肉桂茯苓澤瀉甘草炙各二兩獨活石膏人參各三兩以水九升煮取三升分二服貝母令人易産若未臨月者升麻代之七一四華他治妊娠子煩神方婦人妊娠時常若煩悶是名子煩方用竹瀝一升麥冬防風黃芩各三兩茯苓四兩上以水四升合竹瀝煮取二升分三服不瘥再作七一五華他治妊娠子懸神方婦人妊娠五六月後胎氣不和上湊心腹脹滿疼痛謂之子懸治用紫蘇橘皮大腹川芎白芍當歸各一錢潞黨甘草炙各五分生薑一錢半蔥白七寸水煎空心腹七一六華他治妊娠子腫神方婦人妊娠數月後面目身體四肢浮腫者此由胎氣泛濫名曰子腫方用大腹皮生薑皮桑白皮茯苓皮白朮紫蘇各三銖大棗三枚水煎湯別以木香磨濃汁三匙沖服七一七華他治妊娠子滿神方婦人妊娠至七八月胎已長成腹部膨大逼迫子戶坐臥不寧是名子滿治用白朮黃芩蘇葉枳殼大腹皮各一錢半砂仁五分研甘草炙三分生薑八分水煎空腹服七一八華他治妊娠子鳴神方婦人妊娠至七八月時向高取物子在腹中其口與所含之物脫離遂發聲而號謂之子鳴治法不必用藥但以豆一握遍撒地上令婦人俯身拾之豆盡而病自止七一九華他治妊娠漏胞神方婦人妊娠已達數月經水猶時時來是名漏胞治用赤小豆五升種於濕地令發芽然後干之為末溫酒下方寸匙日三得效便停七二華他治胎動神方生地黃雞子白一枚生地黃搗爛取汁煎沸入雞子白一枚攪服頗效或服安胎藥見前亦佳七二一華他治胎動下血神方阿膠二兩川芎當歸青竹茹各五兩以水一斗五升煮銀二斤取六升去銀納藥煎取二升半納膠令煬分三服不瘥仍作七二二華他治數墮胎神方黃耆吳茱萸乾薑人參甘草炙芎藭白朮當歸乾地黃各二兩上搗散清酒服一匙半日再服加至兩匙為度或用熟艾五斤醋煮焙乾為末木鱉子五枚研細大赭石二兩米醋淬七遍上同為末煮棗肉為丸梧子大每服三十丸米湯飲下七二三華他治胎動欲墮神方當歸芎藭阿膠炙人參各一兩大棗十二枚以水三升酒四升合煮取二升半分三服五日一劑頻服三四劑無所忌七二四華他治頓僕胎動神方當歸芎藭甘草炙阿膠炙芍藥各二兩艾葉三兩乾地黃四兩以水五升陳酒三升合煮取三升去滓納膠更上火令膠煬分三服日三不瘥更作七二五華他治胎動衝心神方吳茱萸研末酒調敷腳心胎安即洗去七二六華他治因驚胎動神方黃連為末酒下方寸匙日三七二七華他治墮胎溢血神方丹參十二兩以清酒五升煮取三升分三服日三七二八華他治臨月滑胎神方牽牛子一兩赤土一錢共研末白榆皮煎湯下每服一錢七二九華他治難産神方槐枝二升榆白皮大麻仁各一升瞿麥通草各三兩牛膝五兩上以水一斗二升煮取三升半分五服七三華他治漏胎難産神方脂麻油半兩蜂蜜一兩同入鍋中煎沸一食頃溫服極效七三一華他治逆生神方以鹽塗兒足底又可急爪搔之並以鹽摩産婦腹上即順七三二華他治橫生神方菟絲子為末酒服或米汁服方寸匙即生車前子亦效服如上法七三三華他治胎死腹中神方蟹爪一升甘草一尺阿膠三兩上三味以東流水一斗先煮蟹爪甘草得三升去滓次納膠令煬頓服之不能分再服若人困拗口納藥藥入即活煎藥作東向灶用葦薪煮之七三四華他治胞衣不下神方牛膝瞿麥各一兩當歸通草各一兩半桂心二兩葵子八兩上以水九升煮取三升分三服七三五華他治産後血暈神方荷葉炙兩枚蒲黃一兩甘草炙二兩白蜜一匙地黃汁半升上以水三升煮取一升去滓下蒲黃蜜地黃汁暖服立瘥七三六華他治産後余血不盡神方生地黃汁一升芍藥甘草炙各二兩丹參四兩蜜一合生薑汁半合上以水三升煮取一升去滓納地黃汁蜜薑汁微火煎一二沸一服三合日二夜三七三七華他治産後惡露不絶神方澤蘭八分當歸生地黃各三分芍藥十分甘草炙六分生薑十分大棗十四枚上七味以水九升煮取三升分三服欲死塗身得瘥七三八華他治産後發熱神方琥珀一兩生地黃半斤上將地黃於銀器中炒煙盡合地上出火毒研末每琥珀一兩以地黃末二錢勻合用童子小便與酒中半調下一錢日三服七三九華他治産後血不快兼刺痛神方五靈脂蒲黃上等分搗成細末每服二錢米醋半杯同熬成膏再入水一杯煎至七分熱服痛如失七四華他治産後煩悶神方竹葉麥門冬去心小麥各一升甘草炙一兩生薑二兩大棗十四枚上以水一斗煮竹葉小麥取八升去滓納余藥煮取三升去滓分服心虛悸加人參二兩少氣力加粳米五合七四一華他治産後心痛神方蜀椒二合芍藥三兩半夏當歸桂心人參甘草炙各二兩生薑汁五合茯苓二兩蜜一升上以水九升煮椒令沸下諸藥煮取二升半去滓下薑汁蜜等更煎取三升一服五合漸至六合盡勿冷餐七四二華他治産後腹痛神方當歸芍藥乾薑芎藭各六分上四味搗散酒下方寸匙日三七四三華他治産後中風神方獨活八兩葛根六兩生薑五兩甘草炙二兩上以水六升煮取三升分三服微汗佳七四四華他治産後下痢神方赤石脂三兩甘草炙當歸白朮黃連乾薑秦皮各二兩蜀椒附子炮各一兩上搗散蜜和丸桐子大酒下二十丸日三七四五華他治産後遺糞神方礬石燒牡蠣熬上各等分搗篩酒下方寸匙日三七四六華他治産後便祕神方人參麻子仁枳殼麩炒上共搗篩蜜和丸梧子大每服五十丸米湯飲下七四七華他治産後遺溺神方白薇芍藥各一兩共搗末酒下一錢日三七四八華他治産後小便數神方雞肫胵二具雞腸三具洗乾地黃當歸甘草厚朴人參各二兩蒲黃四兩生薑五兩大棗二十枚水一斗煮肫胵及腸大棗取七升去滓納諸藥煎取三升半分三服七四九華他治産後淋瀝神方葵根二兩車前子一升亂髮燒灰大黃桂心滑石各一兩通草二兩生薑六兩冬瓜汁七合上以水七升煮取二升半分三服七五華他治産後虛熱頭痛神方白芍藥乾地黃牡蠣各五兩桂心三兩水一斗煮取二升半去滓分三服日三七五一華他治産後口噤神方獨活生薑各五兩防風秦艽桂心白朮甘草當歸附子各三兩葛根二兩防己一兩上以水一斗二升煮取三升去滓分三服七五二華他治産後狂語神方鹿肉三斤芍藥獨活秦艽黃芩黃耆半夏乾地黃桂心芎藭各二兩生薑六兩甘草阿膠各一兩茯苓人參各四兩以水二斗先煮肉得一斗二升去肉納藥煎三升去滓納膠令煬分四服日三夜一七五三華他治産後癲狂神方辰砂水飛二錢紫項地龍一條乳汁三合先以乳汁調辰砂納地龍沸之刮淨去地龍入無灰酒一碗分作三四次服有效七五四華他治産後驚風神方荊芥穗焙研黑豆炒焦各二錢入醇酒一碗中煎數沸乘熱灌入立效七五五華他治産後抽搦神方鰾膠一兩以蛤粉炒焦去粉搗為散分三服煎蟬蛻湯下七五六華他治産後風痙神方甘草乾地黃麥門冬麻黃各十兩栝蔞根芎藭黃芩各二兩杏仁五十枚葛根半斤上以水一斗五升酒五升合煮葛根取八升去滓納諸藥煮取三升去滓分再服一劑不瘥更合七五七華他治産後風癱神方初起者用野薔薇子擇大紅色者一兩酒煎服一次即愈如日久兩手不能提舉可用薔薇花四兩當歸二兩紅花一兩陳酒五斤上以各藥內酒中漬數日隨量飲之兩料全愈七五八華他治産後蓐勞神方豬腎剖去脂一具香豉綿裹白粳米蔥白各一兩上四味以水三斗煮取五升去滓任情服之不瘥更作若氣體過虛者可加人參當歸各二兩七五九華他治産後虛勞神方鹿肉四斤乾地黃甘草芎藭黃耆芍藥麥門冬茯苓各二兩人參當歸生薑各一兩半夏一升大棗二十枚上以水二十五升煮肉取一斗三升去肉納藥煎取五升去滓分四服日三夜一七六華他治産後虛冷神方紫石英白石英鍾乳赤石脂石膏茯苓白朮桂心芎藭甘草各二兩人參當歸各三兩薤白六兩生薑八兩大棗二十枚先將五石併為末將各藥以水一斗二升煮取三升六合去滓分六服七六一華他治産後盜汗神方吳茱萸三兩以清酒三升漬一宿煮取二升去滓半分之頓服一升日再間日再作服七六二華他治産後自汗神方豬膏生薑汁白蜜各一升清酒五合上煎令調和五上五下膏成隨意以酒服方寸匙七六三華他治産後口渴神方栝蔞四兩麥門冬去心人參乾地黃各三兩甘草炙二兩干棗二十枚土瓜根五兩上以水八升煮取二升半分三服七六四華他治産後腰痛神方敗醬當歸各八分川芎白芍桂心各六分水煎分二次服之忌蔥七六五華他治産後崩中神方荊芥穗五錢炒黑煎服立止七六六華他治産後血閉神方桃仁去皮尖二十枚水一碗煎服極效七六七華他治産後血沖神方血竭沒藥各一錢共研極細童子小便和酒調服七六八華他治産後血痛神方山楂二兩水煎濃汁入糖若干再煎之乘熱服下七六九華他治産後衄血神方荊芥穗三錢炒黑研末童子小便下極效七七華他治産後瀉血神方干艾葉炙半兩老薑半兩水煎濃汁頓服七七一華他治産後厄逆神方白豆蔻丁香各五錢共研末桃仁煎湯下一錢少頃再服服儘自愈七七二華他治産後食阻神方白朮五兩生薑六兩上以水酒各二升緩火煎取一升分二次溫服之七七三華他治産後嘔吐神方赤芍半夏制澤蘭葉橘皮去白人參各二錢甘草炙一錢生薑焙五分水煎服七七四華他治産後心悸神方人參茯苓麥門冬去心甘草炙各三兩桂心一兩大棗五十枚菖蒲澤瀉薯芋乾薑各二兩上搗篩為末煉蜜棗膏為丸如桐子大空腹酒下二十丸日三夜一不知稍增至三十丸七七五華他治産後氣喘神方人參一兩研末蘇木二兩水二碗煎蘇木約一碗調參末服下七七六華他治産後尿血神方小薊根鮮生地赤芍木通蒲黃甘草梢竹葉各一錢滑石二錢燈心草四十九寸水煎服七七七華他治産後帶下神方羊肉二斤香豉大蒜各三兩酥一杯水煎服七七八華他治産後玉門不閉神方石硫黃研蛇床子各四分菟絲子五分吳茱萸六分上四味搗散以湯一升投方寸匙以洗玉門瘥止七七九華他治産後陰下脫神方吳茱萸蜀椒各一升戎鹽如雞子大一撮上三味皆熬令變色為末綿裹如半雞子大納陰中日一易二十日瘥若用皂莢半兩半夏大黃細辛各十八銖蛇床子三銖上五味搗末用薄絹囊盛大如指納陰中日二易即瘥七八華他治産後子腸掉出神方枳殼煎湯洗之三五日後自然脫落惟宜慎避風寒七八一華他治産後腸出不收神方脂麻油二斤煎熱入盆內俟溫令産婦坐盆中別以皂莢燒枯去皮研細末吹鼻中作嚏即收七八二華他治産後陰㿗神方亦名子宮脫出用人參二錢黃耆炙白朮炒各錢半甘草炙陳皮去白各一錢當歸五分升麻三分生薑三片大棗三枚水煎服連服三四劑自愈別以荊芥穗藿香葉臭椿樹皮各六七錢煎湯時時洗之七八三華他治風入産戶神方大鯉魚長一尺以上者一尾漬童子小便內一宿翌日以文火炙熟去皮空腹頓服勿用鹽醋七八四華他治産後陰腫神方羌活防風各一兩煎湯熏洗極效七八五華他治産後陰冷神方五加皮杜仲各一斤蛇床子枸杞子各一升乳床即孔公蘖半升天門冬四兩乾薑三兩乾地黃丹參各二兩上以絹袋子盛酒二斗漬三宿一服五合日再稍加一升佳
